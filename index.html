<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國中英文文法特訓系統</title>
  
  <!-- 引入 Tailwind CSS 進行樣式排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel 以便在瀏覽器中直接編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ==========================================
    // 圖示元件 (替換原本的 lucide-react，確保無外部依賴)
    // ==========================================
    const IconBookOpen = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    );
    const IconCheckCircle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    );
    const IconXCircle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    );
    const IconArrowRight = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    );
    const IconRotateCcw = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    );
    const IconAward = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
    );
    const IconChevronRight = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>
    );
    const IconAlertCircle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    );
    const IconHome = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    );

    // ==========================================
    // 題庫資料 (共 10 大類)
    // ==========================================
    const CATEGORIES = [
      "時態全集", "三大子句", "被動語態", "特殊動詞", "花費動詞", 
      "情緒形容詞", "句型結構", "代名詞與介系詞", "比較級與最高級", "動名詞與不定詞"
    ];

    const RAW_QUESTIONS = [
      // 1. 時態全集 (現在/過去/未來、進行式、完成式) - 會考長句型情境題升級版
      { c: 0, q: "Alice: What are you looking at, Bob? You look so focused.\nBob: Listen! The birds ____ beautifully in the trees. I'm trying to record their voices.", o: ["sing", "are singing", "sang", "have sung"], a: 1, e: "對話情境題。Bob 說 Listen! 並表示正在錄音，暗示動作正在發生，搭配現在進行式 (are singing)。" },
      { c: 0, q: "Mom: Why are you still standing outside the house? It's freezing!\nSon: I ____ my keys on the bus. I can't open the door right now.", o: ["lose", "lost", "have lost", "was losing"], a: 2, e: "會考常考「過去動作對現在造成影響」。現在無法開門是結果，表示過去弄丟鑰匙的影響持續到現在，用現在完成式 (have lost)。" },
      { c: 0, q: "John: I heard your brother loves traveling.\nMary: Yes, he ____ to Japan three times so far, and he plans to visit again next year.", o: ["goes", "went", "has been", "has gone"], a: 2, e: "so far (到目前為止) 常搭配現在完成式。has been to 表「去過(已回來)」，哥哥計畫明年再去，代表已經回來了。" },
      { c: 0, q: "We ran as fast as we could to catch the 9:00 train to Taipei. However, by the time we got to the station, the train ____.", o: ["leaves", "left", "has left", "had left"], a: 3, e: "長句閱讀題。「我們到達車站」是過去式，而火車在我們到達「之前」就開走了，過去的過去要用過去完成式 (had left)。" },
      { c: 0, q: "Police: What ____ you ____ at 8:00 last night?\nSuspect: I was having dinner with my family at a restaurant.", o: ["do; do", "did; do", "were; doing", "are; doing"], a: 2, e: "at 8:00 last night 是一個明確的過去時間點，且嫌犯回答 I was having...，故問句應使用過去進行式 (were doing)。" },
      { c: 0, q: "Lisa: Look! The sky is getting so dark and the wind is blowing hard.\nTom: Yeah, I think it ____ soon. We'd better go home now.", o: ["rains", "rained", "is going to rain", "has rained"], a: 2, e: "情境推論題。有跡象顯示即將發生的事 (烏雲密布、颳強風)，通常使用 be going to 來表示未來。" },
      { c: 0, q: "Peter: Have you seen my dictionary? I can't find it anywhere.\nJane: Oh, I ____ it on your desk a few minutes ago. Go check it again.", o: ["see", "saw", "have seen", "was seeing"], a: 1, e: "a few minutes ago (幾分鐘前) 是明確的過去時間點，動詞必須使用過去簡單式 (saw)。" },
      { c: 0, q: "Mom: Why is the kitchen so messy?\nSon: Sorry, mom. I ____ to make a cake for Dad's birthday, but I accidentally dropped the flour.", o: ["try", "tried", "was trying", "have tried"], a: 2, e: "媽媽問為何現在廚房很亂，兒子解釋「剛才正在嘗試做蛋糕」，強調過去某段時間持續進行的動作，用過去進行式最生動。" },
      { c: 0, q: "Amy: Is your brother still studying in the US?\nBob: No, he ____ back to Taiwan. He is working in Taipei now.", o: ["comes", "came", "has come", "was coming"], a: 2, e: "會考經典對話。哥哥現在在台北工作，代表「已經回到台灣」，過去的動作對現在造成改變，使用現在完成式。" },
      { c: 0, q: "When the teacher walked into the classroom, the students ____ loudly. They didn't even notice her until she knocked on the desk.", o: ["talk", "talked", "were talking", "have talked"], a: 2, e: "老師走進教室 (短暫動作) 的時候，學生們「正在」大聲講話 (持續動作)。持續動作被打斷用過去進行式。" },
      { c: 0, q: "Dear Diary, it has been raining for a whole week. I really hope the sun ____ soon, so I can go out and play basketball.", o: ["shines", "shone", "has shone", "will shine"], a: 3, e: "日記情境題。hope 後面通常接代表未來的事件，期待太陽即將露臉，用未來式 (will shine)。" },
      { c: 0, q: "Reporter: Excuse me, sir. How long ____ you ____ in this town?\nResident: For over twenty years. I love the quiet life here.", o: ["do; live", "did; live", "have; lived", "are; living"], a: 2, e: "How long + for over twenty years 表從過去持續到現在的時間長度，必須使用現在完成式。" },
      { c: 0, q: "Before Sarah went to bed last night, she ____ all her homework and packed her schoolbag for the next day.", o: ["finishes", "finished", "has finished", "had finished"], a: 3, e: "「上床睡覺」(went to bed) 是過去式，而「完成作業」發生在睡覺之前 (過去的過去)，使用過去完成式 (had finished)。" },
      { c: 0, q: "I ____ this movie twice before, but I wouldn't mind watching it again because the story is so touching.", o: ["see", "saw", "have seen", "am seeing"], a: 2, e: "twice before (以前曾有過兩次) 表示經驗，常搭配現在完成式 (have seen)。" },
      { c: 0, q: "Mr. Smith ____ in this company since he graduated from college in 2010. He is now the general manager.", o: ["works", "worked", "has worked", "is working"], a: 2, e: "since + 過去時間點 (2010)，主要子句表示從過去持續到現在的狀態，使用現在完成式。" },
      { c: 0, q: "As soon as the famous singer ____ on the stage, all the fans started screaming and waving their hands happily.", o: ["steps", "stepped", "has stepped", "was stepping"], a: 1, e: "as soon as (一...就...) 連接兩個連貫的過去動作。粉絲開始尖叫 (started) 是過去式，歌手登台也是過去簡單式 (stepped)。" },
      { c: 0, q: "My grandfather usually ____ a cup of hot tea while he is reading the morning newspaper in the living room.", o: ["drink", "drinks", "drank", "is drinking"], a: 1, e: "usually 表平常的習慣動作，主詞 My grandfather 為第三人稱單數，動詞加 s (drinks)。" },
      { c: 0, q: "Jack: Are we still going camping this weekend?\nLily: Yes, we ____ to the mountains if the weather is sunny and warm.", o: ["go", "went", "will go", "have gone"], a: 2, e: "條件子句 (if...) 用現在式代替未來式，但主要子句仍須維持未來式 (will go)。" },
      { c: 0, q: "The little boy was crying sadly in the park because his favorite balloon ____ away into the sky.", o: ["flies", "flew", "has flown", "had flown"], a: 3, e: "「男孩在哭」(was crying) 是過去式，氣球飛走發生在哭之前，強調原因發生在更早以前，用過去完成式 (had flown)。" },
      { c: 0, q: "Mom: Have you fed the dog yet?\nSon: Yes, Mom. I ____ him thirty minutes ago. He is sleeping now.", o: ["feed", "fed", "have fed", "was feeding"], a: 1, e: "雖然問句是現在完成式 (yet)，但答句有明確的過去時間 thirty minutes ago，必須用過去簡單式 (fed)。" },

      // 2. 三大子句 (名詞子句、關係子句、副詞子句) - 會考長句型情境題升級版
      { c: 1, q: "Tourist: Excuse me. I think I'm lost. Could you tell me ____?\nPolice officer: Sure. Just go straight for two blocks, and you'll see it on your right.", o: ["where is the train station", "where the train station is", "the train station is where", "where does the train station be"], a: 1, e: "間接問句/名詞子句當受詞，須使用直述句語序：疑問詞 (where) + 主詞 (the train station) + 動詞 (is)。" },
      { c: 1, q: "Sally: Do you know the man ____?\nKevin: Oh, that's Mr. Lin. He is our new math teacher.", o: ["who is talking to the principal", "whom is talking to the principal", "which is talking to the principal", "whose is talking to the principal"], a: 0, e: "先行詞為人 (the man)，且在關係子句中作主詞 (正在跟校長說話的人)，關係代名詞用 who。" },
      { c: 1, q: "The chocolate cake ____ Mary made for her mother's birthday looked terrible, but it tasted surprisingly good.", o: ["who", "what", "which", "whose"], a: 2, e: "長句主詞修飾。先行詞為物 (The chocolate cake)，關係代名詞用 which 或 that。" },
      { c: 1, q: "____ the weather was extremely cold and windy, the brave climbers still decided to try and reach the top of the mountain.", o: ["Because", "Although", "But", "So"], a: 1, e: "語意邏輯題。天氣惡劣「雖然...但是...」仍決定攻頂，Although 引導讓步副詞子句。英文中 Although 和 But 不能同句。" },
      { c: 1, q: "My sister was very sad because her computer was broken. The real problem was ____ she hadn't saved her report before it shut down.", o: ["what", "which", "that", "where"], a: 2, e: "that 引導名詞子句當作主詞補語 (在 be 動詞 was 之後)，that 無意義但不可省略。" },
      { c: 1, q: "Reporter: Sir, can you tell us ____?\nWitness: Well, I just heard a loud noise and then the car crashed into the tree.", o: ["what happened here", "what did happen here", "here happened what", "what was happened here"], a: 0, e: "what 兼作疑問詞與主詞，引導名詞子句「這裡發生了什麼事」，語序不需倒裝。" },
      { c: 1, q: "I will never forget the small town ____ I spent my childhood. The people there were so friendly and the air was always fresh.", o: ["which", "that", "where", "when"], a: 2, e: "先行詞為地方 (the small town)，且關係子句缺地方副詞 (in the town)，使用關係副詞 where。" },
      { c: 1, q: "David is the only student in our class ____ got a perfect score on the math test. We are all very proud of him.", o: ["who", "whom", "that", "which"], a: 2, e: "當先行詞前有 the only (唯一的), the same 等修飾語時，關係代名詞強烈建議/必須使用 that。" },
      { c: 1, q: "Cindy didn't go to the movies with us last night ____ she had to stay home and prepare for her science test.", o: ["so", "because", "although", "but"], a: 1, e: "語意邏輯題。because (因為) 表原因。Because 和 So 不能同時出現在一個句子裡。" },
      { c: 1, q: "The clerk asked the customer ____ he wanted to pay in cash or by credit card.", o: ["that", "whether", "weather", "if"], a: 1, e: "whether... or... 表「是否...還是...」，引導名詞子句當作 asked 的受詞。" },
      { c: 1, q: "I am not quite sure ____ the museum is open on Mondays. Let me check it on the internet for you.", o: ["that", "if", "what", "which"], a: 1, e: "if 在此作「是否」解，引導名詞子句，表示不確定的狀態 (not quite sure)。" },
      { c: 1, q: "The stray dog ____ leg was badly injured was finally rescued by some kind-hearted students yesterday.", o: ["who", "which", "whose", "that"], a: 2, e: "表示所有格「那隻流浪狗的(腿)」，關係代名詞須用 whose。" },
      { c: 1, q: "Everyone in the office knows the reason ____ the boss was so angry this morning. Someone made a big mistake in the report.", o: ["what", "which", "where", "why"], a: 3, e: "先行詞為 reason (原因)，關係副詞固定搭配 why (= for which)。" },
      { c: 1, q: "Please don't worry about me. I will call you as soon as I ____ at the hotel in Tokyo safely.", o: ["arrive", "arrived", "will arrive", "am arriving"], a: 0, e: "as soon as (一...就...) 引導的時間副詞子句中，要用「現在式」代替未來式。" },
      { c: 1, q: "The new smartphone ____ I bought online last week suddenly stopped working this morning. I need to return it.", o: ["who", "that", "where", "whose"], a: 1, e: "先行詞為物 (The new smartphone)，關代用 which 或 that。" },
      { c: 1, q: "Can you believe ____ happened to me yesterday? I won the first prize in the lottery and got ten thousand dollars!", o: ["that", "which", "what", "where"], a: 2, e: "what (= the thing which) 引導名詞子句「發生的事情」，當作 believe 的受詞。" },
      { c: 1, q: "I am looking for a quiet coffee shop ____ I can read my book and relax for the whole afternoon.", o: ["which", "that", "where", "when"], a: 2, e: "先行詞為地方 (coffee shop)，關係副詞用 where (= in which)。" },
      { c: 1, q: "The horror movie ____ we watched last night was so scary that I couldn't sleep at all.", o: ["who", "which", "where", "whose"], a: 1, e: "先行詞為物 (movie)，關代用 which (或 that)。" },
      { c: 1, q: "____ it is raining heavily outside, we have to cancel our picnic in the park and stay at home.", o: ["Because", "Although", "But", "So"], a: 0, e: "Because 表原因 (因為下大雨)。" },
      { c: 1, q: "Does anyone know the boy ____ father is a famous movie director? He just transferred to our school.", o: ["who", "which", "whose", "that"], a: 2, e: "表示所有格「那個男孩的(父親)」，用 whose。" },

      // 3. 被動語態
      { c: 2, q: "Tour Guide: Welcome to our country! As you may know, English ____ in many popular tourist spots here, so you don't need to worry about communication.", o: ["speaks", "is speaking", "is spoken", "has spoken"], a: 2, e: "長句情境題。英文是被說的，且導遊在描述一般客觀事實，故用現在簡單被動語態 (is spoken)。" },
      { c: 2, q: "Teacher: Who broke the window in the classroom?\nStudent: I'm not sure, but I heard that it ____ by a boy from another class yesterday afternoon.", o: ["breaks", "broke", "is broken", "was broken"], a: 3, e: "對話情境題。yesterday afternoon 提示過去式，窗戶是被打破的，故用過去簡單被動語態 (was broken)。" },
      { c: 2, q: "Leo: How are you going to school tomorrow? Your bike is broken, right?\nSam: Don't worry. My dad said it ____ by the mechanic tomorrow morning.", o: ["will repair", "will be repaired", "is repairing", "repairs"], a: 1, e: "tomorrow 提示未來式，腳踏車將被修理，助動詞被動語態為 (will be + Vp.p.)。" },
      { c: 2, q: "Manager: Did you send the important letter to our client?\nSecretary: Yes, sir. It ____ already. I sent it right after our meeting this morning.", o: ["has sent", "was sent", "has been sent", "is sending"], a: 2, e: "already (已經) 常配完成式，且信是被寄出的，現在完成式被動為 (have/has been + Vp.p.)。" },
      { c: 2, q: "Employee: Excuse me, boss. It's getting late. Must the work ____ today? I'm feeling a bit sick.\nBoss: Yes, it's urgent. We need it by 5 PM.", o: ["finish", "finishes", "finished", "be finished"], a: 3, e: "情態助動詞 (Must/Can/Should) 之後的被動語態，必須要用原形 be + Vp.p.。" },
      { c: 2, q: "Tom: Why were you so tired yesterday evening?\nJerry: I made a big mistake at home, so I was made ____ the floor of the whole house by my mother.", o: ["sweep", "to sweep", "sweeping", "swept"], a: 1, e: "會考超高頻陷阱！使役動詞 make 在主動時接受詞接原形，但變成「被動語態」(was made) 時，必須加回 to，變成 to V。" },
      { c: 2, q: "Guest: Wow, the chocolate cake looks amazing! Did you make it yourself?\nHost: Yes! And trust me, it ____ as delicious as it looks.", o: ["is tasted", "tastes", "is tasting", "tasted"], a: 1, e: "觀念題。連綴動詞 (taste, sound, look...) 「沒有」被動語態！直接用主動形式即可。" },
      { c: 2, q: "Principal: To make our campus greener and more beautiful, a lot of trees ____ around the school buildings every year.", o: ["are planted", "were planted", "will be planted", "have been planted"], a: 0, e: "every year 提示現在簡單式，複數主詞 trees 搭配 are + Vp.p. (are planted)。" },
      { c: 2, q: "Mom: Why is it so smelly in the kitchen?\nDad: Oh, sorry. The garbage ____ out right now by Jason. The smell will be gone soon.", o: ["is taking", "is being taken", "has been taken", "was taken"], a: 1, e: "right now 提示現在進行式，現在進行式的被動語態為 (is/are/am + being + Vp.p.)。" },
      { c: 2, q: "Nurse: How is the little baby doing while his parents are working abroad?\nDoctor: He is fine. He is taken good care ____ by his loving grandmother.", o: ["for", "with", "of", "to"], a: 2, e: "片語動詞 take care of 變被動時，介系詞 of 必須保留，不可省略。" },
      { c: 2, q: "Student: This novel is so interesting! Who wrote it?\nLibrarian: It was written ____ a famous author who won a national prize last year.", o: ["with", "by", "in", "from"], a: 1, e: "被動語態中，表示「被...人(執行者)」時，使用介系詞 by。" },
      { c: 2, q: "Police: When did you realize that your money was gone?\nVictim: I wanted to buy a drink, and then I found that my wallet ____ on my way home.", o: ["stole", "is stolen", "was stolen", "has stolen"], a: 2, e: "錢包是在回家的路上「被偷的」(過去發生的單一事件)，用過去簡單被動。" },
      { c: 2, q: "Student: This math problem is too difficult. I've spent an hour on it!\nTeacher: Actually, if you use the new formula I taught you, it can ____ easily.", o: ["solve", "be solved", "is solved", "solving"], a: 1, e: "助動詞 can + 被動語態 (be + Vp.p.)。" },
      { c: 2, q: "Citizen: The traffic near our neighborhood is terrible during rush hours.\nMayor: I'm sorry to say that nothing ____ done to solve the problem yet, but we are making a plan.", o: ["has", "has been", "is", "was"], a: 1, e: "yet 提示現在完成式，Nothing 視為單數，且為被動，故用 has been done。" },
      { c: 2, q: "Hotel Manager: The VIP guests are arriving at 3 PM today. Remember, their room ____ before they step into the hotel.", o: ["will clean", "must be cleaned", "must clean", "cleaned"], a: 1, e: "房間「必須被清理」，助動詞 must + be + Vp.p.。" },
      { c: 2, q: "Customer: These running shoes are so comfortable. Are they imported from the USA?\nClerk: Actually, they ____ in Taiwan. Our country makes great shoes!", o: ["make", "made", "are made", "are making"], a: 2, e: "鞋子是「被製造」的，描述一般事實用現在簡單被動語態 (are made)。" },
      { c: 2, q: "Wife: Honey, can you drive me to the supermarket?\nHusband: I can't. My car ____ at the garage right now. Let's take a taxi.", o: ["washed", "is washing", "was washed", "is being washed"], a: 3, e: "right now 提示現在進行式，車子「正在被洗」，用 is being + Vp.p.。" },
      { c: 2, q: "Teacher: Please remember that this science report is very important. It ____ finished by tomorrow afternoon, or you will fail the class.", o: ["will", "will be", "is", "has been"], a: 1, e: "by tomorrow (到明天為止) 提示未來式，作業將會「被完成」，用 will be + Vp.p.。" },
      { c: 2, q: "Detective: Did anyone see the missing boy yesterday?\nWitness: Yes, he was seen ____ the convenience store at the corner around 7 PM.", o: ["enter", "entered", "to enter", "enters"], a: 2, e: "進階會考題！感官動詞改為被動語態 (was seen) 時，後方的動作須使用「不定詞 to V」。(為避免 V-ing 爭議，選項設計為 to enter)" },
      { c: 2, q: "Fan: I really want to go to Mayday's concert! Do you have any extra tickets?\nFriend: Sorry, all the tickets ____ out in ten minutes yesterday morning.", o: ["sell", "sold", "were sold", "are sold"], a: 2, e: "yesterday 提示過去式，票是「被賣光」的，用 were sold。" },
      { c: 2, q: "The bridge ____ next year.", o: ["builds", "built", "will be built", "is building"], a: 2, e: "橋將被建造，且有 next year，用未來式被動 (will be + Vp.p.)。" },
      { c: 2, q: "The letter ____ by him yesterday.", o: ["writes", "wrote", "was written", "is written"], a: 2, e: "yesterday 提示過去式，信是被寫的，用過去簡單被動。" },
      { c: 2, q: "English ____ all over the world.", o: ["speaks", "is speaking", "has spoken", "is spoken"], a: 3, e: "英文是被說的，描述事實用現在簡單被動 (is spoken)。" },
      { c: 2, q: "The work must ____ before Friday.", o: ["finish", "finished", "be finished", "finishes"], a: 2, e: "助動詞 (must) 後面的被動語態要用原形 be + Vp.p.。" },
      { c: 2, q: "Many trees ____ in the park every year.", o: ["are planted", "planted", "were planted", "plant"], a: 0, e: "every year 提示現在式，樹是被種植的，用 are planted。" },
      { c: 2, q: "The homework ____ already.", o: ["has done", "has been done", "is doing", "was doing"], a: 1, e: "already 提示完成式，作業「已經被完成」，用 has been done。" },
      { c: 2, q: "A new hospital ____ in our town recently.", o: ["has built", "was building", "has been built", "builds"], a: 2, e: "recently (最近) 提示現在完成式，醫院是被建的，用 has been built。" },
      { c: 2, q: "The room ____ every day.", o: ["cleans", "is cleaned", "cleaned", "has cleaned"], a: 1, e: "every day 提示現在簡單式，房間是被清理的，用 is cleaned。" },
      { c: 2, q: "He was seen ____ the room.", o: ["enter", "entered", "to enter", "enters"], a: 2, e: "感官動詞改為被動語態時，後方的動作須使用「不定詞 to V」。" },
      { c: 2, q: "We are interested ____ this story.", o: ["by", "with", "in", "about"], a: 2, e: "be interested in (對...感興趣)，為固定介系詞搭配。" },
      { c: 2, q: "The desk is made ____ wood.", o: ["by", "of", "from", "with"], a: 1, e: "物理變化(仍看得出材質)用 be made of；化學變化用 be made from。" },
      { c: 2, q: "Wine is made ____ grapes.", o: ["of", "from", "by", "in"], a: 1, e: "化學變化(看不出原材質)用 be made from。" },
      { c: 2, q: "I was surprised ____ the news.", o: ["by", "with", "at", "in"], a: 2, e: "be surprised at (對...感到驚訝)，固定介系詞搭配。" },
      { c: 2, q: "She was satisfied ____ the result.", o: ["with", "by", "for", "in"], a: 0, e: "be satisfied with (對...感到滿意)。" },
      { c: 2, q: "He is known ____ his kindness.", o: ["by", "as", "for", "to"], a: 2, e: "be known for (因為...特質而聞名)。" },
      { c: 2, q: "A lot of money ____ spent on the project yesterday.", o: ["is", "are", "was", "were"], a: 2, e: "money 不可數視為單數，yesterday 表過去式被動，用 was。" },
      { c: 2, q: "Nothing ____ done to stop the fire yet.", o: ["is", "has", "has been", "was"], a: 2, e: "yet 提示現在完成式，Nothing 視為單數且被動，用 has been done。" },
      { c: 2, q: "The problem can ____ easily.", o: ["solve", "solving", "is solved", "be solved"], a: 3, e: "助動詞 can + 被動語態 (be + Vp.p.)。" },
      { c: 2, q: "The trash ____ out tomorrow.", o: ["will take", "took", "will be taken", "is taken"], a: 2, e: "tomorrow 提示未來式，垃圾將被拿出，用 will be taken。" },
      { c: 2, q: "He was made ____ his room by his mom.", o: ["clean", "to clean", "cleaned", "cleaning"], a: 1, e: "使役動詞 make 變被動時，原形動詞必須加回 to (to V)。" },
      { c: 2, q: "The news ____ reported on TV tonight.", o: ["will", "will be", "is", "has"], a: 1, e: "tonight 未來式，新聞將會「被報導」，用 will be。" },
      { c: 2, q: "The poor dog ____ by a car.", o: ["hits", "hit", "was hit", "was hitting"], a: 2, e: "狗是被車撞到的(單一事件)，用過去簡單被動 (hit 三態同行)。" },
      { c: 2, q: "This song is often ____ by children.", o: ["sing", "sang", "sung", "singing"], a: 2, e: "被動語態 be + Vp.p.，sing 的過去分詞是 sung。" },
      { c: 2, q: "Taiwan is known ____ a food paradise.", o: ["for", "as", "to", "by"], a: 1, e: "be known as + 身分/名稱 (作為...而聞名)。" },
      { c: 2, q: "The singer is known ____ many young people.", o: ["for", "as", "to", "by"], a: 2, e: "be known to + 對象 (為...所知)。" },
      { c: 2, q: "My bike was stolen ____ someone.", o: ["for", "with", "by", "in"], a: 2, e: "被動語態中，動作的執行者前面用介系詞 by。" },
      { c: 2, q: "The floor is covered ____ dust.", o: ["by", "with", "in", "of"], a: 1, e: "be covered with (被...覆蓋)，固定搭配。" },
      { c: 2, q: "The house was painted ____ white.", o: ["by", "with", "in", "(不填)"], a: 3, e: "paint + 物 + 顏色 (被動: 物 was painted + 顏色)，不需要介系詞。" },
      { c: 2, q: "Computers are widely ____ today.", o: ["use", "used", "using", "uses"], a: 1, e: "電腦被廣泛使用，be + Vp.p. (used)。" },
      { c: 2, q: "The thief was caught ____ the police.", o: ["with", "by", "from", "for"], a: 1, e: "小偷是被警察(執行者)抓到的，用 by。" },

      // 4. 特殊動詞 (感官、使役、連綴)
      { c: 3, q: "Witness: I was standing at the corner waiting for the bus.\nPolice: And what did you see?\nWitness: I saw a young boy ____ the street carelessly just now, and then a motorcycle almost hit him.", o: ["cross", "crossed", "to cross", "crosses"], a: 0, e: "感官動詞 (see/hear/watch) + 受詞 + 原形動詞 (強調事實/全程) 或 V-ing (強調正在進行)。選項中只有 cross。" },
      { c: 3, q: "Eric: Do you want to go to the movies with us this Saturday?\nKevin: I'd love to, but I can't. My mom makes me ____ my bedroom every weekend before I can go out.", o: ["clean", "to clean", "cleaning", "cleaned"], a: 0, e: "使役動詞 (make/have/let) + 受詞 + 原形動詞 (主動)。" },
      { c: 3, q: "Little Girl: Mom, I don't want to take this medicine. It tastes ____!\nMom: I know, honey, but it will help you get well soon.", o: ["terrible", "terribly", "badly", "well"], a: 0, e: "連綴動詞 (taste/smell/sound/look/feel) 後面必須接「形容詞」作為主詞補語。" },
      { c: 3, q: "Neighbor: Wow, your car looks so shiny and clean today!\nMr. Wang: Thanks! I was too busy this week, so I had it ____ at the car wash center yesterday.", o: ["wash", "to wash", "washing", "washed"], a: 3, e: "使役動詞 have + 物 (car) + Vp.p. (過去分詞)，表示讓某物「被」做..." },
      { c: 3, q: "Father: I don't think studying art is a good idea for Jason's future.\nMother: He is already eighteen. We should let him ____ what he really wants for his life.", o: ["do", "does", "to do", "doing"], a: 0, e: "使役動詞 let + 受詞 + 原形動詞。" },
      { c: 3, q: "Customer: What is playing on the radio right now? The music sounds so ____.\nCafe Owner: It's a classical piano piece by Chopin. I'm glad you like it.", o: ["beautiful", "beautifully", "wonderfully", "badly"], a: 0, e: "連綴動詞 sound 後接形容詞。" },
      { c: 3, q: "Sister: I couldn't sleep well last night.\nBrother: Why? Did you hear someone ____ the piano in the next room in the middle of the night?", o: ["play", "played", "to play", "plays"], a: 0, e: "感官動詞 hear + 受詞 + 原形動詞/V-ing。" },
      { c: 3, q: "Student: Did you watch the news about the brave firefighter who saved three kids?\nTeacher: Yes, the story of his courage made us all ____.", o: ["sadly", "sad", "to sad", "saddened"], a: 1, e: "make + 受詞 + 形容詞 (使...變得...)。sad 是形容詞。" },
      { c: 3, q: "Jane: Do you think this color is too bright for a formal party?\nMary: Not at all! You look ____ in that red dress. Everyone will look at you.", o: ["beautifully", "beautiful", "beauty", "to be beautiful"], a: 1, e: "連綴動詞 look 後接形容詞 beautiful。" },
      { c: 3, q: "Principal: How did Mr. Lee improve his class's grades?\nDirector: He has his own ways. He finally got all the students ____ their homework on time every day.", o: ["finish", "to finish", "finishing", "finished"], a: 1, e: "get 雖然有使役的意味，但用法不同：get + 人 + to V (要求某人去做某事)。" },
      { c: 3, q: "Son: Mom, did you forget to turn off the stove?\nMom: Oh my goodness! I smelled something ____ in the kitchen. The soup is ruined!", o: ["burn", "burning", "burned", "to burn"], a: 1, e: "感官動詞 smell + 受詞 + V-ing (強調當下正在燃燒的狀態)。" },
      { c: 3, q: "Patient: Doctor, when I heard the loud noise from the machine, I suddenly felt my heart ____ really fast. Is it serious?", o: ["beat", "beaten", "to beat", "beats"], a: 0, e: "感官動詞 feel + 受詞 + 原形動詞/V-ing。" },
      { c: 3, q: "Newscaster: Please remember to bring a heavy jacket if you are going out tonight. The weather is getting ____ because of the cold front.", o: ["cold and cold", "colder and colder", "more and more cold", "coldly"], a: 1, e: "get/become (連綴動詞表變化) + 比較級 and 比較級，表示「越來越...」。" },
      { c: 3, q: "Owner: Please hold the leash tightly while I open the front gate. Don't let the dog ____ away, or he might get lost.", o: ["run", "to run", "running", "ran"], a: 0, e: "let + 受詞 + 原形動詞。" },
      { c: 3, q: "Colleague: Wow, Linda! You look different today. Did you change your hairstyle?\nLinda: Yes, I had my hair ____ at the new salon this morning.", o: ["cut", "to cut", "cutting", "cuts"], a: 0, e: "have + 物 (hair) + Vp.p. (頭髮是被剪的，cut的過去分詞還是cut)。" },
      { c: 3, q: "Boss: Why didn't you reply to my email last night?\nWorker: I'm sorry, my laptop was broken. I just had it ____ by the IT department yesterday afternoon.", o: ["fix", "fixed", "fixing", "to fix"], a: 1, e: "have + 物 + Vp.p.：使役動詞用法，表示讓某物「被」處理。" },
      { c: 3, q: "Brother: I'm starving! What's for dinner?\nSister: I just ordered a seafood pizza, and it smells so ____. I can't wait to take a bite!", o: ["good", "well", "badly", "goodly"], a: 0, e: "連綴動詞 smell 後面必須接形容詞 (good)。well 當形容詞只有「健康的」之意。" },
      { c: 3, q: "Teacher: Did anyone notice the classroom ____ just a moment ago?\nStudent: Yes! I think it was a small earthquake.", o: ["shook", "to shake", "shaking", "shaken"], a: 2, e: "notice (注意到) 也是感官動詞，後接原形動詞或 V-ing (shaking)。" },
      { c: 3, q: "Manager: The construction outside is too loud. Please keep the door ____ so we can focus on the meeting.", o: ["close", "closing", "closed", "to close"], a: 2, e: "keep + 受詞 + 受詞補語。門是被關著的狀態(受詞補語用過去分詞 closed)，語意為把噪音擋在外面。" },
      { c: 3, q: "Coach: We just won the national championship!\nPlayer: That's amazing! The great news made everyone in our school very ____.", o: ["happily", "happiness", "happy", "to be happy"], a: 2, e: "make + 受詞 + 形容詞 (使...變得...)。happy 是形容詞。" },
      { c: 3, q: "The milk smells ____. You shouldn't drink it.", o: ["bad", "badly", "well", "worse"], a: 0, e: "smell 是連綴動詞，後面必須接形容詞 bad。" },
      { c: 3, q: "I watched the old man ____ the street slowly.", o: ["cross", "to cross", "crossed", "crosses"], a: 0, e: "感官動詞 watch + 受詞 + 原形動詞 (強調看見整個過程)。" },
      { c: 3, q: "Please help me ____ the heavy box.", o: ["carry", "carried", "carrying", "carries"], a: 0, e: "help + 受詞 + (to) V。這裡省略了 to，用原形動詞 carry。" },
      { c: 3, q: "The joke made everyone ____ loudly.", o: ["laugh", "to laugh", "laughing", "laughed"], a: 0, e: "使役動詞 make + 受詞 + 原形動詞。" },
      { c: 3, q: "Mom won't let me ____ TV after 10 PM.", o: ["watch", "to watch", "watching", "watched"], a: 0, e: "使役動詞 let + 受詞 + 原形動詞。" },
      { c: 3, q: "His voice sounds ____ a famous singer.", o: ["like", "as", "with", "to"], a: 0, e: "sound like + 名詞 (聽起來像...)。" },
      { c: 3, q: "Look at the clouds. It is getting ____.", o: ["dark", "darkly", "darkness", "to dark"], a: 0, e: "get 作連綴動詞表「變得...」，後接形容詞。" },
      { c: 3, q: "Did you feel the house ____ just now?", o: ["shaking", "shook", "shaken", "to shake"], a: 0, e: "感官動詞 feel + 受詞 + V-ing (強調當下正在進行的動作)。" },
      { c: 3, q: "She had the mechanic ____ her car.", o: ["repair", "to repair", "repaired", "repairing"], a: 0, e: "使役動詞 have + 人 + 原形動詞 (叫某人做某事)。" },
      { c: 3, q: "I will get my brother ____ you with the math.", o: ["to help", "help", "helped", "helping"], a: 0, e: "get + 人 + to V (說服/讓某人去做某事)，注意 get 不是接原形！" },
      { c: 3, q: "The food goes ____ easily in summer.", o: ["bad", "badly", "worse", "well"], a: 0, e: "go 作連綴動詞 (go bad 壞掉)，後接形容詞。" },
      { c: 3, q: "The leaves turn ____ in autumn.", o: ["red", "redly", "redness", "to red"], a: 0, e: "turn 作連綴動詞表顏色狀態改變，後接形容詞。" },
      { c: 3, q: "I saw a dog ____ after a cat.", o: ["running", "ran", "to run", "runs"], a: 0, e: "感官動詞 see + 受詞 + V-ing (看見正在追)。" },
      { c: 3, q: "The mother watched her baby ____ soundly.", o: ["sleeping", "slept", "to sleep", "sleeps"], a: 0, e: "感官動詞 watch + 受詞 + V-ing (看著正在睡)。" },
      { c: 3, q: "Don't make me ____ it again!", o: ["say", "to say", "saying", "said"], a: 0, e: "使役動詞 make + 受詞 + 原形動詞。" },
      { c: 3, q: "My teacher had me ____ the blackboard.", o: ["clean", "to clean", "cleaned", "cleaning"], a: 0, e: "使役動詞 have + 人 + 原形動詞。" },
      { c: 3, q: "The beautiful music makes me ____ relaxed.", o: ["feel", "to feel", "feeling", "felt"], a: 0, e: "make + 受詞 + 原形動詞 (使我感到...)。" },
      { c: 3, q: "He looks ____ in that new suit.", o: ["handsome", "handsomely", "more handsomely", "to handsome"], a: 0, e: "連綴動詞 look 後面接形容詞。" },
      { c: 3, q: "We heard them ____ in the next room.", o: ["arguing", "argued", "to argue", "argues"], a: 0, e: "感官動詞 hear + 受詞 + V-ing (聽見正在爭吵)。" },
      { c: 3, q: "I want to have my hair ____ tomorrow.", o: ["cut", "to cut", "cutting", "cuts"], a: 0, e: "have + 物 (hair) + Vp.p. (頭髮是被剪的，cut三態同行)。" },
      { c: 3, q: "You should keep your room ____.", o: ["clean", "to clean", "cleaned", "cleaning"], a: 0, e: "keep + 受詞 + 形容詞 (保持房間乾淨)。" },
      { c: 3, q: "Let's ____ out for dinner tonight.", o: ["go", "to go", "going", "went"], a: 0, e: "Let's (Let us) + 原形動詞。" },
      { c: 3, q: "That sounds ____ a great idea!", o: ["like", "as", "with", "for"], a: 0, e: "sound like + 名詞 (聽起來像... / 是個好主意)。" },
      { c: 3, q: "The coffee tastes too ____. I need some sugar.", o: ["bitter", "bitterly", "bitterness", "to bitter"], a: 0, e: "連綴動詞 taste + 形容詞 (bitter 苦的)。" },
      { c: 3, q: "Have you noticed him ____ the office?", o: ["leave", "left", "to leave", "leaves"], a: 0, e: "notice (注意) 也是感官動詞，後接原形動詞或 V-ing。" },
      { c: 3, q: "The bad news made him ____.", o: ["sad", "sadly", "sadness", "to sad"], a: 0, e: "make + 受詞 + 形容詞 (使他感到傷心)。" },
      { c: 3, q: "He got his wallet ____ on the bus.", o: ["stolen", "steal", "stealing", "to steal"], a: 0, e: "get + 物 + Vp.p. (遭受... / 讓錢包被偷了)。" },
      { c: 3, q: "They listened to the girl ____ a song.", o: ["sing", "to sing", "sang", "sings"], a: 0, e: "listen to (感官動詞) + 受詞 + 原形動詞/V-ing。" },
      { c: 3, q: "The weather is becoming ____.", o: ["warmer", "warmly", "to warm", "warmth"], a: 0, e: "become (變成) 連綴動詞 + 比較級形容詞。" },
      { c: 3, q: "Please leave the door ____.", o: ["open", "to open", "opened", "opening"], a: 0, e: "leave + 受詞 + 形容詞 (讓門保持開著的狀態)。open 在此為形容詞。" },

      // 5. 花費動詞 (spend, take, cost, pay)
      { c: 4, q: "Mom: How much did you ____ for this new jacket? It looks really expensive.\nSon: It's not that bad. I got it on sale for only 800 NT dollars.", o: ["spend", "take", "cost", "pay"], a: 3, e: "對話情境題。主詞是 you (人)，搭配介系詞 for，表示為某物付錢，用 pay。" },
      { c: 4, q: "Lisa: I really want to buy that smartphone, but it ____ too much money. I don't have enough savings.\nDad: Maybe you can save your allowance for a few more months.", o: ["spends", "takes", "costs", "pays"], a: 2, e: "主詞是 it (代稱手機，為事物)，花費金錢用 costs。" },
      { c: 4, q: "Tom: Writing this science report ____ me almost three days. I'm so exhausted.\nTeacher: But you did a great job! Your hard work paid off.", o: ["spent", "took", "cost", "paid"], a: 1, e: "動名詞 Writing... 作主詞視為事物，花費時間用 took (過去式)。" },
      { c: 4, q: "Clerk: How would you like to ____ for the groceries, sir? In cash or by credit card?\nCustomer: I'll use my credit card, please.", o: ["spend", "take", "cost", "pay"], a: 3, e: "搭配介系詞 for，且主詞是 you，用 pay。" },
      { c: 4, q: "Wife: You shouldn't ____ so much time playing video games on weekends.\nHusband: You're right. I'll take the kids to the park this afternoon.", o: ["spend", "take", "cost", "pay"], a: 0, e: "主詞是 You (人)，花費時間且後面接 V-ing (playing)，用 spend。" },
      { c: 4, q: "Tourist: Excuse me, how long does it ____ to walk from here to the national museum?\nPolice: About fifteen minutes if you walk fast.", o: ["spend", "take", "cost", "pay"], a: 1, e: "How long 問時間長度，且主詞為虛主詞 it，用 take。" },
      { c: 4, q: "Friend A: Did you hear about Kevin? He ____ a fortune on his new sports car.\nFriend B: Yeah, he has been saving up for years just to get it.", o: ["spent", "took", "cost", "paid"], a: 0, e: "主詞是 He (人)，搭配介系詞 on，花費金錢用 spend (過去式 spent)。" },
      { c: 4, q: "Husband: Buying this house will ____ us a lot of money, but it's worth it for our family.\nWife: I agree. The location is perfect.", o: ["spend", "take", "cost", "pay"], a: 2, e: "動名詞 Buying... 作主詞視為事物，花費金錢用 cost。" },

      { c: 4, q: "Customer: I love this dress, but I only have 500 dollars with me.\nClerk: I'm sorry, miss. It will ____ you 800 dollars.", o: ["spend", "take", "cost", "pay"], a: 2, e: "主詞是 It (代稱洋裝)，花費某人多少錢用 cost。" },

      { c: 6, q: "Mom: Let's order some pizza for dinner tonight, ____?\nKids: Yeah! We love pizza!", o: ["will you", "shall we", "do we", "don't we"], a: 1, e: "Let's (讓我們一起...) 開頭的祈使句，附加問句固定使用 shall we?。" },
      { c: 6, q: "Wife: Honey, remember to pick up the kids after school. Don't be late again, ____?\nHusband: Don't worry, I've set an alarm.", o: ["do you", "don't you", "will you", "shall we"], a: 2, e: "否定祈使句 (Don't...) 的附加問句，一律只能使用 will you?。" },
      { c: 6, q: "Friend A: I've never been to Europe. I really want to visit Paris someday.\nFriend B: ____. Maybe we can go together next year.", o: ["So have I", "Neither have I", "So do I", "Neither do I"], a: 1, e: "附和句：前面是完成式的否定 (never been)，需用 Neither 附和，並沿用助動詞 have。" },
      { c: 6, q: "Jack: There is nothing wrong with the computer, ____? It just suddenly shut down.\nTechnician: Let me check the battery first.", o: ["is it", "isn't it", "is there", "isn't there"], a: 2, e: "There 句型的附加問句主詞要沿用 there。nothing 是否定字，故後面用肯定 is there?。" },
      { c: 6, q: "Student: Teacher, the bell has rung. Let us go out and play, ____?\nTeacher: Okay, but don't run in the hallway.", o: ["shall we", "will you", "do you", "don't we"], a: 1, e: "會考陷阱題！Let us (請求允許我們去...)，這是在請求對方同意，附加問句要用 will you? (和 Let's 的 shall we 不同)。" },
      { c: 6, q: "Student A: I am really bad at math. I failed the test again.\nStudent B: ____. We should ask the teacher for help.", o: ["So do I", "Neither do I", "So am I", "Neither am I"], a: 2, e: "附和句：前面是 be 動詞的肯定句 (I am...)，需用 So 附和，並沿用 be 動詞 am。" },
      { c: 6, q: "Sister: Nobody called me while I was taking a shower, ____?\nBrother: No, the phone didn't ring at all.", o: ["did he", "didn't he", "did they", "didn't they"], a: 2, e: "Nobody 表否定，後用肯定。Nobody 的代名詞習慣用 they。過去式用助動詞 did。" },
      { c: 6, q: "Friend A: Tom seldom hangs out with us recently, ____?\nFriend B: Yeah, he is preparing for his final exams.", o: ["doesn't he", "does he", "isn't he", "is he"], a: 1, e: "seldom (很少) 是隱性否定字，所以前面算否定句，附加問句要用肯定 does he?。" },
      { c: 6, q: "Clerk: You used to live in Taichung before you moved here, ____?\nCustomer: Yes, I lived there for ten years.", o: ["didn't you", "don't you", "aren't you", "weren't you"], a: 0, e: "used to (過去習慣) 視為過去式一般動詞，附加問句使用 didn't you?。" },
      { c: 6, q: "Student: I have to turn in the report before Friday, ____?\nTeacher: That's right. No late submissions will be accepted.", o: ["haven't I", "don't I", "do I", "have I"], a: 1, e: "have to (必須) 是一般動詞片語，否定與附加問句要用助動詞 don't (don't I?)。" },
      { c: 6, q: "Mom: There is a little milk left in the fridge, ____? I need some for my coffee.\nSon: Yes, but only a little bit.", o: ["is it", "isn't it", "is there", "isn't there"], a: 3, e: "a little (有一些) 屬肯定語氣，前半為肯定，故後用否定 isn't there?。" },
      { c: 6, q: "Brother: Pass me the salt, ____? This soup is a bit tasteless.\nSister: Here you go. Don't put too much.", o: ["do you", "don't you", "will you", "shall we"], a: 2, e: "肯定祈使句的附加問句，習慣使用 will you? (或 won't/would you)。" },
      { c: 6, q: "Friend A: I can hardly see the words on the blackboard from the back row.\nFriend B: ____. We should ask the teacher to write larger.", o: ["So can I", "Neither can I", "So do I", "Neither do I"], a: 1, e: "hardly (幾乎不) 是隱性否定字，需用 Neither 附和。前面有助動詞 can，後面沿用 can。" },
      { c: 6, q: "Guest: This soup tastes a little too salty, ____?\nWaiter: I'm sorry, sir. I'll ask the chef to make a new one for you.", o: ["isn't it", "doesn't it", "is it", "does it"], a: 1, e: "tastes 是一般動詞，主詞 This soup 視為 it，附加問句需用助動詞 doesn't it?。" },
      { c: 6, q: "Wife: You'd better go to bed right now, ____? You look totally exhausted.\nHusband: Yeah, it's been a long day.", o: ["wouldn't you", "hadn't you", "don't you", "didn't you"], a: 1, e: "You'd better 是 You had better 的縮寫，附加問句固定使用 hadn't you?。" },
      { c: 6, q: "Dad: Open the window to let some fresh air in, ____?\nSon: Sure, Dad. It is a bit stuffy in here.", o: ["do you", "don't you", "will you", "shall we"], a: 2, e: "祈使句的附加問句一律用 will you?。" },
      { c: 6, q: "Friend A: I didn't watch the soccer game last night. I was too tired.\nFriend B: ____. I fell asleep right after dinner.", o: ["So did I", "Neither did I", "So was I", "Neither was I"], a: 1, e: "否定句附和用 Neither。前面有助動詞 didn't，後面沿用 did 進行倒裝 (Neither did I)。" },
      { c: 6, q: "Teacher: Few students understand this difficult math concept, ____?\nStudent: It's really hard. Could you explain it again?", o: ["do they", "don't they", "did they", "didn't they"], a: 0, e: "Few (幾乎沒有) 是隱性否定字，前半為否定，後接肯定 do they? (students 複數用 they)。" },
      { c: 6, q: "Lisa: I'm the best runner in our class, ____?\nCoach: Yes, your record is unbeatable so far.", o: ["am not I", "aren't I", "am I", "are I"], a: 1, e: "I am ... 的否定附加問句，為發音方便，英文習慣上固定使用 aren't I?。" },
      { c: 6, q: "You have to finish it today, ____?", o: ["haven't you", "don't you", "do you", "have you"], a: 1, e: "have to (必須) 視為一般動詞片語，否定或附加問句需用助動詞 don't。" },
      { c: 6, q: "She rarely goes to the movies, ____?", o: ["does she", "doesn't she", "is she", "isn't she"], a: 0, e: "rarely (罕見地) 是隱性否定字，前半句為否定，附加問句需用肯定 does she。" },
      { c: 6, q: "Let us go to the park, ____?", o: ["shall we", "will you", "do we", "don't we"], a: 1, e: "Let us (允許我們...) 的附加問句用 will you?；Let's (讓我們一起...) 才用 shall we?。" },
      { c: 6, q: "I am the tallest in my class, ____?", o: ["am not I", "aren't I", "am I", "are I"], a: 1, e: "I am ... 的否定附加問句，習慣上固定使用 aren't I?。" },
      { c: 6, q: "He'd better leave right now, ____?", o: ["wouldn't he", "hadn't he", "didn't he", "doesn't he"], a: 1, e: "He'd better 是 He had better 的縮寫，附加問句用 hadn't he?。" },
      { c: 6, q: "They'd like to join us, ____?", o: ["hadn't they", "wouldn't they", "didn't they", "don't they"], a: 1, e: "They'd like 是 They would like 的縮寫，附加問句用 wouldn't they?。" },
      { c: 6, q: "That is your new bike, ____?", o: ["isn't that", "is it", "isn't it", "is that"], a: 2, e: "主詞為 That 或 This 時，附加問句的代名詞一律用 it。" },
      { c: 6, q: "Those are my books, ____?", o: ["aren't those", "are they", "aren't they", "are those"], a: 2, e: "主詞為 These 或 Those 時，附加問句的代名詞一律用 they。" },
      { c: 6, q: "There will be a concert tonight, ____?", o: ["won't it", "will there", "won't there", "will it"], a: 2, e: "There 句型的附加問句，主詞沿用 there。will be 否定為 won't be。" },
      { c: 6, q: "Nothing is wrong, ____?", o: ["isn't it", "is it", "aren't they", "are they"], a: 1, e: "Nothing 為否定字且視為單數事物(it)，故後接肯定 is it?。" },
      { c: 6, q: "Nobody knows the answer, ____?", o: ["do they", "don't they", "does he", "doesn't he"], a: 0, e: "Nobody 為否定字，代名詞習慣用 they，故後接肯定 do they?。" },
      { c: 6, q: "Someone left the door open, ____?", o: ["didn't he", "did they", "didn't they", "did he"], a: 2, e: "Someone 代名詞習慣用 they。過去式 left，用助動詞 didn't。" },
      { c: 6, q: "Pass me the salt, ____?", o: ["do you", "don't you", "will you", "shall we"], a: 2, e: "肯定祈使句的附加問句一律用 will you? (或 won't you/would you)。" },
      { c: 6, q: "Don't be late again, ____?", o: ["will you", "do you", "are you", "won't you"], a: 0, e: "否定祈使句的附加問句一律只能用 will you?。" },
      { c: 6, q: "Mary can hardly speak French, ____?", o: ["can't she", "can she", "does she", "doesn't she"], a: 1, e: "hardly (幾乎不) 是否定字，前半為否定，後用肯定 can she?。" },
      { c: 6, q: "You used to live here, ____?", o: ["don't you", "didn't you", "aren't you", "weren't you"], a: 1, e: "used to (過去習慣) 視為過去式一般動詞，附加問句用 didn't you?。" },
      { c: 6, q: "I love playing chess. - ____", o: ["So do I.", "Neither do I.", "So am I.", "Neither am I."], a: 0, e: "肯定附和用 So。love 為一般動詞，助動詞用 do。" },
      { c: 6, q: "He was very angry, and ____.", o: ["so was she", "neither was she", "so did she", "neither did she"], a: 0, e: "肯定附和，前面有 be 動詞 was，後面沿用 was。" },
      { c: 6, q: "They haven't seen the movie. - ____", o: ["So have I.", "Neither have I.", "So do I.", "Neither do I."], a: 1, e: "否定附和用 Neither。前面有 haven't，後面沿用 have。" },
      { c: 6, q: "John didn't pass the exam, and ____.", o: ["so did Tom", "neither did Tom", "neither Tom did", "so Tom did"], a: 1, e: "否定附和用 neither + 倒裝 (助動詞+主詞)。" },
      { c: 6, q: "I won't go to the party tonight. - ____", o: ["So will I.", "Neither will I.", "So do I.", "Neither do I."], a: 1, e: "won't (will not) 是否定，附和用 Neither will I.。" },
      { c: 6, q: "She has a lot of friends, and ____.", o: ["so do I", "so have I", "neither do I", "neither have I"], a: 0, e: "has 在此為一般動詞 (擁有)，肯定附和用 so do I。" },
      { c: 6, q: "He has been to Japan, and ____.", o: ["so has I", "so have I", "so do I", "neither have I"], a: 1, e: "has 在此為完成式的助動詞，肯定附和沿用 have/has。" },
      { c: 6, q: "My mom shouldn't work too late, and ____.", o: ["neither should yours", "so should yours", "neither yours should", "so yours should"], a: 0, e: "否定附和，沿用情態助動詞 should。yours = your mom。" },
      { c: 6, q: "Few students passed the math test, ____?", o: ["didn't they", "did they", "don't they", "do they"], a: 1, e: "Few (幾乎沒有) 是否定字，前半為否定，後用肯定 did they?。" },
      { c: 6, q: "A little water is left in the bottle, ____?", o: ["is it", "isn't it", "has it", "hasn't it"], a: 1, e: "A little (有一些) 是肯定，前半為肯定，後用否定 isn't it? (water不可數代名詞用it)。" },
      { c: 6, q: "She needs to practice more, ____?", o: ["doesn't she", "needn't she", "isn't she", "does she"], a: 0, e: "needs to 在此為一般動詞，附加問句用 doesn't she?。" },
      { c: 6, q: "He seldom eats fast food, ____?", o: ["does he", "doesn't he", "is he", "isn't he"], a: 0, e: "seldom (很少) 是隱性否定字，後半需用肯定 does he?。" },
      { c: 6, q: "Let's have a picnic this weekend, ____?", o: ["will you", "shall we", "do we", "don't we"], a: 1, e: "Let's 開頭的祈使句，附加問句固定用 shall we?。" },
      { c: 6, q: "There is little milk in the fridge, ____?", o: ["is there", "isn't there", "is it", "isn't it"], a: 0, e: "little (幾乎沒有) 是否定字，前半為否定，後用肯定 is there?。" },

      // 8. 代名詞與介系詞
      { c: 7, q: "Customer: I don't like this black shirt. Do you have ____ one in white?\nClerk: Yes, please wait a moment. I'll get it for you.", o: ["another", "other", "the other", "others"], a: 0, e: "情境對話題。another 表示三者或以上中的「任意另一個」，顧客想看別的(沒有特定是哪一件)白襯衫。" },
      { c: 7, q: "Teacher: Look at the picture. There are three apples on the table. One is red, another is green, and ____ is yellow.", o: ["other", "the other", "others", "another"], a: 1, e: "限定範圍(三顆蘋果)中的「最後一個」，必須加上定冠詞 the (the other)。" },
      { c: 7, q: "Interviewer: Could you tell our readers when you were born?\nActor: Sure. I was born ____ May, 1990 in a beautiful small town.", o: ["in", "on", "at", "of"], a: 0, e: "在某個「月份、年份、季節」，介系詞一律使用 in (in May)。" },
      { c: 7, q: "Secretary: When will the general manager arrive?\nAssistant: The meeting starts ____ 9:00 AM, so he should be here very soon.", o: ["in", "on", "at", "for"], a: 2, e: "明確的「時鐘時間點」，介系詞使用 at (at 9:00 AM)。" },
      { c: 7, q: "Tourist: Excuse me, how can I get to the national museum?\nGuide: You can go there ____ train. It's very fast and convenient.", o: ["in", "on", "by", "with"], a: 2, e: "搭乘交通工具，介系詞使用 by (by train/bus/car/boat)。" },
      { c: 7, q: "Mom: Are you going to ride your bike to school today?\nSon: No, it's raining outside. I think I will go to school ____ foot with my umbrella.", o: ["in", "by", "with", "on"], a: 3, e: "步行 (on foot) 是固定用法，不可用 by walk 或 by foot。" },
      { c: 7, q: "Teacher: What are your classmates doing during the break?\nStudent: Some of them are playing basketball outside, and ____ are reading books in the library.", o: ["another", "other", "the other", "others"], a: 3, e: "Some... others... (一些人... 其他一些人...)，用於無特定總數範圍的群體分類。" },
      { c: 7, q: "Brother: Look ____ the sky! It's getting so dark.\nSister: Let's hurry up and go home before it starts to rain.", o: ["in", "on", "at", "to"], a: 2, e: "look at + 目標 (注視著...)。" },
      { c: 7, q: "Teacher: Why do you want to be a doctor when you grow up?\nStudent: Because ____ of my parents are doctors, and they help a lot of people.", o: ["All", "Both", "Each", "Two"], a: 1, e: "Both 指「兩者都...」(雙親只有兩位)。All 用於三者或以上。" },
      { c: 7, q: "Reporter: Why do so many foreign tourists love visiting Taiwan?\nChef: Taiwan is famous ____ its delicious street food and friendly people.", o: ["as", "for", "to", "by"], a: 1, e: "be famous for (因為...特質/事物而聞名)。be famous as 是「作為...身分而聞名」。" },
      { c: 7, q: "Husband: Honey, what are you doing under the sofa?\nWife: I am looking ____ my car keys. I can't find them anywhere.", o: ["at", "for", "after", "into"], a: 1, e: "look for (尋找)。look after 是照顧，look into 是調查。" },
      { c: 7, q: "Student: Thank you so much ____ your help with my math homework. I finally understand it.\nTeacher: You're very welcome.", o: ["for", "to", "with", "of"], a: 0, e: "Thank someone for something (因為某事而感謝某人)。" },
      { c: 7, q: "Grandson: Wow! This big box is full ____ old toys.\nGrandma: Yes, those were your father's favorite toys when he was little.", o: ["with", "of", "in", "by"], a: 1, e: "be full of (充滿著...) = be filled with。" },
      { c: 7, q: "Child: Can I pet that big dog over there?\nParent: No, don't go near it. Aren't you afraid ____ dogs?", o: ["for", "with", "of", "at"], a: 2, e: "be afraid of (害怕...) 為固定介系詞搭配。" },
      { c: 7, q: "Customer: This new smartphone is quite different ____ the old model I bought last year.\nClerk: Yes, it has a much better camera and battery life.", o: ["with", "from", "to", "than"], a: 1, e: "be different from (與...不同)。" },
      { c: 7, q: "Student: We are all looking forward ____ the summer vacation next month.\nTeacher: I know, but you have to pass the final exams first.", o: ["in", "on", "to", "at"], a: 2, e: "look forward to (期待...)，此處的 to 為介系詞。" },
      { c: 7, q: "Coach: Jason is very good ____ playing tennis. He might win the championship this year.\nPlayer: Yes, he practices very hard every single day.", o: ["in", "on", "at", "with"], a: 2, e: "be good at + N/V-ing (擅長於...)。" },
      { c: 7, q: "Mom: Don't worry ____ your grades too much. Just do your best.\nSon: Thanks, Mom. I'll study harder for the next test.", o: ["for", "with", "about", "in"], a: 2, e: "worry about (擔心...) 為固定搭配。" },
      { c: 7, q: "Traveler: I checked the weather forecast. The weather in Taipei is usually hotter than ____ in Tokyo during summer.\nFriend: Then we should pack more T-shirts.", o: ["it", "this", "that", "those"], a: 2, e: "會考必考代名詞！為了避免重複，用 that 代替前面提過的單數或不可數名詞 (the weather)。" },
      { c: 7, q: "Sister: I bought a new dress, but I still think his shoes are more expensive than ____ of his brother.\nBrother: Well, they are limited edition.", o: ["that", "those", "these", "ones"], a: 1, e: "用 those 代替前面提過的複數名詞 (shoes)。" },
      { c: 7, q: "____ of the two brothers are doctors.", o: ["All", "Both", "Some", "Most"], a: 1, e: "兩者都...，代名詞用 Both。All 用於三者或以上。" },
      { c: 7, q: "____ of the students in my class wear glasses.", o: ["Much", "Most", "Every", "Another"], a: 1, e: "Most of the + 複數名詞 (大部分的...)。Every 不能加 of。" },
      { c: 7, q: "I have two pens. One is red, and ____ is blue.", o: ["another", "other", "the other", "others"], a: 2, e: "限定兩者之中的另一個，用 the other。" },
      { c: 7, q: "Some people like apples, and ____ like bananas.", o: ["another", "other", "the other", "others"], a: 3, e: "Some... others... (一些人... 其他一些人...)，無特定範圍。" },
      { c: 7, q: "There are five books on the table. Two are mine, and ____ are yours.", o: ["others", "the others", "another", "other"], a: 1, e: "特定範圍(五本)中剩下的全部，用 the others。" },
      { c: 7, q: "I don't like this shirt. Do you have ____ one?", o: ["other", "the other", "another", "others"], a: 2, e: "another 表示三者或以上中的「任意另一個」。" },
      { c: 7, q: "____ of the food on the table is delicious.", o: ["All", "Both", "Many", "Few"], a: 0, e: "food 為不可數名詞，可用 All 修飾 (All of the food)。Both/Many/Few 接可數。" },
      { c: 7, q: "____ of the students has a smartphone.", o: ["All", "Some", "Each", "Many"], a: 2, e: "Each (每一個) 視為單數，故動詞用 has。All/Some/Many 皆配複數動詞 have。" },
      { c: 7, q: "He cut the apple ____ a knife.", o: ["by", "in", "with", "on"], a: 2, e: "表示使用「具體的工具」，介系詞用 with。" },
      { c: 7, q: "I go to school ____ foot every day.", o: ["in", "by", "with", "on"], a: 3, e: "步行 (on foot) 是固定用法。" },
      { c: 7, q: "We traveled to Taipei ____ train.", o: ["in", "on", "by", "with"], a: 2, e: "搭乘交通工具，介系詞用 by (by train/bus/car)。" },
      { c: 7, q: "The meeting starts ____ 9:00 AM.", o: ["in", "on", "at", "for"], a: 2, e: "明確的時鐘時間點，介系詞用 at。" },
      { c: 7, q: "I was born ____ 2008.", o: ["in", "on", "at", "to"], a: 0, e: "在某個年份、月份、季節，介系詞用 in。" },
      { c: 7, q: "They play basketball ____ Sunday mornings.", o: ["in", "on", "at", "of"], a: 1, e: "指定某天的早中晚 (Sunday morning)，介系詞用 on。" },
      { c: 7, q: "He walked ____ the park and saw a beautiful lake.", o: ["through", "across", "above", "over"], a: 0, e: "walk through (穿越有立體空間的地方，如公園、森林)。across 是平面越過。" },
      { c: 7, q: "Look ____ the sky! The birds are flying.", o: ["in", "on", "at", "to"], a: 2, e: "look at (注視...)。" },
      { c: 7, q: "I am looking ____ my lost keys.", o: ["at", "for", "after", "into"], a: 1, e: "look for (尋找)。" },
      { c: 7, q: "We are proud ____ your excellent performance.", o: ["for", "in", "of", "with"], a: 2, e: "be proud of (為...感到驕傲)。" },
      { c: 7, q: "Taiwan is famous ____ its delicious street food.", o: ["as", "for", "to", "by"], a: 1, e: "be famous for (因為...事物而聞名)。" },
      { c: 7, q: "The box is full ____ toys.", o: ["with", "of", "in", "by"], a: 1, e: "be full of (充滿著...) = be filled with。" },
      { c: 7, q: "Are you afraid ____ dogs?", o: ["for", "with", "of", "at"], a: 2, e: "be afraid of (害怕...)。" },
      { c: 7, q: "My house is different ____ yours.", o: ["with", "from", "to", "than"], a: 1, e: "be different from (與...不同)。" },
      { c: 7, q: "She is looking forward ____ the summer vacation.", o: ["in", "on", "to", "at"], a: 2, e: "look forward to (期待...)，此處的 to 為介系詞。" },
      { c: 7, q: "He is good ____ playing the guitar.", o: ["in", "on", "at", "with"], a: 2, e: "be good at (擅長於...)。" },

      { c: 8, q: "Teacher: Look at the twins standing over there. Do you know them?\nMom: Yes, Mary is ____ of the two girls.", o: ["taller", "the taller", "tallest", "the tallest"], a: 1, e: "Of the two... (兩者之中) 是特殊句型，比較級前必須加定冠詞 the (the taller)。" },

      { c: 8, q: "Friend A: The weather is getting hotter and ____. We should really turn on the air conditioner.\nFriend B: Good idea. I'm sweating.", o: ["hot", "hotter", "hottest", "more hot"], a: 1, e: "比較級 and 比較級，表「越來越...」。" },
      { c: 8, q: "Customer: Which smartphone is ____, the black one or the white one?\nClerk: The black one has more storage, so it costs 2,000 dollars more.", o: ["expensive", "more expensive", "most expensive", "the most expensive"], a: 1, e: "兩者做比較 (Which is... A or B)，使用比較級 more expensive。" },
      { c: 8, q: "Doctor: You should exercise more. Health is ____ important than wealth.\nPatient: You are completely right. I'll start jogging tomorrow.", o: ["much", "more", "most", "the most"], a: 1, e: "than 提示比較級，多音節形容詞用 more important。" },
      { c: 8, q: "Reviewer: I highly recommend this film. This is ____ movie I have ever seen in my life!\nFriend: Wow, I definitely have to watch it.", o: ["exciting", "more exciting", "most exciting", "the most exciting"], a: 3, e: "I have ever seen (我看過之中) 提示最高級範圍，用 the most exciting。" },

      { c: 8, q: "Librarian: It's so quiet today. There are ____ students in the library today than yesterday because of the heavy rain.", o: ["less", "little", "few", "fewer"], a: 3, e: "students 是可數名詞，few 的比較級是 fewer。" },
      { c: 8, q: "Customer: This sports car is ____ more expensive than that one. Can you give me a discount?\nClerk: I can talk to my manager.", o: ["a little", "very", "too", "so"], a: 0, e: "a little (一點點) 可以用來修飾比較級 (more expensive)。" },
      { c: 8, q: "Student A: My school bag is not as ____ as yours. What do you have inside?\nStudent B: Just some books and a heavy laptop.", o: ["heavy", "heavier", "heaviest", "heavily"], a: 0, e: "not as + 原級 + as (不如...一樣)。be 動詞後接形容詞 heavy。" },
      { c: 8, q: "Mom: He is the ____ boy in our family, so he always takes good care of his younger brothers and sisters.", o: ["older", "oldest", "elder", "eldest"], a: 1, e: "最高級 the oldest (年紀最大的)。(eldest 亦可，但在國中選擇題中常考 oldest)。" },

      { c: 8, q: "Weather forecaster: Please stay indoors. The weather today is even ____ than yesterday. The typhoon is coming.", o: ["bad", "badder", "worse", "worst"], a: 2, e: "even 修飾比較級，bad 的比較級是不規則的 worse。" },

      { c: 8, q: "Boss: Please speak a little ____. I can't hear you clearly from the back of the meeting room.\nEmployee: Sorry, I will.", o: ["loud", "loudly", "louder", "loudest"], a: 2, e: "a little 修飾比較級 louder (大聲一點)。" },

      { c: 8, q: "She is ____ of the two girls.", o: ["taller", "the taller", "tallest", "the tallest"], a: 1, e: "Of the two... (兩者之中) 是特殊句型，比較級前必須加 the (the taller)。" },

      { c: 8, q: "My bag is not as ____ as yours.", o: ["heavy", "heavier", "heaviest", "heavily"], a: 0, e: "not as + 原級 + as (不如...一樣)。be 動詞後接形容詞 heavy。" },

      { c: 9, q: "How about ____ a movie tonight?", o: ["watch", "watching", "to watch", "watched"], a: 1, e: "about 是介系詞，後面必須接動名詞 V-ing。" },
      { c: 9, q: "I am afraid of ____ mistakes.", o: ["make", "making", "to make", "made"], a: 1, e: "of 是介系詞，後面必須接動名詞 V-ing。" },
      { c: 9, q: "He left without ____ goodbye.", o: ["say", "saying", "to say", "said"], a: 1, e: "without 是介系詞，後面必須接動名詞 V-ing。" },
      { c: 9, q: "Tell him not ____ late again.", o: ["be", "being", "to be", "is"], a: 2, e: "tell sb to V (叫某人去做...)，否定為 tell sb not to V。" },
      { c: 9, q: "My mother asked me ____ my room.", o: ["clean", "cleaning", "to clean", "cleaned"], a: 2, e: "ask sb to V (要求某人去做...)。" },
      { c: 9, q: "Let me ____ you a story.", o: ["tell", "telling", "to tell", "told"], a: 0, e: "Let 是使役動詞，後接原形動詞。" },
      { c: 9, q: "I saw him ____ the street just now.", o: ["cross", "crossed", "to cross", "crosses"], a: 0, e: "saw 是感官動詞，後接原形動詞 (或V-ing)。選項只有 cross 符合。" },
      { c: 9, q: "Thank you for ____ me.", o: ["invite", "inviting", "to invite", "invited"], a: 1, e: "for 是介系詞，後面必須接動名詞 V-ing。" },
      { c: 9, q: "To see is ____.", o: ["believe", "believing", "to believe", "believed"], a: 2, e: "主詞是不定詞(To see)，主詞補語為了對稱也習慣用不定詞(to believe)。" }
    ];

    function App() {
      const [gameState, setGameState] = useState('home'); // 'home', 'quiz', 'result'
      const [currentQuestions, setCurrentQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [userHistory, setUserHistory] = useState([]); 
      const [selectedOption, setSelectedOption] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);
      const [selectedCategoryTitle, setSelectedCategoryTitle] = useState("");

      const startQuiz = (categoryIndex) => {
        let quizSet = [];
        if (categoryIndex === 'all') {
          const shuffled = [...RAW_QUESTIONS].sort(() => 0.5 - Math.random());
          quizSet = shuffled.slice(0, 25);
          setSelectedCategoryTitle("綜合隨機特訓 (25題)");
        } else {
          quizSet = RAW_QUESTIONS.filter(q => q.c === categoryIndex);
          setSelectedCategoryTitle(`${CATEGORIES[categoryIndex]} 特訓`);
        }
        
        setCurrentQuestions(quizSet);
        setCurrentIndex(0);
        setScore(0);
        setUserHistory([]);
        setSelectedOption(null);
        setIsAnswered(false);
        setGameState('quiz');
      };

      const handleSelectOption = (index) => {
        if (isAnswered) return;
        setSelectedOption(index);
        setIsAnswered(true);
        
        const currentQ = currentQuestions[currentIndex];
        const isCorrect = index === currentQ.a;
        
        if (isCorrect) setScore(prev => prev + 1);
        
        setUserHistory(prev => [...prev, {
          question: currentQ.q,
          options: currentQ.o,
          correctAnswer: currentQ.a,
          userAnswer: index,
          explanation: currentQ.e,
          categoryName: CATEGORIES[currentQ.c]
        }]);
      };

      const nextQuestion = () => {
        if (currentIndex + 1 < currentQuestions.length) {
          setCurrentIndex(prev => prev + 1);
          setSelectedOption(null);
          setIsAnswered(false);
        } else {
          setGameState('result');
        }
      };

      if (gameState === 'home') {
        return (
          <div className="min-h-screen p-4 md:p-8">
            <div className="max-w-4xl mx-auto">
              <header className="mb-10 text-center mt-6">
                <h1 className="text-3xl md:text-4xl font-bold text-indigo-700 mb-3 flex items-center justify-center gap-3">
                  <IconBookOpen size={36} />
                  國中英文文法特訓系統
                </h1>
                <p className="text-slate-500">涵蓋 B1~B6 必考核心文法，共 500 題會考級精選題庫</p>
              </header>

              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div 
                  onClick={() => startQuiz('all')}
                  className="col-span-1 md:col-span-2 lg:col-span-3 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl p-6 text-white cursor-pointer shadow-lg hover:shadow-xl transition-transform hover:-translate-y-1"
                >
                  <h2 className="text-2xl font-bold mb-2 flex items-center gap-2">
                    <IconAward size={28} /> 綜合隨機測驗 (25題)
                  </h2>
                  <p className="opacity-90">從所有單元中隨機挑選 25 題（每題 4 分，滿分 100 分），測驗並統計你的弱點單元！</p>
                </div>

                {CATEGORIES.map((cat, idx) => (
                  <div 
                    key={idx} 
                    onClick={() => startQuiz(idx)}
                    className="bg-white rounded-xl p-5 border border-slate-200 shadow-sm hover:shadow-md cursor-pointer transition-all hover:border-indigo-300 group"
                  >
                    <div className="flex justify-between items-center mb-2">
                      <h3 className="font-bold text-lg text-slate-700 group-hover:text-indigo-600 transition-colors">{cat}</h3>
                      <span className="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2 py-1 rounded-full">
                        50 題
                      </span>
                    </div>
                    <div className="flex items-center text-sm text-slate-500 mt-4 group-hover:text-indigo-500 transition-colors">
                      開始練習 <IconChevronRight size={16} className="ml-1" />
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'quiz') {
        const currentQ = currentQuestions[currentIndex];
        const progress = ((currentIndex) / currentQuestions.length) * 100;

        return (
          <div className="min-h-screen p-4 flex flex-col items-center pt-10 md:pt-20">
            <div className="w-full max-w-2xl">
              <div className="flex justify-between items-center mb-4">
                <button onClick={() => setGameState('home')} className="text-slate-500 hover:text-indigo-600 flex items-center text-sm font-medium transition-colors">
                  <IconHome size={16} className="mr-1" /> 回首頁
                </button>
                <span className="text-sm font-bold text-indigo-600 bg-indigo-100 px-3 py-1 rounded-full">
                  {selectedCategoryTitle}
                </span>
                <span className="text-sm font-medium text-slate-500">
                  {currentIndex + 1} / {currentQuestions.length}
                </span>
              </div>
              
              <div className="w-full bg-slate-200 rounded-full h-2.5 mb-8 overflow-hidden">
                <div className="bg-indigo-600 h-2.5 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
              </div>

              <div className="bg-white rounded-2xl shadow-lg p-6 md:p-10 border border-slate-100">
                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">
                  {CATEGORIES[currentQ.c]}
                </span>
                <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-8 leading-relaxed whitespace-pre-line">
                  {currentQ.q}
                </h2>

                <div className="space-y-3">
                  {currentQ.o.map((opt, idx) => {
                    let btnStyle = "bg-slate-50 border-slate-200 text-slate-700 hover:bg-indigo-50 hover:border-indigo-300";
                    
                    if (isAnswered) {
                      if (idx === currentQ.a) {
                        btnStyle = "bg-emerald-50 border-emerald-500 text-emerald-700";
                      } else if (idx === selectedOption) {
                        btnStyle = "bg-rose-50 border-rose-500 text-rose-700";
                      } else {
                        btnStyle = "bg-slate-50 border-slate-200 text-slate-400 opacity-60";
                      }
                    }

                    return (
                      <button
                        key={idx}
                        onClick={() => handleSelectOption(idx)}
                        disabled={isAnswered}
                        className={`w-full text-left p-4 rounded-xl border-2 font-medium transition-all duration-200 flex justify-between items-center ${btnStyle}`}
                      >
                        <span>{String.fromCharCode(65 + idx)}. {opt}</span>
                        {isAnswered && idx === currentQ.a && <IconCheckCircle className="text-emerald-500" size={20} />}
                        {isAnswered && idx === selectedOption && idx !== currentQ.a && <IconXCircle className="text-rose-500" size={20} />}
                      </button>
                    );
                  })}
                </div>

                {isAnswered && (
                  <div className="mt-8 transition-opacity duration-500">
                    <div className={`p-5 rounded-xl border ${selectedOption === currentQ.a ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`}>
                      <h3 className={`font-bold flex items-center gap-2 mb-2 ${selectedOption === currentQ.a ? 'text-emerald-700' : 'text-rose-700'}`}>
                        {selectedOption === currentQ.a ? <IconCheckCircle size={20} /> : <IconAlertCircle size={20} />}
                        {selectedOption === currentQ.a ? '答對了！' : '答錯了！'}
                      </h3>
                      <p className="text-slate-700 text-sm leading-relaxed">
                        <span className="font-bold mr-2">解析：</span>{currentQ.e}
                      </p>
                    </div>
                    
                    <button
                      onClick={nextQuestion}
                      className="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-md hover:shadow-lg"
                    >
                      {currentIndex + 1 === currentQuestions.length ? '查看測驗結果' : '下一題'} <IconArrowRight size={20} />
                    </button>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'result') {
        const percentage = Math.round((score / currentQuestions.length) * 100);
        const incorrectAnswers = userHistory.filter(h => h.userAnswer !== h.correctAnswer);

        // 統計錯題分布
        const mistakeStats = incorrectAnswers.reduce((acc, curr) => {
          acc[curr.categoryName] = (acc[curr.categoryName] || 0) + 1;
          return acc;
        }, {});
        const sortedMistakeStats = Object.entries(mistakeStats).sort((a, b) => b[1] - a[1]);

        return (
          <div className="min-h-screen p-4 py-10 md:py-16">
            <div className="max-w-3xl mx-auto">
              <div className="bg-white rounded-3xl shadow-xl overflow-hidden mb-8 text-center border border-slate-100">
                <div className="bg-gradient-to-r from-indigo-500 to-purple-600 p-8 text-white">
                  <h2 className="text-2xl font-bold mb-2">測驗完成！</h2>
                  <p className="opacity-90">{selectedCategoryTitle}</p>
                </div>
                <div className="p-10">
                  <div className="relative inline-flex items-center justify-center mb-6">
                    <svg className="w-40 h-40 transform -rotate-90">
                      <circle cx="80" cy="80" r="70" stroke="currentColor" strokeWidth="12" fill="transparent" className="text-slate-100" />
                      <circle 
                        cx="80" cy="80" r="70" stroke="currentColor" strokeWidth="12" fill="transparent" 
                        strokeDasharray="440" strokeDashoffset={440 - (440 * percentage) / 100}
                        className={`${percentage >= 80 ? 'text-emerald-500' : percentage >= 60 ? 'text-amber-500' : 'text-rose-500'} transition-all duration-1000 ease-out`} 
                      />
                    </svg>
                    <div className="absolute flex flex-col items-center justify-center text-4xl font-black text-slate-700">
                      {percentage}<span className="text-lg text-slate-400">分</span>
                    </div>
                  </div>
                  <p className="text-xl font-medium text-slate-600 mb-8">
                    答對 {score} 題 / 共 {currentQuestions.length} 題
                  </p>

                  {/* 弱點分析：統計錯題分布 */}
                  {incorrectAnswers.length > 0 && (
                    <div className="mb-8 bg-amber-50 rounded-2xl p-6 border border-amber-200 text-left">
                      <h3 className="text-lg font-bold text-amber-800 mb-4 flex items-center gap-2">
                        <IconAlertCircle size={24} /> 弱點分析：錯題單元分布
                      </h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {sortedMistakeStats.map(([cat, count], idx) => (
                          <div key={idx} className="flex justify-between items-center bg-white p-3 rounded-xl border border-amber-100 shadow-sm">
                            <span className="font-medium text-slate-700">{cat}</span>
                            <span className="bg-rose-100 text-rose-700 font-bold px-3 py-1 rounded-full text-sm">
                              錯 {count} 題
                            </span>
                          </div>
                        ))}
                      </div>
                      <p className="text-sm text-amber-700 mt-4">💡 建議可以針對上述單元，回到首頁進行該單元的特訓加強喔！</p>
                    </div>
                  )}
                  
                  <div className="flex flex-col sm:flex-row gap-4 justify-center">
                    <button 
                      onClick={() => setGameState('home')}
                      className="px-8 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors flex items-center justify-center gap-2"
                    >
                      <IconHome size={20} /> 回首頁
                    </button>
                    <button 
                      onClick={() => startQuiz(selectedCategoryTitle.includes('綜合') ? 'all' : CATEGORIES.indexOf(selectedCategoryTitle.replace(' 特訓', '')))}
                      className="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-colors shadow-md hover:shadow-lg flex items-center justify-center gap-2"
                    >
                      <IconRotateCcw size={20} /> 再測一次
                    </button>
                  </div>
                </div>
              </div>

              {incorrectAnswers.length > 0 ? (
                <div>
                  <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <IconAlertCircle className="text-rose-500" size={28} /> 錯題訂正 ({incorrectAnswers.length} 題)
                  </h3>
                  <div className="space-y-4">
                    {incorrectAnswers.map((item, idx) => (
                      <div key={idx} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <span className="text-xs font-bold text-indigo-500 uppercase tracking-wider mb-2 block">
                          {item.categoryName}
                        </span>
                        <p className="font-bold text-slate-800 mb-4 text-lg">{item.question}</p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4 text-sm">
                          <div className="flex items-start gap-2 p-3 bg-rose-50 rounded-lg text-rose-700 border border-rose-100">
                            <IconXCircle size={18} className="mt-0.5 shrink-0" />
                            <div>
                              <div className="font-bold mb-1">你的答案</div>
                              {item.options[item.userAnswer]}
                            </div>
                          </div>
                          <div className="flex items-start gap-2 p-3 bg-emerald-50 rounded-lg text-emerald-700 border border-emerald-100">
                            <IconCheckCircle size={18} className="mt-0.5 shrink-0" />
                            <div>
                              <div className="font-bold mb-1">正確答案</div>
                              {item.options[item.correctAnswer]}
                            </div>
                          </div>
                        </div>
                        
                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-100 text-sm text-slate-600">
                          <span className="font-bold text-slate-700 mr-2">解析：</span>{item.explanation}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="text-center py-10">
                  <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-100 text-emerald-600 mb-4">
                    <IconAward size={32} />
                  </div>
                  <h3 className="text-xl font-bold text-slate-800">太棒了！全對！</h3>
                  <p className="text-slate-500 mt-2">你的文法觀念非常清楚，繼續保持！</p>
                </div>
              )}
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
