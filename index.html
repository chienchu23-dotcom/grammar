      { c: 5, q: "**The result** of the game was **____**. We lost.", o: ["disappointing", "disappointed", "disappoint", "disappoints"], a: 0, e: "【關鍵判斷】**The result (事物)**\n【解題思維】結果(事物)令人失望，修飾事物用 V-ing 結尾的 **disappointing**。" },
      { c: 5, q: "**My parents are ____ about** my health.", o: ["worried", "worrying", "worry", "worries"], a: 0, e: "【關鍵判斷】**parents (人)** 與介系詞 **about**\n【解題思維】人感到擔憂用 V-ed。固定句型為 **be worried about**。" },
      { c: 5, q: "**The magic trick** is **____**. How did he do that?", o: ["amazing", "amazed", "amaze", "amazes"], a: 0, e: "【關鍵判斷】**trick (事物)**\n【解題思維】魔術(事物)令人驚奇，修飾事物用 V-ing 結尾的 **amazing**。" },
      { c: 5, q: "**The loud noise** is very **____**.", o: ["annoying", "annoyed", "annoy", "annoys"], a: 0, e: "【關鍵判斷】**noise (事物)**\n【解題思維】噪音(事物)令人煩躁，修飾事物用 V-ing 結尾的 **annoying**。" },
      { c: 5, q: "**He is ____** to see his old friend again.", o: ["pleased", "pleasing", "please", "pleases"], a: 0, e: "【關鍵判斷】**He is (人)**\n【解題思維】人感到愉悅/高興用 V-ed 結尾的 **pleased**。" },
      { c: 5, q: "**The story** she told was quite **____**.", o: ["interesting", "interested", "interest", "interests"], a: 0, e: "【關鍵判斷】**The story (事物)**\n【解題思維】故事(事物)令人感興趣，修飾事物用 V-ing 結尾的 **interesting**。" },
      { c: 5, q: "**Don't be ____**. Everything will be fine.", o: ["worried", "worrying", "worry", "worries"], a: 0, e: "【關鍵判斷】**祈使句 (對人說)**\n【解題思維】叫人不要感到擔憂，修飾人的情緒用 V-ed 結尾的 **worried**。" },
      { c: 5, q: "**It is ____** to hear that you passed the exam.", o: ["exciting", "excited", "excite", "excites"], a: 0, e: "【關鍵判斷】**It (虛主詞/事物)**\n【解題思維】It 代替後面 to hear... 這件事，事物令人興奮用 V-ing 結尾的 **exciting**。" },
      { c: 5, q: "**I was ____** to find my bike missing.", o: ["shocked", "shocking", "shock", "shocks"], a: 0, e: "【關鍵判斷】**I was (人)**\n【解題思維】人感到震驚用 V-ed 結尾的 **shocked**。" },
      { c: 5, q: "**The roller coaster ride** was very **____**.", o: ["thrilling", "thrilled", "thrill", "thrills"], a: 0, e: "【關鍵判斷】**ride (事物)**\n【解題思維】雲霄飛車(事物)令人刺激/毛骨悚然，修飾事物用 V-ing 結尾的 **thrilling**。" },
      { c: 5, q: "**He was ____** by the difficult questions.", o: ["confused", "confusing", "confuse", "confuses"], a: 0, e: "【關鍵判斷】**He was (人)** 與 **by**\n【解題思維】人感到困惑用 V-ed 結尾的 **confused**。" },
      { c: 5, q: "**The little girl was ____ of** the dark.", o: ["terrified", "terrifying", "terrify", "terrifies"], a: 0, e: "【關鍵判斷】**girl (人)** 與介系詞 **of**\n【解題思維】人感到害怕/恐懼用 V-ed。固定句型為 **be terrified of**。" },
      { c: 5, q: "**The view** from the mountain top is **____**.", o: ["amazing", "amazed", "amaze", "amazes"], a: 0, e: "【關鍵判斷】**The view (事物)**\n【解題思維】風景(事物)令人驚嘆，修飾事物用 V-ing 結尾的 **amazing**。" },
      { c: 5, q: "**The boy was ____** to tears by the movie.", o: ["moved", "moving", "move", "moves"], a: 0, e: "【關鍵判斷】**The boy was (人)**\n【解題思維】人被感動落淚用 V-ed 結尾的 **moved** (moved to tears)。" },

      // 7. 句型結構
      { c: 6, q: "Teacher: You **have finished** reading the assigned novel, **____**?\nStudent: Yes, I finished it last night. It was a great story.", o: ["have you", "haven't you", "do you", "don't you"], a: 1, e: "【關鍵判斷】**have finished (現在完成式)** 的肯定句\n【解題思維】附加問句規則：前肯定、後否定。前半句是現在完成式 (have + Vp.p.)，後面的附加問句必須沿用助動詞 have，並改成否定縮寫 **haven't you**。" },
      { c: 6, q: "Mom: **Let's** order some pizza for dinner tonight, **____**?\nKids: Yeah! We love pizza!", o: ["will you", "shall we", "do we", "don't we"], a: 1, e: "【關鍵判斷】**Let's (讓我們一起...)**\n【解題思維】會考超常考！Let's (= Let us) 表示提議「讓我們一起去做某事」，其附加問句固定使用 **shall we?**。" },
      { c: 6, q: "Wife: Honey, remember to pick up the kids after school. **Don't be** late again, **____**?\nHusband: Don't worry, I've set an alarm.", o: ["do you", "don't you", "will you", "shall we"], a: 2, e: "【關鍵判斷】**Don't be (否定祈使句)**\n【解題思維】對著聽話者(You)下達指令的祈使句，無論是肯定(Open the door)還是否定(Don't open)，附加問句最標準且通用的用法一律是 **will you?**。" },
      { c: 6, q: "Friend A: I've **never** been to Europe. I really want to visit Paris someday.\nFriend B: **____**. Maybe we can go together next year.", o: ["So have I", "Neither have I", "So do I", "Neither do I"], a: 1, e: "【關鍵判斷】**never (否定)** 與 **have been (現在完成式)**\n【解題思維】附和句規則：前面是否定句(never)，需用 Neither 附和。前面句型為現在完成式，後面需沿用助動詞 have 進行倒裝，故選 **Neither have I** (我也沒有)。" },
      { c: 6, q: "Jack: **There is nothing** wrong with the computer, **____**? It just suddenly shut down.\nTechnician: Let me check the battery first.", o: ["is it", "isn't it", "is there", "isn't there"], a: 2, e: "【關鍵判斷】**There is** 句型與 **nothing (否定字)**\n【解題思維】1. There 句型的附加問句主詞必須沿用 there。2. nothing 是隱性否定字，所以前半句算否定句，附加問句必須用肯定。綜合得出 **is there?**。" },
      { c: 6, q: "Student: Teacher, the bell has rung. **Let us** go out and play, **____**?\nTeacher: Okay, but don't run in the hallway.", o: ["shall we", "will you", "do you", "don't we"], a: 1, e: "【關鍵判斷】**Let us (請求允許)**\n【解題思維】會考超級陷阱題！Let us (請求您允許我們去...)，這是在對聽話者(You)下達祈使指令，附加問句要用 **will you?** (和 Let's 的 shall we 意義完全不同)。" },
      { c: 6, q: "Student A: **I am** really bad at math. I failed the test again.\nStudent B: **____**. We should ask the teacher for help.", o: ["So do I", "Neither do I", "So am I", "Neither am I"], a: 2, e: "【關鍵判斷】**I am (肯定句)** 與 **be 動詞**\n【解題思維】附和句：前面是肯定句，需用 So 附和。前面句型為 be 動詞 (am)，後面需沿用 be 動詞進行倒裝，故選 **So am I** (我也是)。" },
      { c: 6, q: "Sister: **Nobody called** me while I was taking a shower, **____**?\nBrother: No, the phone didn't ring at all.", o: ["did he", "didn't he", "did they", "didn't they"], a: 2, e: "【關鍵判斷】**Nobody (否定字)** 與 **called (過去式)**\n【解題思維】Nobody 表否定，附加問句用肯定。Nobody 的代名詞在附加問句中習慣使用 **they**。動詞 called 為過去式，助動詞用 did，故選 **did they?**。" },
      { c: 6, q: "Friend A: Tom **seldom hangs out** with us recently, **____**?\nFriend B: Yeah, he is preparing for his final exams.", o: ["doesn't he", "does he", "isn't he", "is he"], a: 1, e: "【關鍵判斷】**seldom (隱性否定)** 與 **hangs out (一般動詞)**\n【解題思維】seldom (很少) 是隱性否定字，所以前半句視為否定，附加問句要用肯定。hangs out 是現在式一般動詞，主詞 Tom 為男生，故選 **does he?**。" },
      { c: 6, q: "Clerk: You **used to** live in Taichung before you moved here, **____**?\nCustomer: Yes, I lived there for ten years.", o: ["didn't you", "don't you", "aren't you", "weren't you"], a: 0, e: "【關鍵判斷】**used to (過去習慣)**\n【解題思維】used to (過去習慣...) 在文法上視為「過去式的一般動詞片語」，因此它的否定和附加問句必須借用助動詞 did，故選 **didn't you?**。" },
      { c: 6, q: "Student: I **have to** turn in the report before Friday, **____**?\nTeacher: That's right. No late submissions will be accepted.", o: ["haven't I", "don't I", "do I", "have I"], a: 1, e: "【關鍵判斷】**have to (必須)**\n【解題思維】have to (必須) 是一般動詞片語，絕對不能把它當成完成式的助動詞！因此它的附加問句要借用助動詞 do/does，故選 **don't I?**。" },
      { c: 6, q: "Mom: There is **a little milk** left in the fridge, **____**? I need some for my coffee.\nSon: Yes, but only a little bit.", o: ["is it", "isn't it", "is there", "isn't there"], a: 3, e: "【關鍵判斷】**a little (肯定)** 與 **There is**\n【解題思維】a little (有一些) 屬「肯定語氣」(如果是 little 則是否定)。前半為肯定，故後用否定。There 句型主詞沿用 there，故選 **isn't there?**。" },
      { c: 6, q: "Brother: **Pass me** the salt, **____**? This soup is a bit tasteless.\nSister: Here you go. Don't put too much.", o: ["do you", "don't you", "will you", "shall we"], a: 2, e: "【關鍵判斷】**Pass me... (肯定祈使句)**\n【解題思維】肯定祈使句的附加問句，為表達客氣的請求，最標準且不會出錯的用法是 **will you?** (或 won't/would you)。" },
      { c: 6, q: "Friend A: I can **hardly see** the words on the blackboard from the back row.\nFriend B: **____**. We should ask the teacher to write larger.", o: ["So can I", "Neither can I", "So do I", "Neither do I"], a: 1, e: "【關鍵判斷】**hardly (隱性否定)** 與 **can (助動詞)**\n【解題思維】hardly (幾乎不) 是隱性否定字，需用 Neither 附和。前面有助動詞 can，後面沿用 can 進行倒裝，故選 **Neither can I** (我也不能)。" },
      { c: 6, q: "Guest: **This soup tastes** a little too salty, **____**?\nWaiter: I'm sorry, sir. I'll ask the chef to make a new one for you.", o: ["isn't it", "doesn't it", "is it", "does it"], a: 1, e: "【關鍵判斷】**tastes (一般動詞)** 與 **This soup (單數事物)**\n【解題思維】tastes 是一般動詞，附加問句需借用助動詞 does。主詞 This soup 視為 it，前肯定後否定，故選 **doesn't it?**。" },
      { c: 6, q: "Wife: You**'d better** go to bed right now, **____**? You look totally exhausted.\nHusband: Yeah, it's been a long day.", o: ["wouldn't you", "hadn't you", "don't you", "didn't you"], a: 1, e: "【關鍵判斷】**'d better (had better 最好)**\n【解題思維】You'd better 是 You had better 的縮寫，had 在此視為助動詞。因此附加問句固定使用 **hadn't you?**。" },
      { c: 6, q: "Dad: **Open** the window to let some fresh air in, **____**?\nSon: Sure, Dad. It is a bit stuffy in here.", o: ["do you", "don't you", "will you", "shall we"], a: 2, e: "【關鍵判斷】**Open... (祈使句)**\n【解題思維】祈使句 (省略主詞 You 的命令句) 的附加問句一律首選 **will you?**。" },
      { c: 6, q: "Friend A: I **didn't watch** the soccer game last night. I was too tired.\nFriend B: **____**. I fell asleep right after dinner.", o: ["So did I", "Neither did I", "So was I", "Neither was I"], a: 1, e: "【關鍵判斷】**didn't (否定句)** 與 **一般動詞**\n【解題思維】否定句附和用 Neither。前面有助動詞 didn't，後面沿用 did 進行倒裝，故選 **Neither did I** (我也沒有)。" },
      { c: 6, q: "Teacher: **Few students** understand this difficult math concept, **____**?\nStudent: It's really hard. Could you explain it again?", o: ["do they", "don't they", "did they", "didn't they"], a: 0, e: "【關鍵判斷】**Few (隱性否定)** 與 **students (複數)**\n【解題思維】Few (幾乎沒有) 是隱性否定字，前半為否定，後接肯定。students 複數代名詞用 they，現在式動詞用 do，故選 **do they?**。" },
      { c: 6, q: "Lisa: **I'm** the best runner in our class, **____**?\nCoach: Yes, your record is unbeatable so far.", o: ["am not I", "aren't I", "am I", "are I"], a: 1, e: "【關鍵判斷】**I am...** 的特殊附加問句\n【解題思維】會考特殊規定！`I am ...` 的否定附加問句，為發音方便，英文習慣上固定使用 **aren't I?** (不用 am not I)。" },
      { c: 6, q: "You **have to** finish it today, **____**?", o: ["haven't you", "don't you", "do you", "have you"], a: 1, e: "【關鍵判斷】**have to (一般動詞片語)**\n【解題思維】have to (必須) 視為一般動詞片語，否定或附加問句需借用助動詞 don't，故選 **don't you?**。" },
      { c: 6, q: "She **rarely** goes to the movies, **____**?", o: ["does she", "doesn't she", "is she", "isn't she"], a: 0, e: "【關鍵判斷】**rarely (隱性否定)**\n【解題思維】rarely (罕見地) 是隱性否定字，前半句為否定，附加問句需用肯定 **does she?**。" },
      { c: 6, q: "**Let us** go to the park, **____**?", o: ["shall we", "will you", "do we", "don't we"], a: 1, e: "【關鍵判斷】**Let us (請求)** 與 Let's 的差異\n【解題思維】Let us (允許我們...) 的附加問句用 **will you?**；Let's (讓我們一起...) 才用 shall we?。" },
      { c: 6, q: "**I am** the tallest in my class, **____**?", o: ["am not I", "aren't I", "am I", "are I"], a: 1, e: "【關鍵判斷】**I am** 的否定附加問句\n【解題思維】I am ... 的否定附加問句，習慣上固定使用 **aren't I?**。" },
      { c: 6, q: "He**'d better** leave right now, **____**?", o: ["wouldn't he", "hadn't he", "didn't he", "doesn't he"], a: 1, e: "【關鍵判斷】**'d better (= had better)**\n【解題思維】He'd better 是 He had better 的縮寫，附加問句用 **hadn't he?**。" },
      { c: 6, q: "They**'d like to** join us, **____**?", o: ["hadn't they", "wouldn't they", "didn't they", "don't they"], a: 1, e: "【關鍵判斷】**'d like to (= would like to)**\n【解題思維】They'd like 是 They would like 的縮寫，附加問句用 **wouldn't they?**。" },
      { c: 6, q: "**That is** your new bike, **____**?", o: ["isn't that", "is it", "isn't it", "is that"], a: 2, e: "【關鍵判斷】主詞 **That**\n【解題思維】主詞為 That 或 This 時，附加問句的代名詞一律用 **it**，故選 **isn't it?**。" },
      { c: 6, q: "**Those are** my books, **____**?", o: ["aren't those", "are they", "aren't they", "are those"], a: 2, e: "【關鍵判斷】主詞 **Those**\n【解題思維】主詞為 These 或 Those 時，附加問句的代名詞一律用 **they**，故選 **aren't they?**。" },
      { c: 6, q: "**There will be** a concert tonight, **____**?", o: ["won't it", "will there", "won't there", "will it"], a: 2, e: "【關鍵判斷】**There** 句型與 **will be**\n【解題思維】There 句型的附加問句主詞沿用 there。will be 的否定縮寫為 won't be，故選 **won't there?**。" },
      { c: 6, q: "**Nothing is** wrong, **____**?", o: ["isn't it", "is it", "aren't they", "are they"], a: 1, e: "【關鍵判斷】**Nothing (否定字)**\n【解題思維】Nothing 為否定字且視為單數事物(代名詞用it)，前否定後肯定，故選 **is it?**。" },
      { c: 6, q: "**Nobody knows** the answer, **____**?", o: ["do they", "don't they", "does he", "doesn't he"], a: 0, e: "【關鍵判斷】**Nobody (否定字)**\n【解題思維】Nobody 為否定字，代名詞習慣用 they。前否定後肯定，故選 **do they?**。" },
      { c: 6, q: "**Someone left** the door open, **____**?", o: ["didn't he", "did they", "didn't they", "did he"], a: 2, e: "【關鍵判斷】**Someone** 的代名詞\n【解題思維】Someone 代名詞習慣用 they。過去式 left 需借用助動詞 didn't，故選 **didn't they?**。" },
      { c: 6, q: "**Pass me** the salt, **____**?", o: ["do you", "don't you", "will you", "shall we"], a: 2, e: "【關鍵判斷】**肯定祈使句**\n【解題思維】肯定祈使句的附加問句一律用 **will you?** (或 won't you/would you)。" },
      { c: 6, q: "**Don't be** late again, **____**?", o: ["will you", "do you", "are you", "won't you"], a: 0, e: "【關鍵判斷】**否定祈使句**\n【解題思維】否定祈使句的附加問句一律只能用 **will you?**。" },
      { c: 6, q: "Mary can **hardly** speak French, **____**?", o: ["can't she", "can she", "does she", "doesn't she"], a: 1, e: "【關鍵判斷】**hardly (隱性否定)**\n【解題思維】hardly (幾乎不) 是否定字，前半為否定，後用肯定 **can she?**。" },
      { c: 6, q: "You **used to** live here, **____**?", o: ["don't you", "didn't you", "aren't you", "weren't you"], a: 1, e: "【關鍵判斷】**used to (過去習慣)**\n【解題思維】used to 視為過去式一般動詞，附加問句用 **didn't you?**。" },
      { c: 6, q: "I **love** playing chess. - **____**", o: ["So do I.", "Neither do I.", "So am I.", "Neither am I."], a: 0, e: "【關鍵判斷】**肯定句** 與 **一般動詞(love)**\n【解題思維】肯定附和用 So。love 為一般動詞，助動詞用 do。故選 **So do I.**。" },
      { c: 6, q: "He **was** very angry, and **____**.", o: ["so was she", "neither was she", "so did she", "neither did she"], a: 0, e: "【關鍵判斷】**肯定句** 與 **be 動詞(was)**\n【解題思維】肯定附和，前面有 be 動詞 was，後面沿用 was 進行倒裝，選 **so was she**。" },
      { c: 6, q: "They **haven't** seen the movie. - **____**", o: ["So have I.", "Neither have I.", "So do I.", "Neither do I."], a: 1, e: "【關鍵判斷】**否定句** 與 **have (助動詞)**\n【解題思維】否定附和用 Neither。前面有 haven't，後面沿用 have，選 **Neither have I.**。" },
      { c: 6, q: "John **didn't** pass the exam, and **____**.", o: ["so did Tom", "neither did Tom", "neither Tom did", "so Tom did"], a: 1, e: "【關鍵判斷】**否定句** 與 **did (助動詞)**\n【解題思維】否定附和用 neither + 倒裝 (助動詞+主詞)，選 **neither did Tom**。" },
      { c: 6, q: "I **won't** go to the party tonight. - **____**", o: ["So will I.", "Neither will I.", "So do I.", "Neither do I."], a: 1, e: "【關鍵判斷】**won't (will not)**\n【解題思維】won't 是否定，附和用 **Neither will I.**。" },
      { c: 6, q: "She **has** a lot of friends, and **____**.", o: ["so do I", "so have I", "neither do I", "neither have I"], a: 0, e: "【關鍵判斷】**has (一般動詞-擁有)**\n【解題思維】has 在此為一般動詞 (擁有)，非完成式助動詞。肯定附和借用 do，選 **so do I**。" },
      { c: 6, q: "He **has been** to Japan, and **____**.", o: ["so has I", "so have I", "so do I", "neither have I"], a: 1, e: "【關鍵判斷】**has been (完成式助動詞)**\n【解題思維】has 在此為完成式的助動詞，肯定附和沿用 have/has，I 搭配 have，選 **so have I**。" },
      { c: 6, q: "My mom **shouldn't** work too late, and **____**.", o: ["neither should yours", "so should yours", "neither yours should", "so yours should"], a: 0, e: "【關鍵判斷】**shouldn't (否定)**\n【解題思維】否定附和，沿用情態助動詞 should 進行倒裝。yours = your mom，選 **neither should yours**。" },
      { c: 6, q: "**Few** students passed the math test, **____**?", o: ["didn't they", "did they", "don't they", "do they"], a: 1, e: "【關鍵判斷】**Few (隱性否定)**\n【解題思維】Few (幾乎沒有) 是否定字，前半為否定，後用肯定 **did they?**。" },
      { c: 6, q: "**A little** water is left in the bottle, **____**?", o: ["is it", "isn't it", "has it", "hasn't it"], a: 1, e: "【關鍵判斷】**A little (肯定)**\n【解題思維】A little (有一些) 是肯定，前半為肯定，後用否定 **isn't it?** (water不可數代名詞用it)。" },
      { c: 6, q: "She **needs to** practice more, **____**?", o: ["doesn't she", "needn't she", "isn't she", "does she"], a: 0, e: "【關鍵判斷】**needs to (一般動詞)**\n【解題思維】needs to 在此為一般動詞，附加問句用 **doesn't she?**。" },
      { c: 6, q: "He **seldom** eats fast food, **____**?", o: ["does he", "doesn't he", "is he", "isn't he"], a: 0, e: "【關鍵判斷】**seldom (隱性否定)**\n【解題思維】seldom (很少) 是隱性否定字，後半需用肯定 **does he?**。" },
      { c: 6, q: "**Let's** have a picnic this weekend, **____**?", o: ["will you", "shall we", "do we", "don't we"], a: 1, e: "【關鍵判斷】**Let's**\n【解題思維】Let's 開頭的祈使句，附加問句固定用 **shall we?**。" },
      { c: 6, q: "There is **little** milk in the fridge, **____**?", o: ["is there", "isn't there", "is it", "isn't it"], a: 0, e: "【關鍵判斷】**little (隱性否定)**\n【解題思維】little (幾乎沒有) 是否定字，前半為否定，後用肯定 **is there?**。" },

      // 8. 代名詞與介系詞
      { c: 7, q: "Customer: I don't like this black shirt. Do you have **____** one in white?\nClerk: Yes, please wait a moment. I'll get it for you.", o: ["another", "other", "the other", "others"], a: 0, e: "【關鍵判斷】**不特定** 的另一個\n【解題思維】顧客想看別的白襯衫，且並沒有限定是「剩下唯一的那一件」。表示三者或以上中「沒有特定範圍的任意另一個」，必須使用 **another**。" },
      { c: 7, q: "Teacher: Look at the picture. There are three apples on the table. One is red, another is green, and **____** is yellow.", o: ["other", "the other", "others", "another"], a: 1, e: "【關鍵判斷】限定範圍(三顆)中的 **最後一個**\n【解題思維】當範圍已經確定(三顆)，扣除前面提過的兩顆，剩下唯一確定的最後一個，必須加上定冠詞 the，故選 **the other**。" },
      { c: 7, q: "Interviewer: Could you tell our readers when you were born?\nActor: Sure. I was born **____ May**, 1990 in a beautiful small town.", o: ["in", "on", "at", "of"], a: 0, e: "【關鍵判斷】**May (月份)**\n【解題思維】在英文介系詞中，搭配較長的時間區段如「月份、年份、季節」，一律使用 **in** (in May)。" },
      { c: 7, q: "Secretary: When will the general manager arrive?\nAssistant: The meeting starts **____ 9:00 AM**, so he should be here very soon.", o: ["in", "on", "at", "for"], a: 2, e: "【關鍵判斷】**9:00 AM (時鐘時間點)**\n【解題思維】針對非常明確、精準的「時鐘時間點」，介系詞固定使用 **at** (at 9:00 AM)。" },
      { c: 7, q: "Tourist: Excuse me, how can I get to the national museum?\nGuide: You can go there **____ train**. It's very fast and convenient.", o: ["in", "on", "by", "with"], a: 2, e: "【關鍵判斷】**train (交通工具)**\n【解題思維】表示搭乘某種交通工具，最常見的句型是 `by + 交通工具單數名詞` (中間不加 a/the)，故選 **by**。" },
      { c: 7, q: "Mom: Are you going to ride your bike to school today?\nSon: No, it's raining outside. I think I will go to school **____ foot** with my umbrella.", o: ["in", "by", "with", "on"], a: 3, e: "【關鍵判斷】**foot (步行)**\n【解題思維】這是一個會考常考的固定片語。表示「步行」必須使用 **on foot**，絕對不可用 by walk 或 by foot。" },
      { c: 7, q: "Teacher: What are your classmates doing during the break?\nStudent: **Some** of them are playing basketball outside, and **____** are reading books in the library.", o: ["another", "other", "the other", "others"], a: 3, e: "【關鍵判斷】**Some... (一些)** 的對應詞\n【解題思維】`Some... others...` (一些人... 其他一些人...) 是一組固定搭配，用於無特定總數範圍的群體分類。故選 **others**。" },
      { c: 7, q: "Brother: **Look ____** the sky! It's getting so dark.\nSister: Let's hurry up and go home before it starts to rain.", o: ["in", "on", "at", "to"], a: 2, e: "【關鍵判斷】**Look (看)** 的介系詞搭配\n【解題思維】表示有目標地「注視著某物」，動詞 look 後面必須加上介系詞 **at**。" },
      { c: 7, q: "Teacher: Why do you want to be a doctor when you grow up?\nStudent: Because **____ of my parents** are doctors, and they help a lot of people.", o: ["All", "Both", "Each", "Two"], a: 1, e: "【關鍵判斷】**parents (雙親)** 為兩個人\n【解題思維】parents 指的是父母雙親，剛好是兩個人。表示「兩者都...」必須使用代名詞 **Both**。All 則是用於三者或以上。" },
      { c: 7, q: "Reporter: Why do so many foreign tourists love visiting Taiwan?\nChef: Taiwan is **famous ____** its delicious street food and friendly people.", o: ["as", "for", "to", "by"], a: 1, e: "【關鍵判斷】**famous (聞名)** 與特色事物\n【解題思維】表示「因為...特質/事物而聞名」，固定搭配介系詞 **for** (be famous for)。若用 famous as 則是「作為...身分而聞名」。" },
      { c: 7, q: "Husband: Honey, what are you doing under the sofa?\nWife: I am **looking ____** my car keys. I can't find them anywhere.", o: ["at", "for", "after", "into"], a: 1, e: "【關鍵判斷】**looking (尋找)** 的片語\n【解題思維】根據語境 (找不到鑰匙)，這裡要表達的是「尋找」。look for 是尋找；look after 是照顧；look into 是調查。故選 **for**。" },
      { c: 7, q: "Student: **Thank you** so much **____** your help with my math homework. I finally understand it.\nTeacher: You're very welcome.", o: ["for", "to", "with", "of"], a: 0, e: "【關鍵判斷】**Thank (感謝)** 的介系詞搭配\n【解題思維】`Thank someone for something` (因為某事而感謝某人) 是固定用法，介系詞用 **for**。" },
      { c: 7, q: "Grandson: Wow! This big box is **full ____** old toys.\nGrandma: Yes, those were your father's favorite toys when he was little.", o: ["with", "of", "in", "by"], a: 1, e: "【關鍵判斷】**full (充滿)** 的介系詞搭配\n【解題思維】表示「充滿著...」，形容詞 full 固定搭配介系詞 **of** (be full of)。如果是 fill 則搭配 with (be filled with)。" },
      { c: 7, q: "Child: Can I pet that big dog over there?\nParent: No, don't go near it. Aren't you **afraid ____** dogs?", o: ["for", "with", "of", "at"], a: 2, e: "【關鍵判斷】**afraid (害怕)** 的介系詞搭配\n【解題思維】表示「害怕某事物」，固定介系詞搭配為 **of** (be afraid of)。" },
      { c: 7, q: "Customer: This new smartphone is quite **different ____** the old model I bought last year.\nClerk: Yes, it has a much better camera and battery life.", o: ["with", "from", "to", "than"], a: 1, e: "【關鍵判斷】**different (不同)** 的介系詞搭配\n【解題思維】表示「與...不同」，形容詞 different 在美式英文中固定搭配介系詞 **from** (be different from)。" },
      { c: 7, q: "Student: We are all **looking forward ____** the summer vacation next month.\nTeacher: I know, but you have to pass the final exams first.", o: ["in", "on", "to", "at"], a: 2, e: "【關鍵判斷】**look forward (期待)** 的介系詞\n【解題思維】`look forward to` (期待...) 是一個極重要的固定片語。此處的 **to** 是介系詞，後面必須接名詞或 V-ing。" },
      { c: 7, q: "Coach: Jason is very **good ____** playing tennis. He might win the championship this year.\nPlayer: Yes, he practices very hard every single day.", o: ["in", "on", "at", "with"], a: 2, e: "【關鍵判斷】**good (擅長)** 的介系詞搭配\n【解題思維】表示「擅長於...」，形容詞 good 固定搭配介系詞 **at** (be good at + N/V-ing)。" },
      { c: 7, q: "Mom: Don't **worry ____** your grades too much. Just do your best.\nSon: Thanks, Mom. I'll study harder for the next test.", o: ["for", "with", "about", "in"], a: 2, e: "【關鍵判斷】**worry (擔心)** 的介系詞搭配\n【解題思維】動詞 worry 表示「擔心某事」時，固定搭配介系詞 **about** (worry about)。" },
      { c: 7, q: "Traveler: I checked the weather forecast. **The weather** in Taipei is usually hotter than **____** in Tokyo during summer.\nFriend: Then we should pack more T-shirts.", o: ["it", "this", "that", "those"], a: 2, e: "【關鍵判斷】**The weather (不可數名詞)** 的比較對象\n【解題思維】會考超級必考題！在比較句型中，為了避免重複提到前面的名詞 (the weather)，單數或不可數名詞必須使用代名詞 **that** 來代替。複數名詞則用 those。" },
      { c: 7, q: "Sister: I bought a new dress, but I still think his **shoes** are more expensive than **____** of his brother.\nBrother: Well, they are limited edition.", o: ["that", "those", "these", "ones"], a: 1, e: "【關鍵判斷】**shoes (複數名詞)** 的比較對象\n【解題思維】同樣是比較句型的代名詞。前面提到的 shoes 是複數名詞，因此後面必須使用複數代名詞 **those** 來代替。" },
      { c: 7, q: "**____** of the two brothers are doctors.", o: ["All", "Both", "Some", "Most"], a: 1, e: "【關鍵判斷】**two (兩者)**\n【解題思維】兩者都...，代名詞用 **Both**。All 用於三者或以上。" },
      { c: 7, q: "**____** of the students in my class wear glasses.", o: ["Much", "Most", "Every", "Another"], a: 1, e: "【關鍵判斷】**students (複數)** 與 **of**\n【解題思維】**Most** of the + 複數名詞 (大部分的...)。Every 是形容詞，不能加 of。" },
      { c: 7, q: "I have two pens. One is red, and **____** is blue.", o: ["another", "other", "the other", "others"], a: 2, e: "【關鍵判斷】**two (兩者)** 中的另一個\n【解題思維】限定兩者之中的另一個(剩下唯一的一個)，用 **the other**。" },
      { c: 7, q: "**Some** people like apples, and **____** like bananas.", o: ["another", "other", "the other", "others"], a: 3, e: "【關鍵判斷】**Some... (一些)**\n【解題思維】`Some... others...` (一些人... 其他一些人...)，無特定總數範圍，用 **others**。" },
      { c: 7, q: "There are five books on the table. Two are mine, and **____** are yours.", o: ["others", "the others", "another", "other"], a: 1, e: "【關鍵判斷】特定範圍 **five (五本)**\n【解題思維】特定範圍中剩下的全部，必須加 the，用 **the others**。" },
      { c: 7, q: "I don't like this shirt. Do you have **____** one?", o: ["other", "the other", "another", "others"], a: 2, e: "【關鍵判斷】**不特定** 的另一個\n【解題思維】**another** 表示三者或以上中的「任意另一個」。" },
      { c: 7, q: "**____** of the food on the table is delicious.", o: ["All", "Both", "Many", "Few"], a: 0, e: "【關鍵判斷】**food (不可數名詞)**\n【解題思維】food 為不可數名詞，可用 **All** 修飾 (All of the food)。Both/Many/Few 只能接可數名詞。" },
      { c: 7, q: "**____** of the students **has** a smartphone.", o: ["All", "Some", "Each", "Many"], a: 2, e: "【關鍵判斷】動詞 **has (單數)**\n【解題思維】**Each** (每一個) 視為單數，故動詞用 has。All/Some/Many 皆配複數動詞 have。" },
      { c: 7, q: "He cut the apple **____** a knife.", o: ["by", "in", "with", "on"], a: 2, e: "【關鍵判斷】**a knife (具體工具)**\n【解題思維】表示使用「具體的工具」，介系詞用 **with**。" },
      { c: 7, q: "I go to school **____ foot** every day.", o: ["in", "by", "with", "on"], a: 3, e: "【關鍵判斷】**foot (步行)**\n【解題思維】步行 (on foot) 是固定用法，選 **on**。" },
      { c: 7, q: "We traveled to Taipei **____ train**.", o: ["in", "on", "by", "with"], a: 2, e: "【關鍵判斷】**train (交通工具)**\n【解題思維】搭乘交通工具，介系詞用 **by** (by train/bus/car)。" },
      { c: 7, q: "The meeting starts **____ 9:00 AM**.", o: ["in", "on", "at", "for"], a: 2, e: "【關鍵判斷】**9:00 AM (時間點)**\n【解題思維】明確的時鐘時間點，介系詞用 **at**。" },
      { c: 7, q: "I was born **____ 2008**.", o: ["in", "on", "at", "to"], a: 0, e: "【關鍵判斷】**2008 (年份)**\n【解題思維】在某個年份、月份、季節，介系詞用 **in**。" },
      { c: 7, q: "They play basketball **____ Sunday mornings**.", o: ["in", "on", "at", "of"], a: 1, e: "【關鍵判斷】**Sunday (特定日子)** 的早上\n【解題思維】只要指定是某一天(特定日期/星期幾)，介系詞一律用 **on**。" },
      { c: 7, q: "He walked **____** the park and saw a beautiful lake.", o: ["through", "across", "above", "over"], a: 0, e: "【關鍵判斷】**the park (立體空間)**\n【解題思維】**through** 表示穿越有立體空間的地方(如公園、森林)。across 是平面越過。" },
      { c: 7, q: "Look **____** the sky! The birds are flying.", o: ["in", "on", "at", "to"], a: 2, e: "【關鍵判斷】**Look (看)**\n【解題思維】look at (注視...)，選 **at**。" },
      { c: 7, q: "I am looking **____** my lost keys.", o: ["at", "for", "after", "into"], a: 1, e: "【關鍵判斷】**lost keys (遺失的鑰匙)**\n【解題思維】look for (尋找)，選 **for**。" },
      { c: 7, q: "We are proud **____** your excellent performance.", o: ["for", "in", "of", "with"], a: 2, e: "【關鍵判斷】**proud (驕傲)**\n【解題思維】be proud of (為...感到驕傲)，選 **of**。" },
      { c: 7, q: "Taiwan is famous **____** its delicious street food.", o: ["as", "for", "to", "by"], a: 1, e: "【關鍵判斷】**famous (聞名)** 與特色\n【解題思維】be famous for (因為...特質/事物而聞名)，選 **for**。" },
      { c: 7, q: "The box is full **____** toys.", o: ["with", "of", "in", "by"], a: 1, e: "【關鍵判斷】**full (充滿)**\n【解題思維】be full of (充滿著...) = be filled with。選 **of**。" },
      { c: 7, q: "Are you afraid **____** dogs?", o: ["for", "with", "of", "at"], a: 2, e: "【關鍵判斷】**afraid (害怕)**\n【解題思維】be afraid of (害怕...)，選 **of**。" },
      { c: 7, q: "My house is different **____** yours.", o: ["with", "from", "to", "than"], a: 1, e: "【關鍵判斷】**different (不同)**\n【解題思維】be different from (與...不同)，選 **from**。" },
      { c: 7, q: "She is looking forward **____** the summer vacation.", o: ["in", "on", "to", "at"], a: 2, e: "【關鍵判斷】**look forward (期待)**\n【解題思維】look forward to (期待...)，此處的 **to** 為介系詞。" },
      { c: 7, q: "He is good **____** playing the guitar.", o: ["in", "on", "at", "with"], a: 2, e: "【關鍵判斷】**good (擅長)**\n【解題思維】be good at (擅長於...)，選 **at**。" },
      { c: 7, q: "Don't worry **____** your grades.", o: ["for", "with", "about", "in"], a: 2, e: "【關鍵判斷】**worry (擔心)**\n【解題思維】worry about (擔心...)，選 **about**。" },
      { c: 7, q: "None **____** my friends know the secret.", o: ["in", "of", "for", "with"], a: 1, e: "【關鍵判斷】**None (沒有人)**\n【解題思維】None of... (在...之中沒有任何一個)，選 **of**。" },
      { c: 7, q: "The weather in Taipei is hotter than **____** in Tokyo.", o: ["it", "this", "that", "those"], a: 2, e: "【關鍵判斷】比較對象 **The weather (單數/不可數)**\n【解題思維】為了避免重複，用 **that** 代替前面提過的單數/不可數名詞。" },
      { c: 7, q: "His shoes are more expensive than **____** of his brother.", o: ["that", "those", "these", "ones"], a: 1, e: "【關鍵判斷】比較對象 **shoes (複數)**\n【解題思維】用 **those** 代替前面提過的複數名詞。" },
      { c: 7, q: "There is a bridge **____** the river.", o: ["above", "over", "on", "in"], a: 1, e: "【關鍵判斷】**bridge (橋)** 與 **river (河流)**\n【解題思維】**over** 表「在...正上方」或「橫越...上方」(如橋橫跨河流)。" },
      { c: 7, q: "The dog is hiding **____** the sofa.", o: ["behind", "after", "back", "rear"], a: 0, e: "【關鍵判斷】**hiding (躲藏)**\n【解題思維】**behind** 表在空間上的「在...的後面」，躲在沙發後。" },

      // 9. 比較級與最高級
      { c: 8, q: "Student A: How was the math test this morning?\nStudent B: It was **____ more difficult** than I thought. I couldn't even finish the last page.", o: ["very", "too", "much", "so"], a: 2, e: "【關鍵判斷】**more difficult (比較級)**\n【解題思維】修飾比較級 (more difficult) 可以用 much/even/a lot/far/a little。very 和 too 只能修飾原級，故選 **much**。" },
      { c: 8, q: "Teacher: Look at the twins standing over there. Do you know them?\nMom: Yes, Mary is **____ of the two** girls.", o: ["taller", "the taller", "tallest", "the tallest"], a: 1, e: "【關鍵判斷】**of the two (兩者之中)**\n【解題思維】會考必考句型！Of the two... (兩者之中) 是特殊句型，範圍限定兩者要用比較級，且比較級前面必須加上定冠詞 the，故選 **the taller**。" },
      { c: 8, q: "Guide: Welcome to our city tour! Tokyo is **one of ____ cities** in the world, with millions of people living here.", o: ["large", "larger", "largest", "the largest"], a: 3, e: "【關鍵判斷】**one of (其中之一)** 與範圍 **in the world**\n【解題思維】one of the + 最高級 + 複數名詞，表示「最...的...之一」，故選 **the largest**。" },
      { c: 8, q: "Grandpa: Remember, my boy. **The ____** you study now, **the better** grades you will get in the future.\nGrandson: I will keep that in mind.", o: ["hard", "harder", "hardest", "more hard"], a: 1, e: "【關鍵判斷】**The ..., the better... (越...，就越...)**\n【解題思維】固定句型：The 比較級..., the 比較級...。表示「越努力，成績就越好」，故選 **harder**。" },
      { c: 8, q: "Friend A: The weather is getting **hotter and ____**. We should really turn on the air conditioner.\nFriend B: Good idea. I'm sweating.", o: ["hot", "hotter", "hottest", "more hot"], a: 1, e: "【關鍵判斷】**hotter and ____ (越來越...)**\n【解題思維】比較級 and 比較級，表「越來越...」。hot 的比較級是 hotter，故選 **hotter**。" },
      { c: 8, q: "Customer: **Which** smartphone is **____, the black one or the white one**?\nClerk: The black one has more storage, so it costs 2,000 dollars more.", o: ["expensive", "more expensive", "most expensive", "the most expensive"], a: 1, e: "【關鍵判斷】**A or B (兩者做比較)**\n【解題思維】句尾出現兩者做比較 (the black one or the white one)，必須使用比較級，故選 **more expensive**。" },
      { c: 8, q: "Doctor: You should exercise more. Health is **____ important than** wealth.\nPatient: You are completely right. I'll start jogging tomorrow.", o: ["much", "more", "most", "the most"], a: 1, e: "【關鍵判斷】**than (比)**\n【解題思維】than 提示前面要用比較級，important 是多音節形容詞，比較級為 **more** important。" },
      { c: 8, q: "Reviewer: I highly recommend this film. This is **____ movie I have ever seen** in my life!\nFriend: Wow, I definitely have to watch it.", o: ["exciting", "more exciting", "most exciting", "the most exciting"], a: 3, e: "【關鍵判斷】**I have ever seen (我看過之中)**\n【解題思維】「現在完成式 (ever seen)」常搭配最高級，表示到目前為止的經驗中「最...的」，故選 **the most exciting**。" },
      { c: 8, q: "Coach: John is incredible. He ran **____ of all** the students in the relay race today.\nPlayer: We are so lucky to have him on our team.", o: ["fast", "faster", "fastest", "the fastest"], a: 3, e: "【關鍵判斷】**of all (在所有人之中)**\n【解題思維】of all 提示最高級範圍。副詞 fast 的最高級為 **the fastest** (副詞最高級的 the 常常可省略，但有 the 最完整)。" },
      { c: 8, q: "Doctor: To stay healthy, you should eat **____ fast food** and eat more fresh vegetables.\nPatient: I'll try to change my diet.", o: ["few", "fewer", "little", "less"], a: 3, e: "【關鍵判斷】**fast food (不可數名詞)** 與比較語氣\n【解題思維】food 是不可數名詞，所以要用 little 的比較級 **less** (較少的)。" },
      { c: 8, q: "Librarian: It's so quiet today. There are **____ students** in the library today **than** yesterday because of the heavy rain.", o: ["less", "little", "few", "fewer"], a: 3, e: "【關鍵判斷】**students (可數名詞)** 與 **than**\n【解題思維】students 是可數名詞的複數，且有 than 提示比較級，few 的比較級是 **fewer** (較少的)。" },
      { c: 8, q: "Customer: This sports car is **____ more expensive** than that one. Can you give me a discount?\nClerk: I can talk to my manager.", o: ["a little", "very", "too", "so"], a: 0, e: "【關鍵判斷】**more expensive (比較級)** 的修飾語\n【解題思維】**a little** (一點點) / much / a lot / even 可以用來修飾比較級，表示程度差異。very 和 too 只能修飾原級。" },
      { c: 8, q: "Student A: My school bag is **not as ____ as** yours. What do you have inside?\nStudent B: Just some books and a heavy laptop.", o: ["heavy", "heavier", "heaviest", "heavily"], a: 0, e: "【關鍵判斷】**not as ... as (不如...一樣)**\n【解題思維】as... as 中間必須夾「原級」的形容詞或副詞。前面是 be 動詞 (is)，後接形容詞原級 **heavy**。" },
      { c: 8, q: "Mom: He is **the ____ boy in our family**, so he always takes good care of his younger brothers and sisters.", o: ["older", "oldest", "elder", "eldest"], a: 1, e: "【關鍵判斷】**the ____ (最高級)** 與 **in our family (群體範圍)**\n【解題思維】範圍是全家人(三者以上)，所以用最高級 **oldest** (年紀最大的)。(eldest 亦可，但在國中選擇題中通常以 oldest 為主)。" },
      { c: 8, q: "Teacher: Mary is prettier than **____** in her class. She could be a model in the future.\nPrincipal: I agree.", o: ["any girl", "any other girl", "all the girls", "other girls"], a: 1, e: "【關鍵判斷】**prettier than (比較級)** 表達最高級語意\n【解題思維】會考必考！`比較級 + than + any other + 單數名詞` (比其他任何一個都...)，用來表達最高級的語意(必須把自己排除，否則會變成自己比自己漂亮)。故選 **any other girl**。" },
      { c: 8, q: "Weather forecaster: Please stay indoors. The weather today is **even ____ than** yesterday. The typhoon is coming.", o: ["bad", "badder", "worse", "worst"], a: 2, e: "【關鍵判斷】**even (甚至)** 修飾比較級與 **than**\n【解題思維】even 用來加強修飾比較級。bad 的比較級是不規則變化 **worse**。" },
      { c: 8, q: "Student: **Of all** the subjects, I like history **____** because the stories of the past are so fascinating.\nTeacher: That's great to hear.", o: ["good", "better", "best", "the best"], a: 2, e: "【關鍵判斷】**Of all (在所有之中)** 提示最高級\n【解題思維】Of all 提示三者以上的最高級，副詞 well (修飾 like) 的最高級是 **best** (副詞最高級的 the 習慣上可省略)。" },
      { c: 8, q: "Manager: Your marketing idea **sounds ____ than** mine. Let's follow your plan for the next project.\nEmployee: Thank you, boss.", o: ["good", "well", "better", "best"], a: 2, e: "【關鍵判斷】**sounds (連綴動詞)** 與 **than (比較級)**\n【解題思維】連綴動詞 sounds 後接形容詞，且有 than 提示比較級，good 的比較級為不規則變化 **better**。" },
      { c: 8, q: "Climber: Mount Everest is **____ mountain in the world**. It's my lifelong dream to climb it.\nFriend: Be careful, it's very dangerous.", o: ["high", "higher", "highest", "the highest"], a: 3, e: "【關鍵判斷】**in the world (全世界範圍)**\n【解題思維】在全世界的範圍內做比較(三者以上)，名詞前必須加上定冠詞與最高級，故選 **the highest**。" },
      { c: 8, q: "Boss: Please speak **a little ____**. I can't hear you clearly from the back of the meeting room.\nEmployee: Sorry, I will.", o: ["loud", "loudly", "louder", "loudest"], a: 2, e: "【關鍵判斷】**a little (一點點)** 修飾比較級\n【解題思維】a little 用來修飾比較級，表示程度稍微多一點「大聲一點」，故選 **louder**。" },
      { c: 8, q: "Student A: I give up! This math problem is **____ difficult than** the previous one.\nStudent B: Let me help you.", o: ["very", "too", "much", "more"], a: 2, e: "【關鍵判斷】**difficult than (比較級)**\n【解題思維】修飾比較級 (more difficult) 必須使用 **much** / a lot / even 等副詞。very 只能修飾原級。" },
      { c: 8, q: "Friend A: Do you know the twin sisters?\nFriend B: Yes, Jane is **____ of the two** girls.", o: ["taller", "the taller", "tallest", "the tallest"], a: 1, e: "【關鍵判斷】**of the two (兩者之中)**\n【解題思維】會考陷阱題！Of the two 限定了「兩者」，所以要用比較級；但因為範圍已限定，前面必須加上定冠詞 the，故選 **the taller**。" },
      { c: 8, q: "Principal: I heard Tom is a genius.\nTeacher: Yes, he is absolutely **____ student in our class**.", o: ["good", "better", "best", "the best"], a: 3, e: "【關鍵判斷】**in our class (群體範圍)**\n【解題思維】在全班的範圍內做比較，名詞 student 前面必須加上定冠詞與最高級，故選 **the best**。" },
      { c: 8, q: "Doctor: Don't work too hard. You must remember that health is **____ important than** wealth.", o: ["much", "more", "most", "the most"], a: 1, e: "【關鍵判斷】**than (比)**\n【解題思維】than 提示比較級，important 為多音節形容詞，比較級必須加上 **more**。" },
      { c: 8, q: "Grandpa: Life is a journey. **The ____** a person gets, **the wiser** he becomes.", o: ["old", "older", "oldest", "elder"], a: 1, e: "【關鍵判斷】**The ..., the wiser... (越...，就越有智慧)**\n【解題思維】固定句型：The 比較級..., the 比較級...。表示「年紀越大，就越有智慧」，故選 **older**。" },
      { c: 8, q: "News Reporter: Because of global warming, the summer in Taiwan is getting **hotter and ____**.", o: ["hot", "hotter", "hottest", "more hot"], a: 1, e: "【關鍵判斷】**getting hotter and ____ (變得越來越...)**\n【解題思維】比較級 and 比較級，表「越來越...」。hot 的比較級是重複字尾加 er，故選 **hotter**。" },
      { c: 8, q: "Student: I love reading, but I hate numbers. English is **____ easier than** math for me.", o: ["very", "so", "much", "too"], a: 2, e: "【關鍵判斷】**easier than (比較級)**\n【解題思維】much 可以用來加強修飾比較級，表示「簡單多了」，故選 **much**。" },
      { c: 8, q: "Mom: Look at the boys! **Who is ____, Tom or Jerry**?\nDad: Tom is.", o: ["tall", "taller", "tallest", "the tallest"], a: 1, e: "【關鍵判斷】**Tom or Jerry (兩者做比較)**\n【解題思維】兩者 (A or B) 做比較，疑問句必須使用比較級，故選 **taller**。" },
      { c: 8, q: "Friend: How was the action movie?\nMe: It was amazing! This is **____ movie I have ever seen**.", o: ["exciting", "more exciting", "most exciting", "the most exciting"], a: 3, e: "【關鍵判斷】**I have ever seen (我看過之中)**\n【解題思維】「到目前為止的經驗 (現在完成式)」常搭配最高級，表示「最...的」。exciting 是多音節，最高級為 **the most exciting**。" },
      { c: 8, q: "Tour Guide: Welcome to Japan! As you know, Tokyo is **one of ____ cities** in the world.", o: ["large", "larger", "largest", "the largest"], a: 3, e: "【關鍵判斷】**one of (其中之一)**\n【解題思維】one of the + 最高級 + 複數名詞，表示「最...的...之一」，故選 **the largest**。" },
      { c: 8, q: "Coach: When the dog chased him, he ran **as ____ as** he could.", o: ["fast", "faster", "fastest", "fastly"], a: 0, e: "【關鍵判斷】**as ... as (盡可能地...)**\n【解題思維】as... as 中間必須放「原級」。fast 本身就是副詞，沒有 fastly 這個字，故選 **fast**。" },
      { c: 8, q: "Brother: Why did she buy a cheaper car?\nSister: Because she has **____ money than** I do.", o: ["few", "fewer", "little", "less"], a: 3, e: "【關鍵判斷】**money (不可數)** 與 **than**\n【解題思維】money 是不可數名詞，修飾不可數名詞的 little (很少) 的比較級是不規則變化 **less**。" },
      { c: 8, q: "Librarian: It's raining heavily today, so there are **____ students** in the library today **than** yesterday.", o: ["less", "little", "few", "fewer"], a: 3, e: "【關鍵判斷】**students (可數)** 與 **than**\n【解題思維】students 是可數名詞複數，修飾可數名詞的 few (很少) 的比較級是規則變化 **fewer**。" },
      { c: 8, q: "Teacher: We have three major tests tomorrow. **Which subject is ____**, English, Math, or Science?", o: ["difficult", "more difficult", "most difficult", "the most difficult"], a: 3, e: "【關鍵判斷】**三者做比較** (English, Math, or Science)\n【解題思維】三者或以上做比較，疑問句必須使用最高級。difficult 是多音節，故選 **the most difficult**。" },
      { c: 8, q: "Customer: I like this red sports car, but it is **____ more expensive than** the blue one. Can I get a discount?", o: ["a little", "very", "too", "so"], a: 0, e: "【關鍵判斷】**more expensive (比較級)**\n【解題思維】**a little** (一點點) 可以用來修飾比較級，表示「稍微貴一點」。very 只能修飾原級。" },
      { c: 8, q: "Student A: Your backpack looks huge!\nStudent B: Yeah, my bag is **not as ____ as** yours. I have three textbooks inside.", o: ["heavy", "heavier", "heaviest", "heavily"], a: 0, e: "【關鍵判斷】**not as ... as (不如...一樣)**\n【解題思維】as... as 中間夾「原級」。前面搭配的是 be 動詞 (is)，所以要填入形容詞原級 **heavy**。" },
      { c: 8, q: "Mom: John is **the ____ boy in his family**, so he always takes care of his little sisters.", o: ["older", "oldest", "elder", "eldest"], a: 1, e: "【關鍵判斷】**the ____ (最高級)** 與 **in his family (範圍)**\n【解題思維】在家庭的範圍內(三者以上)，用最高級表示「年紀最大的」。國中範圍通常考 **oldest** (選項 eldest 雖也可，但在單選題中 oldest 絕對正確)。" },
      { c: 8, q: "Friend A: Mary is so beautiful!\nFriend B: Yes, I think she is **prettier than ____** in her class.", o: ["any girl", "any other girl", "all the girls", "other girls"], a: 1, e: "【關鍵判斷】**prettier than (比較級)** 表達最高級\n【解題思維】`比較級 + than + any other + 單數名詞` 表示「比其他任何一個都...」。必須加 other 把自己排除在外，故選 **any other girl**。" },
      { c: 8, q: "News: Please stay at home! The typhoon is coming, and the weather today is **even ____ than** yesterday.", o: ["bad", "badder", "worse", "worst"], a: 2, e: "【關鍵判斷】**even (甚至)** 與 **than**\n【解題思維】even 用來修飾比較級。bad 的比較級是不規則變化 **worse**。" },
      { c: 8, q: "Student: **Of all** the subjects at school, I like history **____**.", o: ["good", "better", "best", "the best"], a: 2, e: "【關鍵判斷】**Of all (在所有之中)** 提示最高級\n【解題思維】Of all 提示最高級。修飾動詞 like 要用副詞 well，其最高級是不規則的 **best** (副詞最高級的 the 可省略)。" },
      { c: 8, q: "Manager: Let's use your plan. Your idea **sounds ____ than** mine.", o: ["good", "well", "better", "best"], a: 2, e: "【關鍵判斷】**sounds (連綴動詞)** 與 **than**\n【解題思維】連綴動詞 sounds 後接形容詞，且有 than 提示比較級。good 的比較級是不規則的 **better**。" },
      { c: 8, q: "Mom: Mary isn't feeling well today, so she ate **____ food than** her brother.", o: ["few", "fewer", "less", "little"], a: 2, e: "【關鍵判斷】**food (不可數)** 與 **than**\n【解題思維】food 是不可數名詞，必須用 little 修飾，其比較級是不規則的 **less**。" },
      { c: 8, q: "Teacher: Do you know what **____ mountain in the world** is?\nStudent: Yes, it's Mount Everest.", o: ["high", "higher", "highest", "the highest"], a: 3, e: "【關鍵判斷】**in the world (全世界範圍)**\n【解題思維】在全世界的範圍內做比較，必須加上定冠詞與最高級，故選 **the highest**。" },
      { c: 8, q: "Audience: Excuse me, could you please speak **a little ____**? I can't hear you clearly.", o: ["loud", "loudly", "louder", "loudest"], a: 2, e: "【關鍵判斷】**a little (一點點)** 修飾比較語氣\n【解題思維】a little 用來修飾比較級，表示程度稍微改變「大聲一點」，故選 **louder**。" },
      { c: 8, q: "Dad: Remember, **the harder** you work now, **the ____** you will be in the future.", o: ["successful", "more successful", "most successful", "success"], a: 1, e: "【關鍵判斷】**The ..., the ... (越...，就越...)**\n【解題思維】固定句型：The 比較級..., the 比較級...。successful 是多音節，比較級為 **more successful**。" },
      { c: 8, q: "Teacher: Peter is **as ____ as** his older brother. They both always get good grades in school.", o: ["smart", "smarter", "smartest", "smartly"], a: 0, e: "【關鍵判斷】**as ... as (和...一樣)**\n【解題思維】as... as 中間放「原級」。搭配 be 動詞 (is)，後接形容詞原級 **smart**。" },
      { c: 8, q: "Guide: Look at that! Taipei 101 is **taller than ____ building** in Taiwan.", o: ["any", "all", "other", "any other"], a: 3, e: "【關鍵判斷】**taller than (比較級)** 表達最高級\n【解題思維】`比較級 + than + any other + 單數名詞` (比台灣其他任何建築物都高，將自己排除在比較對象之外)。" },
      { c: 8, q: "Teacher: John is a genius. **No other** student is **as ____ as** John.", o: ["smart", "smarter", "smartest", "the smartest"], a: 0, e: "【關鍵判斷】**No other... + as ... as**\n【解題思維】No other... + as 原級 as... (沒有其他人像John一樣聰明 = John最聰明)。as... as 中間放原級 **smart**。" },
      { c: 8, q: "Kid: I finished it in five minutes! This puzzle is **____ than** I thought.", o: ["much easy", "more easy", "much easier", "very easier"], a: 2, e: "【關鍵判斷】**than (比)**\n【解題思維】easy 的比較級是去 y 加 ier (easier)。修飾比較級要用 much/even/a lot，故選 **much easier**。" },
      { c: 8, q: "Bride: Thank you all for coming to my wedding. Today is **____ day of my life**!", o: ["happy", "happier", "happiest", "the happiest"], a: 3, e: "【關鍵判斷】**of my life (我一生中)** 提示範圍\n【解題思維】在「我一生中」的範圍內做比較，表示「最...的一天」，名詞前必須加上定冠詞與最高級，選 **the happiest**。" },

      // 10. 動名詞與不定詞
      { c: 9, q: "Doctor: You cough a lot recently. You should **stop ____** for your own health.\nPatient: I know. I will try my best to quit.", o: ["smoke", "smoking", "to smoke", "smoked"], a: 1, e: "【關鍵判斷】**stopped (停止)** 與語境\n【解題思維】stop V-ing 表「停止正在做/習慣做的動作」(戒菸)。故選 **smoking**。" },
      { c: 9, q: "Teacher: The school bus is leaving. **Don't forget ____** your homework tomorrow!", o: ["bring", "bringing", "to bring", "brought"], a: 2, e: "【關鍵判斷】**forget (忘記)** 與 **tomorrow (明天)**\n【解題思維】forget to V 表示「忘記要去... (事情未做)」。提醒明天不要忘記帶，選 **to bring**。" },
      { c: 9, q: "Son: Thanks for taking me to the park!\nDad: You're welcome. We **had fun ____** basketball yesterday.", o: ["play", "playing", "to play", "played"], a: 1, e: "【關鍵判斷】**had fun (玩得開心)**\n【解題思維】have fun + **V-ing** (做...很開心) 是一種習慣的固定句型。選 **playing**。" },
      { c: 9, q: "Husband: The living room looks great!\nWife: Thanks, I **spent** an hour **____** the house.", o: ["clean", "cleaning", "to clean", "cleaned"], a: 1, e: "【關鍵判斷】**spent + 時間**\n【解題思維】spend time 後方必須接動名詞 **V-ing**。選 **cleaning**。" },
      { c: 9, q: "Student: This novel is so thick!\nTeacher: Indeed. **It took me** three days **____** the book.", o: ["finish", "finishing", "to finish", "finished"], a: 2, e: "【關鍵判斷】**It took me + 時間 (花費時間句型)**\n【解題思維】虛主詞花費時間的標準句型：`It takes/took + 人 + 時間 + to V`。必須搭配不定詞，選 **to finish**。" },
      { c: 9, q: "Wife: I'm so bored.\nHusband: **How about ____** a movie tonight?", o: ["watch", "watching", "to watch", "watched"], a: 1, e: "【關鍵判斷】**about (介系詞)**\n【解題思維】How about...? (提議做...如何？) 中的 about 是介系詞，介系詞後面遇到動詞必須改成 **動名詞 V-ing**，選 **watching**。" },
      { c: 9, q: "Student: I don't want to speak in English.\nTeacher: Don't be **afraid of ____** mistakes. Just try!", o: ["make", "making", "to make", "made"], a: 1, e: "【關鍵判斷】**of (介系詞)**\n【解題思維】of 是介系詞，介系詞後面遇到動詞必須改成 **動名詞 V-ing**，選 **making**。" },
      { c: 9, q: "Colleague: Where did Jason go?\nManager: He was very angry, so he left **without ____** goodbye.", o: ["say", "saying", "to say", "said"], a: 1, e: "【關鍵判斷】**without (沒有/未 - 介系詞)**\n【解題思維】without 是介系詞，介系詞後面遇到動詞必須改成 **動名詞 V-ing**，選 **saying**。" },
      { c: 9, q: "Boss: John was late for the meeting today.\nSecretary: I will **tell him not ____** late again.", o: ["be", "being", "to be", "is"], a: 2, e: "【關鍵判斷】**tell (告訴/要求)** 的否定句型\n【解題思維】tell sb to V (叫某人去做...)，其否定形式是在 to 前面加 not，變成 **tell sb not to V**。選 **to be**。" },
      { c: 9, q: "Son: I can't go out to play right now.\nFriend: Why not?\nSon: My mother **asked me ____** my room.", o: ["clean", "cleaning", "to clean", "cleaned"], a: 2, e: "【關鍵判斷】**asked + 人 (要求某人)**\n【解題思維】ask sb to V (要求某人去做...)。後接不定詞，選 **to clean**。" },
      { c: 9, q: "Grandpa: Come here, kids. **Let me ____** you a story about my childhood.", o: ["tell", "telling", "to tell", "told"], a: 0, e: "【關鍵判斷】**Let (使役動詞)**\n【解題思維】Let 是使役動詞，後接受詞再接 **原形動詞**。選 **tell**。" },
      { c: 9, q: "Police: Did you see the suspect?\nWitness: Yes, I **saw him ____** the street just now.", o: ["cross", "crossed", "to cross", "crosses"], a: 0, e: "【關鍵判斷】**saw (感官動詞)**\n【解題思維】saw 是感官動詞，主動看見後接原形動詞 (或V-ing)。選項只有 **cross** 符合文法。" },
      { c: 9, q: "Guest: The party is wonderful. **Thank you for ____** me.", o: ["invite", "inviting", "to invite", "invited"], a: 1, e: "【關鍵判斷】**for (介系詞)**\n【解題思維】for 是介系詞，介系詞後面遇到動詞必須改成 **動名詞 V-ing**，選 **inviting**。" },
      { c: 9, q: "Teacher: You have to witness it with your own eyes. As the saying goes, **To see is ____**.", o: ["believe", "believing", "to believe", "believed"], a: 2, e: "【關鍵判斷】**To see (不定詞作主詞)**\n【解題思維】主詞是不定詞(To see)，主詞補語為了文法對稱也習慣使用不定詞 **to believe** (百聞不如一見)。" }
    ];

    function App() {
      const [gameState, setGameState] = useState('home'); // 'home', 'quiz', 'result'
      const [currentQuestions, setCurrentQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [userHistory, setUserHistory] = useState([]); 
      const [selectedOption, setSelectedOption] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);
      const [selectedCategoryTitle, setSelectedCategoryTitle] = useState("");

      const renderText = (text, showHighlight) => {
        if (!text) return null;
        const parts = text.split(/(\*\*.*?\*\*)/g);
        return parts.map((part, index) => {
          if (part.startsWith('**') && part.endsWith('**')) {
            const content = part.slice(2, -2);
            if (showHighlight) {
              return (
                <span key={index} className="text-rose-600 font-bold bg-rose-50 border-b-[3px] border-rose-500 px-1 mx-0.5 rounded shadow-sm">
                  {content}
                </span>
              );
            } else {
              return <span key={index}>{content}</span>;
            }
          }
          return <span key={index}>{part}</span>;
        });
      };

      const startQuiz = (categoryIndex) => {
        let quizSet = [];
        if (categoryIndex === 'all') {
          const shuffled = [...RAW_QUESTIONS].sort(() => 0.5 - Math.random());
          quizSet = shuffled.slice(0, 25);
          setSelectedCategoryTitle("綜合隨機特訓 (25題)");
        } else {
          quizSet = RAW_QUESTIONS.filter(q => q.c === categoryIndex);
          setSelectedCategoryTitle(`${CATEGORIES[categoryIndex]} 特訓`);
        }
        
        setCurrentQuestions(quizSet);
        setCurrentIndex(0);
        setScore(0);
        setUserHistory([]);
        setSelectedOption(null);
        setIsAnswered(false);
        setGameState('quiz');
      };

      const handleSelectOption = (index) => {
        if (isAnswered) return;
        setSelectedOption(index);
        setIsAnswered(true);
        
        const currentQ = currentQuestions[currentIndex];
        const isCorrect = index === currentQ.a;
        
        if (isCorrect) setScore(prev => prev + 1);
        
        setUserHistory(prev => [...prev, {
          question: currentQ.q,
          options: currentQ.o,
          correctAnswer: currentQ.a,
          userAnswer: index,
          explanation: currentQ.e,
          categoryName: CATEGORIES[currentQ.c]
        }]);
      };

      const nextQuestion = () => {
        if (currentIndex + 1 < currentQuestions.length) {
          setCurrentIndex(prev => prev + 1);
          setSelectedOption(null);
          setIsAnswered(false);
        } else {
          setGameState('result');
        }
      };

      if (gameState === 'home') {
        return (
          <div className="min-h-screen p-4 md:p-8">
            <div className="max-w-4xl mx-auto">
              <header className="mb-10 text-center mt-6">
                <h1 className="text-3xl md:text-4xl font-bold text-indigo-700 mb-3 flex items-center justify-center gap-3">
                  <IconBookOpen size={36} />
                  國中英文文法特訓系統
                </h1>
                <p className="text-slate-500">涵蓋 B1~B6 必考核心文法，共 500 題會考級精選題庫</p>
              </header>

              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div 
                  onClick={() => startQuiz('all')}
                  className="col-span-1 md:col-span-2 lg:col-span-3 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl p-6 text-white cursor-pointer shadow-lg hover:shadow-xl transition-transform hover:-translate-y-1"
                >
                  <h2 className="text-2xl font-bold mb-2 flex items-center gap-2">
                    <IconAward size={28} /> 綜合隨機測驗 (25題)
                  </h2>
                  <p className="opacity-90">從所有單元中隨機挑選 25 題（每題 4 分，滿分 100 分），測驗並統計你的弱點單元！</p>
                </div>

                {CATEGORIES.map((cat, idx) => (
                  <div 
                    key={idx} 
                    onClick={() => startQuiz(idx)}
                    className="bg-white rounded-xl p-5 border border-slate-200 shadow-sm hover:shadow-md cursor-pointer transition-all hover:border-indigo-300 group"
                  >
                    <div className="flex justify-between items-center mb-2">
                      <h3 className="font-bold text-lg text-slate-700 group-hover:text-indigo-600 transition-colors">{cat}</h3>
                      <span className="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2 py-1 rounded-full">
                        50 題
                      </span>
                    </div>
                    <div className="flex items-center text-sm text-slate-500 mt-4 group-hover:text-indigo-500 transition-colors">
                      開始練習 <IconChevronRight size={16} className="ml-1" />
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'quiz') {
        const currentQ = currentQuestions[currentIndex];
        const progress = ((currentIndex) / currentQuestions.length) * 100;

        return (
          <div className="min-h-screen p-4 flex flex-col items-center pt-10 md:pt-20">
            <div className="w-full max-w-2xl">
              <div className="flex justify-between items-center mb-4">
                <button onClick={() => setGameState('home')} className="text-slate-500 hover:text-indigo-600 flex items-center text-sm font-medium transition-colors">
                  <IconHome size={16} className="mr-1" /> 回首頁
                </button>
                <span className="text-sm font-bold text-indigo-600 bg-indigo-100 px-3 py-1 rounded-full">
                  {selectedCategoryTitle}
                </span>
                <span className="text-sm font-medium text-slate-500">
                  {currentIndex + 1} / {currentQuestions.length}
                </span>
              </div>
              
              <div className="w-full bg-slate-200 rounded-full h-2.5 mb-8 overflow-hidden">
                <div className="bg-indigo-600 h-2.5 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
              </div>

              <div className="bg-white rounded-2xl shadow-lg p-6 md:p-10 border border-slate-100">
                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">
                  {CATEGORIES[currentQ.c]}
                </span>
                <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-8 leading-relaxed whitespace-pre-line">
                  {renderText(currentQ.q, isAnswered)}
                </h2>

                <div className="space-y-3">
                  {currentQ.o.map((opt, idx) => {
                    let btnStyle = "bg-slate-50 border-slate-200 text-slate-700 hover:bg-indigo-50 hover:border-indigo-300";
                    
                    if (isAnswered) {
                      if (idx === currentQ.a) {
                        btnStyle = "bg-emerald-50 border-emerald-500 text-emerald-700";
                      } else if (idx === selectedOption) {
                        btnStyle = "bg-rose-50 border-rose-500 text-rose-700";
                      } else {
                        btnStyle = "bg-slate-50 border-slate-200 text-slate-400 opacity-60";
                      }
                    }

                    return (
                      <button
                        key={idx}
                        onClick={() => handleSelectOption(idx)}
                        disabled={isAnswered}
                        className={`w-full text-left p-4 rounded-xl border-2 font-medium transition-all duration-200 flex justify-between items-center ${btnStyle}`}
                      >
                        <span>{String.fromCharCode(65 + idx)}. {opt}</span>
                        {isAnswered && idx === currentQ.a && <IconCheckCircle className="text-emerald-500" size={20} />}
                        {isAnswered && idx === selectedOption && idx !== currentQ.a && <IconXCircle className="text-rose-500" size={20} />}
                      </button>
                    );
                  })}
                </div>

                {isAnswered && (
                  <div className="mt-8 transition-opacity duration-500">
                    <div className={`p-5 rounded-xl border ${selectedOption === currentQ.a ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`}>
                      <h3 className={`font-bold flex items-center gap-2 mb-2 ${selectedOption === currentQ.a ? 'text-emerald-700' : 'text-rose-700'}`}>
                        {selectedOption === currentQ.a ? <IconCheckCircle size={20} /> : <IconAlertCircle size={20} />}
                        {selectedOption === currentQ.a ? '答對了！' : '答錯了！'}
                      </h3>
                      
                      <div className="text-slate-700 text-sm leading-relaxed whitespace-pre-line mt-4">
                        <span className="font-black text-slate-800 mr-2 bg-slate-200 px-2 py-1 rounded text-xs tracking-widest">老師詳解</span>
                        <div className="mt-3 text-base leading-loose">
                          {renderText(currentQ.e, true)}
                        </div>
                      </div>
                    </div>
                    
                    <button
                      onClick={nextQuestion}
                      className="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-md hover:shadow-lg"
                    >
                      {currentIndex + 1 === currentQuestions.length ? '查看測驗結果' : '下一題'} <IconArrowRight size={20} />
                    </button>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'result') {
        const percentage = Math.round((score / currentQuestions.length) * 100);
        const incorrectAnswers = userHistory.filter(h => h.userAnswer !== h.correctAnswer);

        // 弱點分析統計
        const mistakeStats = incorrectAnswers.reduce((acc, curr) => {
          acc[curr.categoryName] = (acc[curr.categoryName] || 0) + 1;
          return acc;
        }, {});
        const sortedMistakeStats = Object.entries(mistakeStats).sort((a, b) => b[1] - a[1]);

        return (
          <div className="min-h-screen p-4 py-10 md:py-16">
            <div className="max-w-3xl mx-auto">
              <div className="bg-white rounded-3xl shadow-xl overflow-hidden mb-8 text-center border border-slate-100">
                <div className="bg-gradient-to-r from-indigo-500 to-purple-600 p-8 text-white">
                  <h2 className="text-2xl font-bold mb-2">測驗完成！</h2>
                  <p className="opacity-90">{selectedCategoryTitle}</p>
                </div>
                <div className="p-10">
                  <div className="relative inline-flex items-center justify-center mb-6">
                    <svg className="w-40 h-40 transform -rotate-90">
                      <circle cx="80" cy="80" r="70" stroke="currentColor" strokeWidth="12" fill="transparent" className="text-slate-100" />
                      <circle 
                        cx="80" cy="80" r="70" stroke="currentColor" strokeWidth="12" fill="transparent" 
                        strokeDasharray="440" strokeDashoffset={440 - (440 * percentage) / 100}
                        className={`${percentage >= 80 ? 'text-emerald-500' : percentage >= 60 ? 'text-amber-500' : 'text-rose-500'} transition-all duration-1000 ease-out`} 
                      />
                    </svg>
                    <div className="absolute flex flex-col items-center justify-center text-4xl font-black text-slate-700">
                      {percentage}<span className="text-lg text-slate-400">分</span>
                    </div>
                  </div>
                  <p className="text-xl font-medium text-slate-600 mb-8">
                    答對 {score} 題 / 共 {currentQuestions.length} 題
                  </p>

                  {/* 弱點分析：統計錯題分布 */}
                  {incorrectAnswers.length > 0 && (
                    <div className="mb-8 bg-amber-50 rounded-2xl p-6 border border-amber-200 text-left">
                      <h3 className="text-lg font-bold text-amber-800 mb-4 flex items-center gap-2">
                        <IconAlertCircle size={24} /> 弱點分析：錯題單元分布
                      </h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {sortedMistakeStats.map(([cat, count], idx) => (
                          <div key={idx} className="flex justify-between items-center bg-white p-3 rounded-xl border border-amber-100 shadow-sm">
                            <span className="font-medium text-slate-700">{cat}</span>
                            <span className="bg-rose-100 text-rose-700 font-bold px-3 py-1 rounded-full text-sm">
                              錯 {count} 題
                            </span>
                          </div>
                        ))}
                      </div>
                      <p className="text-sm text-amber-700 mt-4">💡 建議可以針對上述單元，回到首頁進行該單元的特訓加強喔！</p>
                    </div>
                  )}
                  
                  <div className="flex flex-col sm:flex-row gap-4 justify-center">
                    <button 
                      onClick={() => setGameState('home')}
                      className="px-8 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors flex items-center justify-center gap-2"
                    >
                      <IconHome size={20} /> 回首頁
                    </button>
                    <button 
                      onClick={() => startQuiz(selectedCategoryTitle.includes('綜合') ? 'all' : CATEGORIES.indexOf(selectedCategoryTitle.replace(' 特訓', '')))}
                      className="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-colors shadow-md hover:shadow-lg flex items-center justify-center gap-2"
                    >
                      <IconRotateCcw size={20} /> 再測一次
                    </button>
                  </div>
                </div>
              </div>

              {incorrectAnswers.length > 0 ? (
                <div>
                  <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <IconAlertCircle className="text-rose-500" size={28} /> 錯題訂正 ({incorrectAnswers.length} 題)
                  </h3>
                  <div className="space-y-4">
                    {incorrectAnswers.map((item, idx) => (
                      <div key={idx} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-left">
                        <span className="text-xs font-bold text-indigo-500 uppercase tracking-wider mb-2 block">
                          {item.categoryName}
                        </span>
                        <div className="font-bold text-slate-800 mb-4 text-lg whitespace-pre-line">
                          {renderText(item.question, true)}
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4 text-sm">
                          <div className="flex items-start gap-2 p-3 bg-rose-50 rounded-lg text-rose-700 border border-rose-100">
                            <IconXCircle size={18} className="mt-0.5 shrink-0" />
                            <div>
                              <div className="font-bold mb-1">你的答案</div>
                              {item.options[item.userAnswer]}
                            </div>
                          </div>
                          <div className="flex items-start gap-2 p-3 bg-emerald-50 rounded-lg text-emerald-700 border border-emerald-100">
                            <IconCheckCircle size={18} className="mt-0.5 shrink-0" />
                            <div>
                              <div className="font-bold mb-1">正確答案</div>
                              {item.options[item.correctAnswer]}
                            </div>
                          </div>
                        </div>
                        
                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-100 text-sm text-slate-600 whitespace-pre-line">
                          <span className="font-black text-slate-800 mr-2 bg-slate-200 px-2 py-1 rounded text-xs tracking-widest">老師詳解</span>
                          <div className="mt-3 text-base leading-loose">
                            {renderText(item.explanation, true)}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="text-center py-10">
                  <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-100 text-emerald-600 mb-4">
                    <IconAward size={32} />
                  </div>
                  <h3 className="text-xl font-bold text-slate-800">太棒了！全對！</h3>
                  <p className="text-slate-500 mt-2">你的文法觀念非常清楚，繼續保持！</p>
                </div>
              )}
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
