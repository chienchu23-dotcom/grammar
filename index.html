<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國中英文文法特訓系統</title>
  
  <!-- 引入 Tailwind CSS 進行樣式排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel 以便在瀏覽器中直接編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ==========================================
    // 圖示元件
    // ==========================================
    const IconBookOpen = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    );
    const IconCheckCircle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    );
    const IconXCircle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    );
    const IconArrowRight = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    );
    const IconRotateCcw = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    );
    const IconAward = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
    );
    const IconChevronRight = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>
    );
    const IconAlertCircle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    );
    const IconHome = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    );

    // ==========================================
    // 題庫資料 (共 10 大類，已優化排除雙重答案爭議)
    // ==========================================
    const CATEGORIES = [
      "時態全集", "三大子句", "被動語態", "特殊動詞", "花費動詞", 
      "情緒形容詞", "句型結構", "代名詞與介系詞", "比較級與最高級", "動名詞與不定詞"
    ];

    const RAW_QUESTIONS = [
      // 1. 時態全集
      { c: 0, q: "Alice: What are you looking at, Bob? You look so focused.\nBob: **Listen!** The birds ____ beautifully in the trees. I'm trying to record their voices.", o: ["sing", "are singing", "sang", "have sung"], a: 1, e: "【關鍵判斷】**Listen!** (聽！)\n【解題思維】Bob 說「Listen!」(聽！)，要求對方注意當下的聲音，這是一個強烈的提示，暗示鳥兒唱歌的動作就在說話的當下發生。在英文中，描述說話當下正在進行的動作，必須使用**現在進行式 (be 動詞 + V-ing)**。因此答案選 **are singing**。" },
      { c: 0, q: "Mom: Why are you still standing outside the house? It's freezing!\nSon: I ____ my keys on the bus. I **can't open the door right now**.", o: ["lose", "had lost", "have lost", "was losing"], a: 2, e: "【關鍵判斷】**can't open the door right now** (現在無法開門)\n【解題思維】這題考的是會考極常出現的「過去動作對現在造成影響」。兒子現在無法開門是**現在的結果**，這表示他過去弄丟鑰匙的影響一直持續到現在。這種「跨越過去與現在」的關聯，必須使用**現在完成式 (have/has + Vp.p.)**。不能選 had lost (過去的過去)，因為現在無法開門是「現在」的結果。" },
      { c: 0, q: "John: I heard your brother loves traveling.\nMary: Yes, he ____ to Japan three times **so far**, and he **plans to visit again** next year.", o: ["goes", "went", "has been", "has gone"], a: 2, e: "【關鍵判斷】**so far** (到目前為止) 與 **plans to visit again** (計畫再去)\n【解題思維】1. 看到 **so far** 就知道要搭配**現在完成式**，表示從過去到現在累積的經驗（去了三次）。\n2. has been to 表「去過（已經回來）」，has gone to 表「去了（還沒回來）」。因為哥哥計畫明年再去，代表他現在人不在日本，所以用 **has been**。" },
      { c: 0, q: "We ran as fast as we could to catch the 9:00 train to Taipei. However, **by the time we got to the station**, the train ____.", o: ["leaves", "was leaving", "has left", "had left"], a: 3, e: "【關鍵判斷】**got to the station** (到達車站 - 過去式)\n【解題思維】這是一題標準的「時間軸推論題」。我們「到達車站 (got)」是過去發生的事，而火車在我們到達「之前」就已經開走了。在英文中，發生在「過去的過去」的動作，必須使用**過去完成式 (had + Vp.p.)**。" },
      { c: 0, q: "Police: What ____ you ____ **at 8:00 last night**?\nSuspect: I **was having** dinner with my family at a restaurant.", o: ["do; do", "did; do", "were; doing", "are; doing"], a: 2, e: "【關鍵判斷】**at 8:00 last night** (昨晚八點) 與答句的 **was having**\n【解題思維】1. 「昨晚八點」是一個**明確的過去時間點**，當詢問在過去某個特定時間點「正在」做什麼時，需用**過去進行式 (was/were + V-ing)**。\n2. 嫌犯回答 `I was having...` 也是過去進行式，前後時態必須對稱，故選 **were; doing**。" },
      { c: 0, q: "Lisa: Look! The sky is getting so dark and the wind is blowing hard.\nTom: Yeah, I think it **____ soon**. We'd better go home now.", o: ["rains", "rained", "is going to rain", "has rained"], a: 2, e: "【關鍵判斷】**getting so dark** (天空變暗) 與 **soon** (很快)\n【解題思維】情境推論題。有明確跡象顯示即將發生的事 (烏雲密布、颳強風)，英文習慣使用 **be going to** 來表示推測的未來。" },
      { c: 0, q: "Peter: Have you seen my dictionary? I can't find it anywhere.\nJane: Oh, I ____ it on your desk **a few minutes ago**. Go check it again.", o: ["see", "saw", "have seen", "was seeing"], a: 1, e: "【關鍵判斷】**a few minutes ago** (幾分鐘前)\n【解題思維】這是一個非常明確的過去時間點。描述在過去特定時間點發生的單一動作，動詞必須使用**過去簡單式 (saw)**。" },
      { c: 0, q: "Mom: **Why is the kitchen so messy?**\nSon: Sorry, mom. I ____ to make a cake for Dad's birthday, but I accidentally dropped the flour.", o: ["try", "tried", "was trying", "have tried"], a: 2, e: "【關鍵判斷】**Why is the kitchen so messy?** (現在為何很亂)\n【解題思維】媽媽問現在的狀況，兒子解釋是因為「剛才**正在**嘗試做蛋糕」的過程導致的。強調過去某段時間持續進行的動作，用**過去進行式 (was trying)**最符合語境。" },
      { c: 0, q: "Amy: Is your brother still studying in the US?\nBob: No, he ____ back to Taiwan. He **is working in Taipei now**.", o: ["comes", "came", "has come", "was coming"], a: 2, e: "【關鍵判斷】**is working in Taipei now** (現在在台北工作)\n【解題思維】會考經典對話。哥哥現在在台北工作，代表「已經回到台灣」，過去發生的動作對現在造成了影響或改變狀態，必須使用**現在完成式 (has come)**。" },
      { c: 0, q: "**When the teacher walked into the classroom**, the students ____ loudly. They didn't even notice her until she knocked on the desk.", o: ["talk", "talked", "were talking", "have talked"], a: 2, e: "【關鍵判斷】**When the teacher walked into** (當老師走進教室時 - 瞬間動作)\n【解題思維】老師走進教室 (短暫動作) 的時候，學生們「**正在**」大聲講話 (持續動作)。表示過去某個時間點正在進行的動作，用**過去進行式 (were talking)**。" },
      { c: 0, q: "Dear Diary, it has been raining for a whole week. I really **hope** the sun ____ soon, so I can go out and play basketball.", o: ["shines", "shone", "has shone", "will shine"], a: 3, e: "【關鍵判斷】**hope** (希望) 與 **soon** (很快地)\n【解題思維】日記情境題。hope 後面通常接代表未來的事件，期待太陽即將露臉，這是一個對未來的預期，使用**未來簡單式 (will shine)**。" },
      { c: 0, q: "Reporter: Excuse me, sir. **How long** ____ you ____ in this town?\nResident: **For over twenty years**. I love the quiet life here.", o: ["do; live", "did; live", "have; lived", "are; living"], a: 2, e: "【關鍵判斷】**How long** (多久) 與 **For over twenty years** (超過二十年)\n【解題思維】How long 搭配 for + 一段時間，表示動作從過去一直持續到現在的時間長度，這類句型必須使用**現在完成式 (have/has + Vp.p.)**。" },
      { c: 0, q: "**Before Sarah went to bed** last night, she ____ all her homework and packed her schoolbag for the next day.", o: ["finishes", "was finishing", "has finished", "had finished"], a: 3, e: "【關鍵判斷】**Before Sarah went to bed** (在莎拉上床睡覺之前)\n【解題思維】「上床睡覺」(went to bed) 是過去式，而「完成作業」發生在睡覺之前。發生在「過去的過去」的動作，必須使用**過去完成式 (had finished)**。" },
      { c: 0, q: "I ____ this movie twice **before**, but I wouldn't mind watching it again because the story is so touching.", o: ["see", "saw", "have seen", "am seeing"], a: 2, e: "【關鍵判斷】**twice before** (以前曾有過兩次)\n【解題思維】before (以前) 或次數 (twice) 常用來表示「到目前為止的經驗」，這類表達經驗的句型固定搭配**現在完成式 (have seen)**。" },
      { c: 0, q: "Mr. Smith ____ in this company **since he graduated from college in 2010**. He is now the general manager.", o: ["works", "worked", "has worked", "is working"], a: 2, e: "【關鍵判斷】**since + 過去時間點** (自從 2010 年畢業起)\n【解題思維】since 帶出一個過去的起點，表示動作從過去一直持續到現在 (現在是總經理)。這種「從過去延續到現在」的狀態，必須使用**現在完成式 (has worked)**。" },
      { c: 0, q: "**As soon as** the famous singer ____ on the stage, all the fans **started screaming** and waving their hands happily.", o: ["steps", "stepped", "has stepped", "was stepping"], a: 1, e: "【關鍵判斷】**As soon as** (一...就...) 與 **started screaming** (開始尖叫 - 過去式)\n【解題思維】As soon as 連接兩個緊密相連的動作。粉絲開始尖叫 (started) 是過去式，歌手登台也是同時發生的過去動作，故使用**過去簡單式 (stepped)**。" },
      { c: 0, q: "My grandfather **usually** ____ a cup of hot tea while he is reading the morning newspaper in the living room.", o: ["drink", "drinks", "drank", "is drinking"], a: 1, e: "【關鍵判斷】**usually** (通常)\n【解題思維】usually 表達現在平常的習慣動作。主詞 My grandfather 為第三人稱單數，所以一般動詞字尾必須加 s，答案選 **drinks**。" },
      { c: 0, q: "Jack: Are we still going camping this weekend?\nLily: Yes, we ____ to the mountains **if the weather is sunny and warm**.", o: ["go", "went", "will go", "have gone"], a: 2, e: "【關鍵判斷】**if the weather is...** (如果天氣... - 條件副詞子句)\n【解題思維】在條件子句 (if...) 中，規定要用「現在式代替未來式」，但主要子句仍須維持原來的**未來式 (will go)**。" },
      { c: 0, q: "The little boy **was crying** sadly in the park because his favorite balloon ____ away into the sky.", o: ["flies", "flew", "has flown", "had flown"], a: 3, e: "【關鍵判斷】**was crying** (正在哭 - 過去式) 與 **because** (因為)\n【解題思維】男孩在哭 (was crying) 是過去式，而氣球飛走發生在哭之前。強調原因發生在更早以前 (過去的過去)，必須用**過去完成式 (had flown)**。" },
      { c: 0, q: "Mom: Have you fed the dog yet?\nSon: Yes, Mom. I ____ him **thirty minutes ago**. He is sleeping now.", o: ["feed", "fed", "have fed", "was feeding"], a: 1, e: "【關鍵判斷】**thirty minutes ago** (三十分鐘前)\n【解題思維】雖然媽媽問句是用現在完成式 (yet)，但兒子的答句中有明確的過去時間點 (ago)，看到 ago 就要秒選**過去簡單式 (fed)**。" },
      { c: 0, q: "I ____ to the radio **when my phone rang**.", o: ["listen", "listened", "was listening", "am listening"], a: 2, e: "【關鍵判斷】**when my phone rang** (當電話響起時)\n【解題思維】電話響 (過去短暫動作) 的時候，我「正在」聽廣播 (過去持續動作)。持續動作被打斷，要用**過去進行式 (was listening)**。" },
      { c: 0, q: "He ____ his homework **yet**. He **is still writing** it.", o: ["finishes", "finished", "hasn't finished", "doesn't finish"], a: 2, e: "【關鍵判斷】**yet** (尚未) 與 **is still writing** (還在寫)\n【解題思維】yet 通常出現在否定句或疑問句的句尾，搭配**現在完成式的否定 (hasn't/haven't + Vp.p.)**，表示到目前為止還沒完成。" },
      { c: 0, q: "**If it ____ tomorrow**, we will stay at home.", o: ["rains", "will rain", "rained", "is raining"], a: 0, e: "【關鍵判斷】**If** (如果 - 條件子句) 與 **tomorrow** (明天)\n【解題思維】這題是會考必考重點！條件子句 (If...) 中，規定必須使用**現在簡單式 (rains)** 來代替未來式，絕對不能選 will rain。" },
      { c: 0, q: "The sun ____ in the east and sets in the west.", o: ["rise", "rises", "rose", "is rising"], a: 1, e: "【關鍵判斷】太陽東升西落的**自然科學事實**\n【解題思維】不變的真理與自然科學事實，永遠不受時間限制，一律使用**現在簡單式**。主詞 The sun 為單數，動詞加 s (rises)。" },
      { c: 0, q: "**Look!** The baby ____ peacefully in the bed.", o: ["sleeps", "slept", "is sleeping", "has slept"], a: 2, e: "【關鍵判斷】**Look!** (看！)\n【解題思維】句首出現 Look! 或 Listen! 是一個強烈暗示，要你注意當下正在發生的事情。因此搭配**現在進行式 (is sleeping)**。" },
      { c: 0, q: "I ____ an apple and drank some milk **yesterday morning**.", o: ["eat", "ate", "have eaten", "was eating"], a: 1, e: "【關鍵判斷】**yesterday morning** (昨天早上)\n【解題思維】yesterday morning 是一個非常明確的過去時間點，沒有延續性，因此動詞直接使用**過去簡單式 (ate)**。" },
      { c: 0, q: "We ____ for you **for two hours**! Where have you been?", o: ["wait", "waited", "have waited", "are waiting"], a: 2, e: "【關鍵判斷】**for two hours** (長達兩小時)\n【解題思維】for + 一段時間，表示動作從過去一直持續到現在 (等了兩個小時，現在還在等)。這種狀態必須搭配**現在完成式 (have waited)**。" },
      { c: 0, q: "**When I was a child**, I ____ in a small village.", o: ["live", "lived", "have lived", "was living"], a: 1, e: "【關鍵判斷】**When I was a child** (當我還是個孩子時)\n【解題思維】描述過去的常態、習慣或狀態 (小時候長期的居住地)，屬於過去的事實，使用**過去簡單式 (lived)** 即可。" },
      { c: 0, q: "She ____ here for five years **by the end of next month**.", o: ["will work", "works", "is working", "will have worked"], a: 3, e: "【關鍵判斷】**by the end of next month** (到下個月底為止)\n【解題思維】by + 未來時間點，表示「到未來某個時間點為止，將會完成或累積的狀態」。這種句型固定搭配**未來完成式 (will have + Vp.p.)**。" },
      { c: 0, q: "Who ____ the window? **It's broken now**.", o: ["breaks", "broke", "has broken", "is breaking"], a: 1, e: "【關鍵判斷】**Who ____** (誰打破的) 與 **It's broken now** (現在破了)\n【解題思維】打破窗戶是一個瞬間發生的單一事件，動作已經在過去結束了，所以疑問句使用**過去簡單式 (broke)**。" },
      { c: 0, q: "I ____ you **as soon as I get home**.", o: ["call", "called", "will call", "have called"], a: 2, e: "【關鍵判斷】**as soon as I get home** (我一到家 - 現在式代未來式)\n【解題思維】as soon as 引導的時間副詞子句中，用現在式 (get) 代替未來式；但前面的主要子句不受限制，仍須表達未來的動作，用**未來式 (will call)**。" },
      { c: 0, q: "**Have you ever** ____ to London?", o: ["go", "went", "been", "gone"], a: 2, e: "【關鍵判斷】**Have you ever...** (你曾經...嗎)\n【解題思維】這是詢問「人生經驗」的標準句型。表示「曾經去過某地 (且人已回來)」，固定用法是 **have been to** 某地。" },
      { c: 0, q: "**Next year**, my sister ____ 15 years old.", o: ["is", "was", "has been", "will be"], a: 3, e: "【關鍵判斷】**Next year** (明年)\n【解題思維】描述未來一定會發生的客觀事實 (明年會長大變成 15 歲)，直接使用**未來簡單式 (will be)**。" },
      { c: 0, q: "I ____ this movie **before**. Let's watch something else.", o: ["see", "saw", "have seen", "am seeing"], a: 2, e: "【關鍵判斷】**before** (以前)\n【解題思維】句尾出現 before，表示到目前為止「曾經有過」的經驗，影響到現在不想再看。表達經驗與結果，使用**現在完成式 (have seen)**。" },
      { c: 0, q: "The train ____ at 9:00 AM **every day**.", o: ["leave", "leaves", "left", "is leaving"], a: 1, e: "【關鍵判斷】**every day** (每天)\n【解題思維】every day 表示習慣性、規律性會反覆發生的動作 (如火車時刻表)，必須使用**現在簡單式**。主詞 train 為單數，選 leaves。" },
      { c: 0, q: "I ____ my finger! **It hurts a lot**.", o: ["cut", "was cutting", "have cut", "had cut"], a: 2, e: "【關鍵判斷】**It hurts a lot** (現在很痛)\n【解題思維】手指被切到是剛剛發生的事，但它造成的結果「現在還在痛」！這種過去動作對現在造成強烈影響的情況，用**現在完成式 (have cut)**。" },
      { c: 0, q: "He **usually** ____ to work, but today he is taking the bus.", o: ["drive", "drives", "drove", "is driving"], a: 1, e: "【關鍵判斷】**usually** (通常)\n【解題思維】usually 是頻率副詞，用來表達平常的習慣，習慣動作搭配**現在簡單式**。主詞 He 是單數，動詞加 s 選 drives。" },
      { c: 0, q: "They ____ each other **for 10 years**.", o: ["know", "knew", "have known", "are knowing"], a: 2, e: "【關鍵判斷】**for 10 years** (長達十年)\n【解題思維】for + 一段時間表示持續到現在的狀態，需用現在完成式。注意：know 屬於「狀態動詞」，**絕對不能用進行式** (沒有 are knowing)，故選 **have known**。" },
      { c: 0, q: "It ____ a lot in Taipei **in winter**.", o: ["rain", "rains", "rained", "is raining"], a: 1, e: "【關鍵判斷】**in winter** (在冬天)\n【解題思維】描述某個地區長期的氣候特徵或客觀事實，不受特定時間限制，一律使用**現在簡單式**。天氣代名詞 It 是單數，選 rains。" },
      { c: 0, q: "He **said** that he ____ his keys **the day before**.", o: ["lost", "loses", "has lost", "had lost"], a: 3, e: "【關鍵判斷】**said** (說 - 過去式) 與 **the day before** (前一天)\n【解題思維】他說 (said) 是過去式，而弄丟鑰匙發生在「說」的前一天，也就是「過去的過去」。這種時態要用**過去完成式 (had lost)**。" },
      { c: 0, q: "I ____ to music **right now**.", o: ["listen", "listened", "am listening", "have listened"], a: 2, e: "【關鍵判斷】**right now** (就在此刻)\n【解題思維】right now 是一個強烈的時間副詞，明確指出動作在說話的當下「正在進行」，因此必須使用**現在進行式 (am listening)**。" },
      { c: 0, q: "Tom ____ TV **when his mother came back**.", o: ["watches", "watched", "was watching", "has watched"], a: 2, e: "【關鍵判斷】**when his mother came back** (當他媽媽回來時)\n【解題思維】媽媽回來是一個瞬間的過去動作 (came)。在這個瞬間，Tom「正在」做的事 (持續動作) 被打斷或對照，需用**過去進行式 (was watching)**。" },
      { c: 0, q: "My father ____ a new car **next week**.", o: ["buys", "bought", "will buy", "has bought"], a: 2, e: "【關鍵判斷】**next week** (下週)\n【解題思維】next week 是未來的時間點，表示將要發生的計畫或動作，必須使用未來式 **will buy** (或是 is going to buy)。" },
      { c: 0, q: "**Since she left**, I ____ very sad.", o: ["am", "was", "have been", "will be"], a: 2, e: "【關鍵判斷】**Since + 過去式子句** (自從她離開)\n【解題思維】Since (自從) 是現在完成式的超級關鍵字！它標出一個過去的起點，主要子句則必須用**現在完成式 (have been)** 表達持續到現在的狀態。" },
      { c: 0, q: "I ____ homework **at 8:00 last night**.", o: ["do", "did", "was doing", "have done"], a: 2, e: "【關鍵判斷】**at 8:00 last night** (昨晚八點)\n【解題思維】如果只有 last night 用過去簡單式即可，但加上了 at 8:00 變成「過去的精確時間點」，為了強調當時正在進行，要用**過去進行式 (was doing)**。" },
      { c: 0, q: "She ____ to America **twice**.", o: ["goes", "went", "has gone", "has been"], a: 3, e: "【關鍵判斷】**twice** (兩次)\n【解題思維】次數 (once, twice...) 用來表達人生的經驗，固定搭配現在完成式。表示「去過某地且已回來」用 **has been to**，has gone to 是去了還沒回來。" },
      { c: 0, q: "The meeting ____ **before I got to the office**.", o: ["was starting", "starts", "has started", "had started"], a: 3, e: "【關鍵判斷】**before I got to...** (在我抵達之前 - got 是過去式)\n【解題思維】我抵達辦公室是過去的事，而會議在我抵達前就已經開始了。發生在「過去的過去」的動作，必須使用**過去完成式 (had started)**。" },
      { c: 0, q: "They ____ tennis **every Sunday morning**.", o: ["play", "plays", "played", "are playing"], a: 0, e: "【關鍵判斷】**every Sunday morning** (每個星期天早上)\n【解題思維】every 加上時間，表示習慣性、週期性反覆發生的動作，一律使用**現在簡單式**。主詞 They 是複數，動詞不加 s，選 play。" },
      { c: 0, q: "**Look at the dark clouds!** It ____ rain soon.", o: ["will", "is going to", "must", "can"], a: 1, e: "【關鍵判斷】**Look at the dark clouds!** (看那些烏雲！)\n【解題思維】這是會考必考的未來式辨析。當有「看得到的明確跡象 (烏雲)」顯示事情即將發生時，英文習慣使用 **is going to** 而不是 will。" },
      { c: 0, q: "I ____ the book, **so I can lend it to you**.", o: ["am reading", "readed", "have read", "was reading"], a: 2, e: "【關鍵判斷】**so I can lend it to you** (所以我現在可以借你)\n【解題思維】前半句的讀書動作已經做完了，而這個過去的動作對「現在」產生了直接影響 (現在可以借書給你)。有此因果關聯時，用**現在完成式 (have read)**。" },

      // 2. 三大子句
      { c: 1, q: "Tourist: Excuse me. I think I'm lost. **Could you tell me ____?**\nPolice officer: Sure. Just go straight for two blocks, and you'll see it on your right.", o: ["where is the train station", "where the train station is", "the train station is where", "where does the train station be"], a: 1, e: "【關鍵判斷】**Could you tell me + 疑問詞...** (間接問句)\n【解題思維】當問句被包裝在另一個句子中時，稱為「間接問句」(名詞子句)。間接問句必須改回直述句語序：**疑問詞 (where) + 主詞 (the train station) + 動詞 (is)**。" },
      { c: 1, q: "Sally: Do you know **the man ____**?\nKevin: Oh, that's Mr. Lin. He is our new math teacher.", o: ["who is talking to the principal", "whom is talking to the principal", "which is talking to the principal", "whose is talking to the principal"], a: 0, e: "【關鍵判斷】**the man (人)** 與子句缺**主詞**\n【解題思維】先行詞是人 (the man)，關係代名詞必須用 who 或 whom。因為空格後直接接動詞 is talking，代表缺主詞，所以選主格的 **who**。" },
      { c: 1, q: "**The chocolate cake ____ Mary made** for her mother's birthday looked terrible, but it tasted surprisingly good.", o: ["who", "what", "which", "whose"], a: 2, e: "【關鍵判斷】**The chocolate cake (物)** 作為先行詞\n【解題思維】長句主詞修飾。先行詞為沒有生命的物品 (巧克力蛋糕)，用來引導形容詞子句的關係代名詞必須使用 **which** 或是 **that**。" },
      { c: 1, q: "**____ the weather was extremely cold** and windy, the brave climbers still decided to try and reach the top of the mountain.", o: ["Because", "Although", "But", "So"], a: 1, e: "【關鍵判斷】**極度寒冷**卻**仍決定攻頂** (語氣轉折)\n【解題思維】這是一題語意邏輯題。天氣惡劣卻仍去爬山，存在「雖然...但是...」的轉折關係。填入 **Although** 引導讓步副詞子句。注意：英文中 Although 和 But 不能同句。" },
      { c: 1, q: "My sister was very sad because her computer was broken. The real problem was **____ she hadn't saved her report** before it shut down.", o: ["what", "which", "that", "where"], a: 2, e: "【關鍵判斷】**was (be 動詞)** 之後接完整子句\n【解題思維】這是一個名詞子句當作主詞補語 (放在 be 動詞之後) 的句型。用來引導一個「陳述事實」的完整名詞子句，必須使用沒有實際意義但不可省略的 **that**。" },
      { c: 1, q: "Reporter: Sir, can you tell us **____**?\nWitness: Well, I just heard a loud noise and then the car crashed into the tree.", o: ["what happened here", "what did happen here", "here happened what", "what was happened here"], a: 0, e: "【關鍵判斷】**tell us + 名詞子句**\n【解題思維】what 在這裡兼作「疑問詞」與「主詞」，引導名詞子句「發生了什麼事」。因為 what 本身就是主詞，所以語序不需要倒裝，直接寫 **what happened here**。" },
      { c: 1, q: "I will never forget **the small town ____** I spent my childhood. The people there were so friendly and the air was always fresh.", o: ["which", "that", "where", "when"], a: 2, e: "【關鍵判斷】**the small town (地方)** 與子句內**不缺主詞或受詞**\n【解題思維】先行詞是地方，且後面的子句 `I spent my childhood (在那裡)` 結構完整，缺少的是「地方副詞」(in the town)。代替 in which 的關係副詞必須用 **where**。" },
      { c: 1, q: "David is **the only student** in our class **____** got a perfect score on the math test. We are all very proud of him.", o: ["who", "whom", "that", "which"], a: 2, e: "【關鍵判斷】**the only** (唯一的) 修飾先行詞\n【解題思維】會考特殊規則：當先行詞前面有 the only, the same, the very，或是序數、最高級修飾時，關係代名詞強烈建議/必須使用 **that**。" },
      { c: 1, q: "Cindy didn't go to the movies with us last night **____ she had to stay home** and prepare for her science test.", o: ["so", "because", "although", "but"], a: 1, e: "【關鍵判斷】**沒去看電影** 與 **必須留在家念書** 的邏輯關聯\n【解題思維】後半句解釋了沒去看電影的「原因」，所以要填入表原因的連接詞 **because** (因為)。注意：Because 和 So 不能同時出現在一個句子裡。" },
      { c: 1, q: "The clerk asked the customer **____ he wanted to pay** in cash or by credit card.", o: ["that", "whether", "weather", "if"], a: 1, e: "【關鍵判斷】**asked (詢問)** 與後方的 **or** (還是)\n【解題思維】asked 帶出的名詞子句通常表示疑問或不確定。看到後面的 or (還是)，就知道這是 whether... or... 的固定搭配，表「是否...還是...」。" },
      { c: 1, q: "I am **not quite sure ____** the museum is open on Mondays. Let me check it on the internet for you.", o: ["that", "if", "what", "which"], a: 1, e: "【關鍵判斷】**not quite sure** (不是很確定)\n【解題思維】因為語氣是「不確定」，所以後面接的名詞子句必須由表示「是否」的連接詞引導。除了 whether 之外，口語常使用 **if** 來表示「是否」。" },
      { c: 1, q: "**The stray dog ____ leg** was badly injured was finally rescued by some kind-hearted students yesterday.", o: ["who", "which", "whose", "that"], a: 2, e: "【關鍵判斷】**dog (狗)** 與後面的 **leg (腿)**\n【解題思維】前後名詞存在「所屬關係」(那隻流浪狗的腿)。在關係代名詞中，用來表示所有格「...的」的字只有一個，就是 **whose** (不分人或物皆可使用)。" },
      { c: 1, q: "Everyone in the office knows **the reason ____** the boss was so angry this morning. Someone made a big mistake in the report.", o: ["what", "which", "where", "why"], a: 3, e: "【關鍵判斷】**the reason (原因)** 作為先行詞\n【解題思維】當先行詞是表示原因的 the reason 時，後面固定搭配引導原因的關係副詞 **why** (等於 for which)。" },
      { c: 1, q: "Please don't worry about me. I will call you **as soon as I ____** at the hotel in Tokyo safely.", o: ["arrive", "arrived", "will arrive", "am arriving"], a: 0, e: "【關鍵判斷】**as soon as** (一...就...) 與未來的動作\n【解題思維】會考大重點！as soon as, when, if 引導的「副詞子句」中，如果指的是未來發生的事，規定必須用「**現在式 (arrive)**」來代替未來式。" },
      { c: 1, q: "**The new smartphone ____** I bought online last week suddenly stopped working this morning. I need to return it.", o: ["who", "that", "where", "whose"], a: 1, e: "【關鍵判斷】**smartphone (物)** 作為先行詞\n【解題思維】先行詞是沒有生命的物品，且在關係子句中當作買 (bought) 的受詞，關係代名詞必須用 **which** 或是 **that**。" },
      { c: 1, q: "Can you believe **____ happened to me yesterday**? I won the first prize in the lottery and got ten thousand dollars!", o: ["that", "which", "what", "where"], a: 2, e: "【關鍵判斷】**believe (動詞)** 後面缺受詞，且子句缺主詞\n【解題思維】複合關係代名詞 **what** 相當於 the thing(s) which。它自己本身包含了先行詞，可以引導名詞子句當作 believe 的受詞，並在子句中作 happened 的主詞。" },
      { c: 1, q: "I am looking for a quiet coffee shop **____ I can read my book** and relax for the whole afternoon.", o: ["which", "that", "where", "when"], a: 2, e: "【關鍵判斷】**coffee shop (地方)** 與子句結構完整\n【解題思維】先行詞是地方，且後面的子句 `I can read my book` 結構完整，不缺主受詞。這裡需要的是代替地方副詞 (in the shop)，故用關係副詞 **where**。" },
      { c: 1, q: "**The horror movie ____** we watched last night was so scary that I couldn't sleep at all.", o: ["who", "which", "where", "whose"], a: 1, e: "【關鍵判斷】**movie (物)** 作為先行詞\n【解題思維】先行詞是電影(物)，在形容詞子句中作 watched 的受詞，關係代名詞使用 **which** 或 **that** (作為受詞時甚至可以省略)。" },
      { c: 1, q: "**____ it is raining heavily outside**, we have to cancel our picnic in the park and stay at home.", o: ["Because", "Although", "But", "So"], a: 0, e: "【關鍵判斷】**下大雨** 與 **取消野餐** 的因果關係\n【解題思維】前半句「外面下大雨」是原因，後半句「必須取消野餐」是結果。引導原因的副詞子句必須使用 **Because**。" },
      { c: 1, q: "Does anyone know **the boy ____ father** is a famous movie director? He just transferred to our school.", o: ["who", "which", "whose", "that"], a: 2, e: "【關鍵判斷】**the boy (男孩)** 與 **father (父親)**\n【解題思維】前後名詞存在明確的所屬關係 (那個男孩的父親)。用來表示「...的」關係代名詞只有一個，就是所有格的 **whose**。" },
      { c: 1, q: "I know **the man ____** is standing there.", o: ["which", "who", "whom", "whose"], a: 1, e: "【關鍵判斷】**the man (人)** 且子句缺主詞\n【解題思維】先行詞為人，且在關係子句作主詞 (is standing 的主詞)，用主格關係代名詞 **who**。" },
      { c: 1, q: "**The book ____** I bought yesterday is very interesting.", o: ["who", "which", "where", "whose"], a: 1, e: "【關鍵判斷】**The book (物)** 作為先行詞\n【解題思維】先行詞為物 (the book)，關係代名詞必須用 **which** 或是 **that**。" },
      { c: 1, q: "Do you know **____**?", o: ["where does he live", "where he lives", "he lives where", "where is he living"], a: 1, e: "【關鍵判斷】**間接問句**語序\n【解題思維】名詞子句當作 Do you know 的受詞，必須恢復成直述句語序：**疑問詞 (where) + 主詞 (he) + 動詞 (lives)**。" },
      { c: 1, q: "She asked me **____ I wanted to eat** for dinner.", o: ["that", "which", "what", "who"], a: 2, e: "【關鍵判斷】**wanted to eat (想吃什麼)**\n【解題思維】問「想要吃什麼」，必須使用疑問代名詞 **what** 來引導名詞子句當作受詞。" },
      { c: 1, q: "**The house ____ roof** is red is mine.", o: ["who", "which", "that", "whose"], a: 3, e: "【關鍵判斷】**house (房子)** 與 **roof (屋頂)**\n【解題思維】表示「那個房子的(屋頂)」，存在所有格關係，所有格關係代名詞一律用 **whose**。" },
      { c: 1, q: "He didn't go to school **____ he was sick**.", o: ["because", "so", "but", "although"], a: 0, e: "【關鍵判斷】**沒去上學** 與 **生病** 的因果關係\n【解題思維】後半句 (生病) 是前半句 (沒去上學) 的原因，因此填入 **because**。注意：Because和So不能連用。" },
      { c: 1, q: "**____ he is very old**, he still goes swimming every day.", o: ["Because", "Although", "But", "So"], a: 1, e: "【關鍵判斷】**very old (很老)** 卻 **still goes swimming (仍在游泳)**\n【解題思維】語氣發生轉折，表示「雖然...但是...」，用 **Although** 引導讓步副詞子句。Although和But不能連用。" },
      { c: 1, q: "I am not sure **____ he will come** tomorrow.", o: ["that", "whether", "weather", "which"], a: 1, e: "【關鍵判斷】**not sure (不確定)**\n【解題思維】不確定的語氣不能用 that，必須用表示「是否」的連接詞。**whether** (是否) 可引導名詞子句，表示不確定的狀態。" },
      { c: 1, q: "Is this **the park ____** you play basketball?", o: ["which", "that", "where", "when"], a: 2, e: "【關鍵判斷】**the park (地方)** 與子句結構完整\n【解題思維】先行詞為地方，且子句 (you play basketball) 不缺主受詞，缺少的是地方副詞 (in the park)，故用關係副詞 **where**。" },
      { c: 1, q: "**The boy ____** you met yesterday is my cousin.", o: ["who", "which", "whose", "where"], a: 0, e: "【關鍵判斷】**The boy (人)** 且子句缺受詞\n【解題思維】先行詞為人，在子句中作 met 的受詞，標準用法是 whom，但口語和考試中常直接用 **who** 代替或省略。" },
      { c: 1, q: "Please tell me **____ happened**.", o: ["what", "that", "which", "who"], a: 0, e: "【關鍵判斷】**tell me + 名詞子句**\n【解題思維】**what** 兼作疑問詞與主詞，引導名詞子句「發生了什麼事」。因為 what 本身是主詞，所以不需倒裝。" },
      { c: 1, q: "Can you tell me **____**?", o: ["where", "what", "which", "that"], a: 0, e: "【關鍵判斷】**the station is (直述句語序)**\n【解題思維】問車站的地方，用 **where** 引導間接問句，語序為：where + 主詞 (the station) + 動詞 (is)。" },
      { c: 1, q: "He is **the best student ____** I have ever taught.", o: ["who", "whom", "that", "which"], a: 2, e: "【關鍵判斷】**the best (最高級)** 修飾先行詞\n【解題思維】當先行詞前面有最高級 (the best) 修飾時，為了強調唯一性，關係代名詞強烈建議/必須用 **that**。" },
      { c: 1, q: "This is **the same watch ____** I lost.", o: ["which", "that", "where", "who"], a: 1, e: "【關鍵判斷】**the same (同樣的)** 修飾先行詞\n【解題思維】當先行詞前面有 the same (同樣的) 修飾時，這也是會考特殊規則，關係代名詞必須用 **that**。" },
      { c: 1, q: "We went to bed early **____ we were very tired**.", o: ["although", "because", "so", "but"], a: 1, e: "【關鍵判斷】**早睡** 與 **很累** 的邏輯關聯\n【解題思維】後半句 (很累) 解釋了前半句 (早睡) 的原因，因此填入表示原因的 **because**。" },
      { c: 1, q: "I won't leave **____ you come back**.", o: ["when", "until", "because", "if"], a: 1, e: "【關鍵判斷】**won't (不會)** 與 **until (直到)**\n【解題思維】這是常見的句型 not... until... (直到...才...)。語意為：直到你回來為止，我都不會離開。" },
      { c: 1, q: "I wonder **____**.", o: ["who is she", "who she is", "she is who", "is she who"], a: 1, e: "【關鍵判斷】**wonder (想知道) + 間接問句**\n【解題思維】間接問句必須改回直述句的語序：**疑問詞 (who) + 主詞 (she) + 動詞 (is)**。" },
      { c: 1, q: "Tell me **the reason ____** you were late.", o: ["what", "which", "where", "why"], a: 3, e: "【關鍵判斷】**the reason (原因)** 作為先行詞\n【解題思維】先行詞為 reason (原因)，後面帶出的關係副詞固定搭配 **why** (= for which)。" },
      { c: 1, q: "I like **the gifts ____** my friends gave me.", o: ["who", "which", "where", "what"], a: 1, e: "【關鍵判斷】**the gifts (物)** 作為先行詞\n【解題思維】先行詞為物 (gifts)，關係代名詞使用 **which** 或是 **that**。" },
      { c: 1, q: "**The dog ____ tail** is long is very cute.", o: ["who", "which", "whose", "that"], a: 2, e: "【關鍵判斷】**dog (狗)** 與 **tail (尾巴)**\n【解題思維】表示所有格「狗的(尾巴)」，不分人或物，所有格關係代名詞一律用 **whose**。" },
      { c: 1, q: "We all know **____ the earth is round**.", o: ["what", "which", "that", "who"], a: 2, e: "【關鍵判斷】**know (知道)** 後接陳述事實的子句\n【解題思維】**that** 可以用來引導一個「陳述已知事實」的名詞子句當作 know 的受詞。此處的 that 無意義，通常可省略。" },
      { c: 1, q: "Do you remember **the time ____** we first met?", o: ["which", "where", "when", "that"], a: 2, e: "【關鍵判斷】**the time (時間)** 作為先行詞\n【解題思維】先行詞為時間 (the time)，且子句結構完整 (我們第一次見面)，關係副詞必須用 **when**。" },
      { c: 1, q: "I don't care **____ he says**.", o: ["that", "which", "what", "where"], a: 2, e: "【關鍵判斷】**care (在乎)** 後缺受詞，且 says 後也缺受詞\n【解題思維】**what** 相當於 the thing(s) which。引導名詞子句「他說的話」，同時在子句中作 says 的受詞。" },
      { c: 1, q: "This is **the place ____** I was born.", o: ["which", "that", "where", "when"], a: 2, e: "【關鍵判斷】**the place (地方)** 與子句結構完整\n【解題思維】先行詞為地方，關係子句 (I was born) 不缺主受詞，需要代替地方副詞 (in the place)，故用 **where**。" },
      { c: 1, q: "I will call you **____ I arrive at the hotel**.", o: ["because", "although", "when", "but"], a: 2, e: "【關鍵判斷】**打給你** 與 **抵達飯店** 的時間關聯\n【解題思維】**when** (當...時) 引導時間副詞子句。語意：當我抵達飯店時，我會打給你。" },
      { c: 1, q: "The true problem is **____ we don't have enough time**.", o: ["what", "which", "that", "where"], a: 2, e: "【關鍵判斷】**is (be 動詞)** 後接陳述事實的子句\n【解題思維】**that** 引導名詞子句作主詞補語(放在be動詞後)。注意：當 that 子句放在 be 動詞後面時，that **不可省略**。" },
      { c: 1, q: "Do you know **the girl ____** is dancing on the stage?", o: ["which", "whom", "who", "whose"], a: 2, e: "【關鍵判斷】**the girl (人)** 且子句缺主詞\n【解題思維】先行詞為人，且在關係子句中作 dancing 的主詞，關係代名詞用 **who**。" },
      { c: 1, q: "He studied hard **____ he could pass the exam**.", o: ["because", "so that", "although", "when"], a: 1, e: "【關鍵判斷】**努力讀書** 的目的是 **為了通過考試**\n【解題思維】**so that** (為了...) 用來引導目的副詞子句，後面常搭配助動詞 can/could。" },
      { c: 1, q: "**The watch ____** I bought yesterday was broken.", o: ["who", "which", "where", "whose"], a: 1, e: "【關鍵判斷】**The watch (物)** 作為先行詞\n【解題思維】先行詞為物，在子句中作 bought 的受詞，關係代名詞用 **which** 或 **that**。" },
      { c: 1, q: "I asked him **____ he wanted a cup of coffee**.", o: ["that", "what", "if", "which"], a: 2, e: "【關鍵判斷】**asked (詢問)** 與後方的語意\n【解題思維】asked (詢問) 通常帶出一個不確定的疑問。在此 **if** 作為「是否」解，引導名詞子句當作 asked 的受詞。不能選 that，因為 that 用於陳述已知的確定事實。" },

      // 3. 被動語態
      { c: 2, q: "Tour Guide: Welcome to our country! As you may know, **English ____** in many popular tourist spots here, so you don't need to worry about communication.", o: ["speaks", "is speaking", "is spoken", "has spoken"], a: 2, e: "【關鍵判斷】**English (英文)** 與語態邏輯\n【解題思維】語言不會自己說話，英文是「被」說的，因此必須使用被動語態 (be + Vp.p.)。導遊描述的是現在普遍的客觀事實，故使用**現在簡單被動語態 (is spoken)**。" },
      { c: 2, q: "Teacher: Who broke the window in the classroom?\nStudent: I'm not sure, but I heard that **it ____ by a boy** from another class **yesterday afternoon**.", o: ["breaks", "broke", "is broken", "was broken"], a: 3, e: "【關鍵判斷】**yesterday afternoon (昨天)** 與 **by a boy (被...)**\n【解題思維】「昨天下午」提示時態為過去式；而 `by a boy` 明確指出動作的執行者，代表窗戶是「被」打破的。結合兩者，須使用**過去簡單被動語態 (was broken)**。" },
      { c: 2, q: "Leo: How are you going to school tomorrow? Your bike is broken, right?\nSam: Don't worry. My dad said **it ____** by the mechanic **tomorrow morning**.", o: ["will repair", "will be repaired", "is repairing", "repairs"], a: 1, e: "【關鍵判斷】**tomorrow morning (明天)** 與主詞 **it (腳踏車)**\n【解題思維】腳踏車是被修理的，需用被動語態。搭配明天早上的未來時間，必須使用**未來式被動語態 (will be + Vp.p.)**，故選 **will be repaired**。" },
      { c: 2, q: "Manager: Did you send the important letter to our client?\nSecretary: Yes, sir. **It ____ already**. I sent it right after our meeting this morning.", o: ["has sent", "was sent", "has been sent", "is sending"], a: 2, e: "【關鍵判斷】**It (信件)** 與 **already (已經)**\n【解題思維】信件是被寄出的(被動)。看到 `already` 就知道要搭配完成式，表示動作已經完成。綜合起來必須使用**現在完成式被動語態 (has been + Vp.p.)**。" },
      { c: 2, q: "Employee: Excuse me, boss. It's getting late. **Must the work ____** today? I'm feeling a bit sick.\nBoss: Yes, it's urgent. We need it by 5 PM.", o: ["finish", "finishes", "finished", "be finished"], a: 3, e: "【關鍵判斷】**Must (助動詞)** 與主詞 **the work (工作)**\n【解題思維】工作是被完成的，所以要用被動語態。在情態助動詞 (Must/Can/Should/Will) 的後面，be 動詞必須打回原形。因此結構為 **must be + Vp.p. (be finished)**。" },
      { c: 2, q: "Tom: Why were you so tired yesterday evening?\nJerry: I made a big mistake at home, so I **was made ____** the floor of the whole house by my mother.", o: ["sweep", "to sweep", "sweeping", "swept"], a: 1, e: "【關鍵判斷】**was made (使役動詞被動語態)**\n【解題思維】會考超級陷阱題！使役動詞 (make) 在主動語態時，後面接原形動詞；但只要一變成「被動語態 (was made)」，後面的動詞就**必須加回 to，變成不定詞 (to sweep)**。" },
      { c: 2, q: "Guest: Wow, the chocolate cake looks amazing! Did you make it yourself?\nHost: Yes! And trust me, it **____ as delicious as** it looks.", o: ["is tasted", "tastes", "is tasting", "tasted"], a: 1, e: "【關鍵判斷】**taste (連綴動詞)**\n【解題思維】極易錯的觀念題！雖然蛋糕是物品，但在英文中，連綴動詞 (taste, sound, look, smell, feel) **絕對沒有被動語態**！直接使用主動的 **tastes** 即可。" },
      { c: 2, q: "Principal: To make our campus greener and more beautiful, **a lot of trees ____** around the school buildings **every year**.", o: ["are planted", "were planted", "will be planted", "have been planted"], a: 0, e: "【關鍵判斷】**trees (樹木)** 與 **every year (每年)**\n【解題思維】樹木是被種植的(被動)。`every year` 提示這是一個規律性的習慣或常態事實，因此使用**現在簡單被動語態 (are planted)**。" },
      { c: 2, q: "Mom: Why is it so smelly in the kitchen?\nDad: Oh, sorry. **The garbage ____ out right now** by Jason. The smell will be gone soon.", o: ["is taking", "is being taken", "has been taken", "was taken"], a: 1, e: "【關鍵判斷】**garbage (垃圾)** 與 **right now (現在正在)**\n【解題思維】垃圾是被拿出去的。`right now` 表示動作正在說話的當下進行。現在進行式的被動語態結構為 **is/are/am + being + Vp.p.**，故選 **is being taken**。" },
      { c: 2, q: "Nurse: How is the little baby doing while his parents are working abroad?\nDoctor: He is fine. He **is taken good care ____ by** his loving grandmother.", o: ["for", "with", "of", "to"], a: 2, e: "【關鍵判斷】**take care of (照顧)** 的被動語態\n【解題思維】「照顧」的動詞片語是 `take care of`。當它變成被動語態 `be taken care of` 時，原本的介系詞 **of** 必須保留在動詞後面，絕對不可省略。" },
      { c: 2, q: "Student: This novel is so interesting! Who wrote it?\nLibrarian: It **was written ____** a famous author who won a national prize last year.", o: ["with", "by", "in", "from"], a: 1, e: "【關鍵判斷】**was written (被寫)** 與動作的執行者\n【解題思維】在被動語態的句型中，要表達動作是「被（某人/某物）」執行時，固定使用介系詞 **by** 來引出執行者。" },
      { c: 2, q: "Police: When did you realize that your money was gone?\nVictim: I wanted to buy a drink, and then I found that **my wallet ____ on my way home**.", o: ["stole", "is stolen", "was stolen", "has stolen"], a: 2, e: "【關鍵判斷】**my wallet (錢包)** 與過去的單一事件\n【解題思維】錢包是「被偷的」，且在回家的路上被偷是一件發生在過去的單一事件，因此使用**過去簡單被動語態 (was stolen)**。" },
      { c: 2, q: "Student: This math problem is too difficult. I've spent an hour on it!\nTeacher: Actually, if you use the new formula I taught you, it **can ____** easily.", o: ["solve", "be solved", "is solved", "solving"], a: 1, e: "【關鍵判斷】**can (助動詞)** 與主詞 **it (問題)**\n【解題思維】問題是被解決的，故用被動。在助動詞 (can) 後面，be 動詞要恢復成原形。因此必須選 **be solved**。" },
      { c: 2, q: "Citizen: The traffic near our neighborhood is terrible during rush hours.\nMayor: I'm sorry to say that **nothing ____ done** to solve the problem **yet**, but we are making a plan.", o: ["has", "has been", "is", "was"], a: 1, e: "【關鍵判斷】**nothing (沒有事情 - 被動)** 與 **yet (尚未)**\n【解題思維】`yet` 是現在完成式的關鍵字。`Nothing` 視為第三人稱單數，且事情是被完成的，綜合起來使用**現在完成被動語態 (has been done)**。" },
      { c: 2, q: "Hotel Manager: The VIP guests are arriving at 3 PM today. Remember, their room **____ before** they step into the hotel.", o: ["will clean", "must be cleaned", "must clean", "cleaned"], a: 1, e: "【關鍵判斷】**room (房間)** 承受清潔的動作\n【解題思維】房間是被清理的，且帶有強制的語氣「必須被清理」。情態助動詞 must 後接原形 be 動詞，形成 **must be cleaned**。" },
      { c: 2, q: "Customer: These running shoes are so comfortable. Are they imported from the USA?\nClerk: Actually, **they ____ in Taiwan**. Our country makes great shoes!", o: ["make", "made", "are made", "are making"], a: 2, e: "【關鍵判斷】**they (鞋子)** 與產地的客觀事實\n【解題思維】鞋子是被製造的，而描述產品的製造地屬於一種「不變的客觀事實」，因此使用**現在簡單被動語態 (are made)**。" },
      { c: 2, q: "Wife: Honey, can you drive me to the supermarket?\nHusband: I can't. **My car ____** at the garage **right now**. Let's take a taxi.", o: ["washed", "is washing", "was washed", "is being washed"], a: 3, e: "【關鍵判斷】**My car (車子)** 與 **right now (現在正在)**\n【解題思維】車子是被洗的，且 `right now` 指出動作正在當下進行。現在進行式被動的結構為 **is/are/am + being + Vp.p.**，故選 **is being washed**。" },
      { c: 2, q: "Teacher: Please remember that this science report is very important. **It ____ finished by** tomorrow afternoon, or you will fail the class.", o: ["will", "will be", "is", "has been"], a: 1, e: "【關鍵判斷】**It (報告)** 與 **by tomorrow afternoon (到明天為止)**\n【解題思維】報告是被完成的。時間點是未來的明天下午，必須使用未來式被動。選項中能與 finished 搭配形成未來被動的只有 **will be**。" },
      { c: 2, q: "Detective: Did anyone see the missing boy yesterday?\nWitness: Yes, he **was seen ____** the convenience store at the corner around 7 PM.", o: ["enter", "entered", "to enter", "enters"], a: 2, e: "【關鍵判斷】**was seen (感官動詞的被動語態)**\n【解題思維】進階會考題！感官動詞 (see/hear/watch) 主動時接原形或 V-ing，但一改為**被動語態 (was seen)**，原本的原形動詞就必須加回 to，變成**不定詞 (to enter)**。" },
      { c: 2, q: "Fan: I really want to go to Mayday's concert! Do you have any extra tickets?\nFriend: Sorry, all the tickets **____ out** in ten minutes **yesterday morning**.", o: ["sell", "sold", "were sold", "are sold"], a: 2, e: "【關鍵判斷】**tickets (票)** 與 **yesterday morning (昨天早上)**\n【解題思維】票是被賣光的。`yesterday morning` 提示這是一件發生在過去的單一事件，因此使用**過去簡單被動語態 (were sold)**。" },
      { c: 2, q: "The new bridge **____ next year** to connect the two cities.", o: ["builds", "built", "will be built", "is building"], a: 2, e: "【關鍵判斷】**bridge (橋)** 與 **next year (明年)**\n【解題思維】橋是被建造的，搭配未來的時間副詞 next year，必須使用**未來式被動語態 (will be built)**。" },
      { c: 2, q: "The letter **____ by him yesterday**.", o: ["writes", "wrote", "was written", "is written"], a: 2, e: "【關鍵判斷】**letter (信)** 與 **yesterday (昨天)**\n【解題思維】信是被寫的。yesterday 提示過去式，所以動詞要用**過去簡單被動語態 (was written)**。" },
      { c: 2, q: "**English ____** all over the world.", o: ["speaks", "is speaking", "has spoken", "is spoken"], a: 3, e: "【關鍵判斷】**English (英文)** 與描述客觀事實\n【解題思維】語言是被說的，描述這種普遍存在的事實，習慣使用**現在簡單被動語態 (is spoken)**。" },
      { c: 2, q: "The work **must ____** before Friday.", o: ["finish", "finished", "be finished", "finishes"], a: 2, e: "【關鍵判斷】**must (助動詞)** 與 **work (工作)**\n【解題思維】工作是被完成的。在助動詞 must 的後面，be 動詞必須是原形，構成 **must be finished**。" },
      { c: 2, q: "Many trees **____ in the park every year**.", o: ["are planted", "planted", "were planted", "plant"], a: 0, e: "【關鍵判斷】**trees (樹木)** 與 **every year (每年)**\n【解題思維】樹是被種植的，every year 表達規律發生的習慣性事實，故使用**現在簡單被動語態 (are planted)**。" },
      { c: 2, q: "The homework **____ already**.", o: ["has done", "has been done", "is doing", "was doing"], a: 1, e: "【關鍵判斷】**homework (作業)** 與 **already (已經)**\n【解題思維】作業是被完成的。already 提示動作已經完成，要用現在完成式。綜合起來是**現在完成被動語態 (has been done)**。" },
      { c: 2, q: "A new hospital **____ in our town recently**.", o: ["has built", "was building", "has been built", "builds"], a: 2, e: "【關鍵判斷】**hospital (醫院)** 與 **recently (最近)**\n【解題思維】醫院是被建造的。recently 常用來搭配現在完成式，表示最近剛剛完成的動作。故選 **has been built**。" },
      { c: 2, q: "The room **____ every day**.", o: ["cleans", "is cleaned", "cleaned", "has cleaned"], a: 1, e: "【關鍵判斷】**room (房間)** 與 **every day (每天)**\n【解題思維】房間是被打掃的。every day 表示習慣性動作，使用**現在簡單被動語態 (is cleaned)**。" },
      { c: 2, q: "He **was seen ____** the room.", o: ["enter", "entered", "to enter", "enters"], a: 2, e: "【關鍵判斷】**was seen (感官動詞被動語態)**\n【解題思維】感官動詞變成被動語態時，原本主動語態後接的原形動詞，必須加回 to 變成**不定詞 (to enter)**。" },
      { c: 2, q: "We are interested **____ this story**.", o: ["by", "with", "in", "about"], a: 2, e: "【關鍵判斷】**interested (感興趣)** 的介系詞搭配\n【解題思維】英文中表示「對...感興趣」，固定使用被動形式搭配介系詞 in，也就是 **be interested in**。" },
      { c: 2, q: "The desk is made **____ wood**.", o: ["by", "of", "from", "with"], a: 1, e: "【關鍵判斷】**made (製造)** 與 **wood (木頭)** 的物理變化\n【解題思維】桌子由木頭製成，成品仍看得出原始材質（物理變化），固定搭配介系詞 **of (be made of)**。若是看不出材質的化學變化則用 from。" },
      { c: 2, q: "Wine is made **____ grapes**.", o: ["of", "from", "by", "in"], a: 1, e: "【關鍵判斷】**made (製造)** 與 **grapes (葡萄)** 的化學變化\n【解題思維】酒由葡萄釀造，成品已經看不出葡萄原本的形狀（化學變化），固定搭配介系詞 **from (be made from)**。" },
      { c: 2, q: "I was surprised **____ the news**.", o: ["by", "with", "at", "in"], a: 2, e: "【關鍵判斷】**surprised (驚訝)** 的介系詞搭配\n【解題思維】表示「對...感到驚訝」，雖然是被動形式，但習慣搭配的介系詞是 **at** (be surprised at)。" },
      { c: 2, q: "She was satisfied **____ the result**.", o: ["with", "by", "for", "in"], a: 0, e: "【關鍵判斷】**satisfied (滿意)** 的介系詞搭配\n【解題思維】表示「對...感到滿意」，固定搭配介系詞 **with** (be satisfied with)。" },
      { c: 2, q: "He is known **____ his kindness**.", o: ["by", "as", "for", "to"], a: 2, e: "【關鍵判斷】**known (聞名)** 與 **kindness (特質)**\n【解題思維】表示「因為某種特色或原因而聞名」，固定搭配介系詞 **for** (be known for)。" },
      { c: 2, q: "A lot of money **____ spent** on the project **yesterday**.", o: ["is", "are", "was", "were"], a: 2, e: "【關鍵判斷】**money (不可數名詞)** 與 **yesterday (昨天)**\n【解題思維】金錢(money)是不可數名詞，視為第三人稱單數。搭配昨天(過去式)，be動詞必須用 **was**。" },
      { c: 2, q: "**Nothing ____ done** to stop the fire **yet**.", o: ["is", "has", "has been", "was"], a: 2, e: "【關鍵判斷】**Nothing (無事)** 與 **yet (尚未)**\n【解題思維】yet 提示現在完成式。Nothing 視為單數且事情是被完成的，需用現在完成被動語態 **has been done**。" },
      { c: 2, q: "The problem **can ____** easily.", o: ["solve", "solving", "is solved", "be solved"], a: 3, e: "【關鍵判斷】**can (助動詞)** 與 **problem (問題)**\n【解題思維】問題是被解決的。助動詞 can 後面必須接原形 be 動詞，構成被動語態 **can be solved**。" },
      { c: 2, q: "The trash **____ out tomorrow**.", o: ["will take", "took", "will be taken", "is taken"], a: 2, e: "【關鍵判斷】**trash (垃圾)** 與 **tomorrow (明天)**\n【解題思維】垃圾是被拿出去的。時間是明天的未來式，必須使用未來被動語態 **will be taken**。" },
      { c: 2, q: "He **was made ____** his room by his mom.", o: ["clean", "to clean", "cleaned", "cleaning"], a: 1, e: "【關鍵判斷】**was made (使役動詞被動)**\n【解題思維】使役動詞 make 變成被動語態時，後面原本的原形動詞必須加回 to，變成不定詞 **to clean**。" },
      { c: 2, q: "The news **____ reported** on TV **tonight**.", o: ["will", "will be", "is", "has"], a: 1, e: "【關鍵判斷】**news (新聞)** 與 **tonight (今晚)**\n【解題思維】新聞是被報導的。今晚代表未來將要發生的事，所以要填入未來被動的助動詞 **will be**。" },
      { c: 2, q: "The poor dog **____ by** a car.", o: ["hits", "hit", "was hit", "was hitting"], a: 2, e: "【關鍵判斷】**dog (狗)** 與 **by a car (被車)**\n【解題思維】狗是被車撞的，這是一個單一的過去事件，所以用過去簡單被動語態。注意 hit 的三態同行 (hit-hit-hit)，故選 **was hit**。" },
      { c: 2, q: "This song is often **____ by** children.", o: ["sing", "sang", "sung", "singing"], a: 2, e: "【關鍵判斷】**song (歌曲)** 的被動狀態\n【解題思維】歌曲是被唱的。前面已經有 be 動詞 is，後面需要填入過去分詞 Vp.p.。sing 的過去分詞是 **sung** (sing-sang-sung)。" },
      { c: 2, q: "Taiwan is known **____ a food paradise**.", o: ["for", "as", "to", "by"], a: 1, e: "【關鍵判斷】**known (聞名)** 與 **a food paradise (身分/稱號)**\n【解題思維】表示「作為...身分或稱號而聞名」，固定搭配介系詞 **as** (be known as)。" },
      { c: 2, q: "The singer is known **____ many young people**.", o: ["for", "as", "to", "by"], a: 2, e: "【關鍵判斷】**known (為...所知)** 與 **many young people (對象)**\n【解題思維】表示「為(某對象)所知曉」，固定搭配介系詞 **to** (be known to)。" },
      { c: 2, q: "My bike was stolen **____ someone**.", o: ["for", "with", "by", "in"], a: 2, e: "【關鍵判斷】**was stolen (被偷)** 與 **someone (執行者)**\n【解題思維】在標準的被動語態句型中，要引出動作的執行者，一律使用介系詞 **by**。" },
      { c: 2, q: "The floor is covered **____ dust**.", o: ["by", "with", "in", "of"], a: 1, e: "【關鍵判斷】**covered (覆蓋)** 的介系詞搭配\n【解題思維】表示「被...(某物)覆蓋」，英文習慣固定搭配介系詞 **with** (be covered with)。" },
      { c: 2, q: "The house was painted **____ white**.", o: ["by", "with", "in", "(不填)"], a: 3, e: "【關鍵判斷】**painted (漆成)** 與 **white (顏色)**\n【解題思維】動詞 paint (塗漆) 的用法是 `paint + 物 + 顏色`。變成被動語態時是 `物 was painted + 顏色`，中間**不需要加任何介系詞**。" },
      { c: 2, q: "Computers are widely **____ today**.", o: ["use", "used", "using", "uses"], a: 1, e: "【關鍵判斷】**Computers (電腦)** 與 **are (be 動詞)**\n【解題思維】電腦是被使用的。前面已經有 are，後面填入動詞 use 的過去分詞 **used**，構成被動語態。" },
      { c: 2, q: "The thief was caught **____ the police**.", o: ["with", "by", "from", "for"], a: 1, e: "【關鍵判斷】**was caught (被抓)** 與 **the police (執行者)**\n【解題思維】小偷是被警察抓到的。引出動作的執行對象，使用介系詞 **by**。" },

      // 4. 特殊動詞 (感官、使役、連綴)
      { c: 3, q: "Witness: I was standing at the corner waiting for the bus.\nPolice: And what did you see?\nWitness: I **saw** a young boy **____ the street** carelessly just now, and then a motorcycle almost hit him.", o: ["cross", "crossed", "to cross", "crosses"], a: 0, e: "【關鍵判斷】**saw (看到 - 感官動詞)**\n【解題思維】感官動詞 (see/hear/watch/notice) 後面接的受詞若為主動進行動作，動詞必須使用**原形動詞 (強調看見完整事實)** 或是 **V-ing (強調看見正在進行的瞬間)**。選項中只有原形動詞 **cross** 符合文法。" },
      { c: 3, q: "Eric: Do you want to go to the movies with us this Saturday?\nKevin: I'd love to, but I can't. My mom **makes me ____** my bedroom every weekend before I can go out.", o: ["clean", "to clean", "cleaning", "cleaned"], a: 0, e: "【關鍵判斷】**makes (強迫 - 使役動詞)**\n【解題思維】使役動詞 make (強迫)、have (叫/讓)、let (允許) 在主動語態時，其後接的受詞補語必須使用**原形動詞**。因此選 **clean**。" },
      { c: 3, q: "Little Girl: Mom, I don't want to take this medicine. It **tastes ____**!\nMom: I know, honey, but it will help you get well soon.", o: ["terrible", "terribly", "badly", "well"], a: 0, e: "【關鍵判斷】**tastes (嚐起來 - 連綴動詞)**\n【解題思維】連綴動詞 (taste/smell/sound/look/feel) 的功用是連結主詞與主詞補語，其後方必須接**形容詞**，絕對不能接副詞。terrible 是形容詞，terribly 則是副詞，故選 **terrible**。" },
      { c: 3, q: "Neighbor: Wow, your car looks so shiny and clean today!\nMr. Wang: Thanks! I was too busy this week, so I **had it ____** at the car wash center yesterday.", o: ["wash", "to wash", "washing", "washed"], a: 3, e: "【關鍵判斷】**had it (使役動詞 + 事物)**\n【解題思維】使役動詞 have 除了接原形動詞，當受詞是「事物 (it - 汽車)」且承受動作時，必須使用 `have + 物 + Vp.p. (過去分詞)` 的句型，表示「讓某物『被』處理」。汽車是被洗的，故選 **washed**。" },
      { c: 3, q: "Father: I don't think studying art is a good idea for Jason's future.\nMother: He is already eighteen. We should **let him ____** what he really wants for his life.", o: ["do", "does", "to do", "doing"], a: 0, e: "【關鍵判斷】**let (允許 - 使役動詞)**\n【解題思維】let 屬於三大使役動詞之一，規定後面接受詞後，必須接**原形動詞**。故選 **do**。" },
      { c: 3, q: "Customer: What is playing on the radio right now? The music **sounds so ____**.\nCafe Owner: It's a classical piano piece by Chopin. I'm glad you like it.", o: ["beautiful", "beautifully", "wonderfully", "badly"], a: 0, e: "【關鍵判斷】**sounds (聽起來 - 連綴動詞)**\n【解題思維】與 tastes 的邏輯相同，連綴動詞 sounds 後面必須接**形容詞**作為補語。beautiful 是形容詞，beautifully 是副詞，故選 **beautiful**。" },
      { c: 3, q: "Sister: I couldn't sleep well last night.\nBrother: Why? Did you **hear someone ____** the piano in the next room in the middle of the night?", o: ["play", "played", "to play", "plays"], a: 0, e: "【關鍵判斷】**hear (聽見 - 感官動詞)**\n【解題思維】感官動詞 hear 主動聽見某人做某事，後面可接**原形動詞或 V-ing**。選項中僅有原形動詞 **play** 符合。" },
      { c: 3, q: "Student: Did you watch the news about the brave firefighter who saved three kids?\nTeacher: Yes, the story of his courage **made us all ____**.", o: ["sadly", "sad", "to sad", "saddened"], a: 1, e: "【關鍵判斷】**made us... (使我們變得...)**\n【解題思維】動詞 make 除了當使役動詞接原形動詞外，另一個極常考的句型是 `make + 受詞 + 形容詞`，表示「使某人處於某種狀態」。sad 是形容詞，sadly 是副詞，故選 **sad**。" },
      { c: 3, q: "Jane: Do you think this color is too bright for a formal party?\nMary: Not at all! You **look ____** in that red dress. Everyone will look at you.", o: ["beautifully", "beautiful", "beauty", "to be beautiful"], a: 1, e: "【關鍵判斷】**look (看起來 - 連綴動詞)**\n【解題思維】look 作為連綴動詞，後面必須接**形容詞**來修飾主詞 You。beautiful 是形容詞，故選 **beautiful**。" },
      { c: 3, q: "Principal: How did Mr. Lee improve his class's grades?\nDirector: He has his own ways. He finally **got all the students ____** their homework on time every day.", o: ["finish", "to finish", "finishing", "finished"], a: 1, e: "【關鍵判斷】**got (說服/促使) + 人**\n【解題思維】這題是超級陷阱！get 雖然語意上帶有「使、讓」的意思，但它**不屬於**使役動詞的文法規則！句型固定為 `get + 人 + to V` (說服某人去做某事)，所以必須選 **to finish**。" },
      { c: 3, q: "Son: Mom, did you forget to turn off the stove?\nMom: Oh my goodness! I **smelled something ____** in the kitchen. The soup is ruined!", o: ["burns", "burning", "burned", "to burn"], a: 1, e: "【關鍵判斷】**smelled (聞到 - 感官動詞)**\n【解題思維】感官動詞 smell 後接主動動作，可選原形或 V-ing。在表達「聞到燒焦味」這種強調「當下正在燃燒散發出味道的狀態」時，語境上使用 **V-ing (burning)** 最為自然生動。" },
      { c: 3, q: "Patient: Doctor, when I heard the loud noise from the machine, I suddenly **felt my heart ____** really fast. Is it serious?", o: ["beat", "beaten", "to beat", "beats"], a: 0, e: "【關鍵判斷】**felt (感覺到 - 感官動詞)**\n【解題思維】feel 作為感官動詞，感覺心臟跳動 (主動)，後接**原形動詞 (beat) 或 V-ing (beating)**。選項中僅有 beat 符合。" },
      { c: 3, q: "Newscaster: Please remember to bring a heavy jacket if you are going out tonight. The weather **is getting ____** because of the cold front.", o: ["cold and cold", "colder and colder", "more and more cold", "coldly"], a: 1, e: "【關鍵判斷】**is getting (變得 - 連綴動詞的漸進變化)**\n【解題思維】連綴動詞 get/become 常用來表達狀態的改變。若要表達「越來越...」，固定句型是 **比較級 and 比較級**。cold 的比較級是 colder，故為 **colder and colder**。" },
      { c: 3, q: "Owner: Please hold the leash tightly while I open the front gate. Don't **let the dog ____** away, or he might get lost.", o: ["run", "to run", "running", "ran"], a: 0, e: "【關鍵判斷】**let (允許/讓 - 使役動詞)**\n【解題思維】let 規定後面必須接**原形動詞**。故選 **run**。" },
      { c: 3, q: "Colleague: Wow, Linda! You look different today. Did you change your hairstyle?\nLinda: Yes, I **had my hair ____** at the new salon this morning.", o: ["cut", "to cut", "cutting", "cuts"], a: 0, e: "【關鍵判斷】**had my hair (使役動詞 + 事物)**\n【解題思維】頭髮是「被」剪的，所以要用 `have + 物 + Vp.p.` 句型。動詞 cut 的三態同行 (cut-cut-cut)，它的過去分詞依然是 **cut**。" },
      { c: 3, q: "Boss: Why didn't you reply to my email last night?\nWorker: I'm sorry, my laptop was broken. I just **had it ____** by the IT department yesterday afternoon.", o: ["fix", "fixed", "fixing", "to fix"], a: 1, e: "【關鍵判斷】**had it (使役動詞 + 筆電)**\n【解題思維】it 代稱筆電，筆電是「被」修理的，必須使用 `have + 物 + Vp.p.` 表示讓某物被處理。故選過去分詞 **fixed**。" },
      { c: 3, q: "Brother: I'm starving! What's for dinner?\nSister: I just ordered a seafood pizza, and it **smells so ____**. I can't wait to take a bite!", o: ["good", "well", "badly", "goodly"], a: 0, e: "【關鍵判斷】**smells (聞起來 - 連綴動詞)**\n【解題思維】連綴動詞 後面必須接形容詞 (good)。well 當形容詞只有「健康的」之意。" },
      { c: 3, q: "Teacher: Did anyone **notice the classroom ____** just a moment ago?\nStudent: Yes! I think it was a small earthquake.", o: ["shook", "to shake", "shaking", "shaken"], a: 2, e: "【關鍵判斷】**notice (注意到) 也是感官動詞**\n【解題思維】notice 後接原形動詞或 V-ing (shaking)。選項中只有 shaking 符合。" },
      { c: 3, q: "Manager: The construction outside is too loud. Please **keep the door ____** so we can focus on the meeting.", o: ["close", "closing", "closed", "to close"], a: 2, e: "【關鍵判斷】**keep + 受詞 + 受詞補語**\n【解題思維】門是被關著的狀態，用過去分詞 closed。" },
      { c: 3, q: "Coach: We just won the national championship!\nPlayer: That's amazing! The great news **made everyone** in our school very **____**.", o: ["happily", "happiness", "happy", "to be happy"], a: 2, e: "【關鍵判斷】**make + 受詞 + 形容詞**\n【解題思維】使...變得...。happy 是形容詞。" },
      { c: 3, q: "The milk **smells ____**. You shouldn't drink it.", o: ["bad", "badly", "well", "worse"], a: 0, e: "【關鍵判斷】**smell 是連綴動詞**\n【解題思維】後面必須接形容詞 bad。" },
      { c: 3, q: "I **watched** the old man **____** the street slowly.", o: ["cross", "to cross", "crossed", "crosses"], a: 0, e: "【關鍵判斷】**感官動詞 watch**\n【解題思維】watch + 受詞 + 原形動詞 (強調看見整個過程)。" },
      { c: 3, q: "Please **help** me **____** the heavy box.", o: ["carry", "carried", "carrying", "carries"], a: 0, e: "【關鍵判斷】**help + 受詞 + (to) V**\n【解題思維】這裡省略了 to，用原形動詞 carry。" },
      { c: 3, q: "The joke **made** everyone **____** loudly.", o: ["laugh", "to laugh", "laughing", "laughed"], a: 0, e: "【關鍵判斷】**使役動詞 make**\n【解題思維】make + 受詞 + 原形動詞。" },
      { c: 3, q: "Mom won't **let** me **____** TV after 10 PM.", o: ["watch", "to watch", "watching", "watched"], a: 0, e: "【關鍵判斷】**使役動詞 let**\n【解題思維】let + 受詞 + 原形動詞。" },
      { c: 3, q: "His voice **sounds ____** a famous singer.", o: ["like", "as", "with", "to"], a: 0, e: "【關鍵判斷】**sound like**\n【解題思維】sound like + 名詞 (聽起來像...)。" },
      { c: 3, q: "Look at the clouds. It **is getting ____**.", o: ["dark", "darkly", "darkness", "to dark"], a: 0, e: "【關鍵判斷】**get 作連綴動詞**\n【解題思維】表「變得...」，後接形容詞。" },
      { c: 3, q: "Did you **feel** the house **____** just now?", o: ["shaking", "shook", "shaken", "to shake"], a: 0, e: "【關鍵判斷】**感官動詞 feel**\n【解題思維】feel + 受詞 + V-ing (強調當下正在進行的動作)。" },
      { c: 3, q: "She **had** the mechanic **____** her car.", o: ["repair", "to repair", "repaired", "repairing"], a: 0, e: "【關鍵判斷】**使役動詞 have**\n【解題思維】have + 人 + 原形動詞 (叫某人做某事)。" },
      { c: 3, q: "I will **get** my brother **____** you with the math.", o: ["to help", "help", "helped", "helping"], a: 0, e: "【關鍵判斷】**get + 人 + to V**\n【解題思維】說服/讓某人去做某事，注意 get 不是接原形！" },
      { c: 3, q: "The food **goes ____** easily in summer.", o: ["bad", "badly", "worse", "well"], a: 0, e: "【關鍵判斷】**go 作連綴動詞**\n【解題思維】go bad (壞掉)，後接形容詞。" },
      { c: 3, q: "The leaves **turn ____** in autumn.", o: ["red", "redly", "redness", "to red"], a: 0, e: "【關鍵判斷】**turn 作連綴動詞**\n【解題思維】表顏色狀態改變，後接形容詞。" },
      { c: 3, q: "I **saw** a dog **____** after a cat.", o: ["running", "ran", "to run", "runs"], a: 0, e: "【關鍵判斷】**感官動詞 see**\n【解題思維】see + 受詞 + V-ing (看見正在追)。" },
      { c: 3, q: "The mother **watched** her baby **____** soundly.", o: ["sleeping", "slept", "to sleep", "sleeps"], a: 0, e: "【關鍵判斷】**感官動詞 watch**\n【解題思維】watch + 受詞 + V-ing (看著正在睡)。" },
      { c: 3, q: "Don't **make** me **____** it again!", o: ["say", "to say", "saying", "said"], a: 0, e: "【關鍵判斷】**使役動詞 make**\n【解題思維】make + 受詞 + 原形動詞。" },
      { c: 3, q: "My teacher **had** me **____** the blackboard.", o: ["clean", "to clean", "cleaned", "cleaning"], a: 0, e: "【關鍵判斷】**使役動詞 have**\n【解題思維】have + 人 + 原形動詞。" },
      { c: 3, q: "The beautiful music **makes** me **____** relaxed.", o: ["feel", "to feel", "feeling", "felt"], a: 0, e: "【關鍵判斷】**make + 受詞 + 原形動詞**\n【解題思維】(使我感到...)。" },
      { c: 3, q: "He **looks ____** in that new suit.", o: ["handsome", "handsomely", "more handsomely", "to handsome"], a: 0, e: "【關鍵判斷】**連綴動詞 look**\n【解題思維】後面接形容詞。" },
      { c: 3, q: "We **heard** them **____** in the next room.", o: ["arguing", "argued", "to argue", "argues"], a: 0, e: "【關鍵判斷】**感官動詞 hear**\n【解題思維】hear + 受詞 + V-ing (聽見正在爭吵)。" },
      { c: 3, q: "I want to **have** my hair **____** tomorrow.", o: ["cut", "to cut", "cutting", "cuts"], a: 0, e: "【關鍵判斷】**have + 物 (hair) + Vp.p.**\n【解題思維】頭髮是被剪的，cut三態同行。" },
      { c: 3, q: "You should **keep** your room **____**.", o: ["clean", "to clean", "cleaned", "cleaning"], a: 0, e: "【關鍵判斷】**keep + 受詞 + 形容詞**\n【解題思維】保持房間乾淨。" },
      { c: 3, q: "**Let's ____** out for dinner tonight.", o: ["go", "to go", "going", "went"], a: 0, e: "【關鍵判斷】**Let's (Let us)**\n【解題思維】後接原形動詞。" },
      { c: 3, q: "That **sounds ____** a great idea!", o: ["like", "as", "with", "for"], a: 0, e: "【關鍵判斷】**sound like + 名詞**\n【解題思維】聽起來像... / 是個好主意。" },
      { c: 3, q: "The coffee **tastes** too **____**. I need some sugar.", o: ["bitter", "bitterly", "bitterness", "to bitter"], a: 0, e: "【關鍵判斷】**連綴動詞 taste + 形容詞**\n【解題思維】bitter 苦的。" },
      { c: 3, q: "Have you **noticed** him **____** the office?", o: ["leave", "left", "to leave", "leaves"], a: 0, e: "【關鍵判斷】**notice (注意) 也是感官動詞**\n【解題思維】後接原形動詞或 V-ing。" },
      { c: 3, q: "The bad news **made** him **____**.", o: ["sad", "sadly", "sadness", "to sad"], a: 0, e: "【關鍵判斷】**make + 受詞 + 形容詞**\n【解題思維】使他感到傷心。" },
      { c: 3, q: "He **got** his wallet **____** on the bus.", o: ["stolen", "steal", "stealing", "to steal"], a: 0, e: "【關鍵判斷】**get + 物 + Vp.p.**\n【解題思維】遭受... / 讓錢包被偷了。" },
      { c: 3, q: "They **listened to** the girl **____** a song.", o: ["sing", "to sing", "sang", "sings"], a: 0, e: "【關鍵判斷】**listen to (感官動詞)**\n【解題思維】listen to + 受詞 + 原形動詞/V-ing。" },
      { c: 3, q: "The weather **is becoming ____**.", o: ["warmer", "warmly", "to warm", "warmth"], a: 0, e: "【關鍵判斷】**become (變成) 連綴動詞**\n【解題思維】+ 比較級形容詞。" },
      { c: 3, q: "Please **leave** the door **____**.", o: ["open", "to open", "opened", "opening"], a: 0, e: "【關鍵判斷】**leave + 受詞 + 形容詞**\n【解題思維】讓門保持開著的狀態。open 在此為形容詞。" },

      // 5. 花費動詞 (spend, take, cost, pay)
      { c: 4, q: "Mom: How much did **you ____ for** this new jacket? It looks really expensive.\nSon: It's not that bad. I got it on sale for only 800 NT dollars.", o: ["spend", "take", "cost", "pay"], a: 3, e: "【關鍵判斷】**you (人)** 作主詞，且後方有介系詞 **for**\n【解題思維】詢問花費多少金錢。當主詞是「人」，且搭配介系詞 `for` (為某物付錢) 時，唯一選擇是動詞 **pay**。spend 搭配的是 on。" },
      { c: 4, q: "Lisa: I really want to buy that smartphone, but **it ____** too much money. I don't have enough savings.\nDad: Maybe you can save your allowance for a few more months.", o: ["spends", "takes", "costs", "pays"], a: 2, e: "【關鍵判斷】**it (事物)** 作主詞，且花費**金錢**\n【解題思維】代名詞 it 指代前面的手機(事物)。當主詞是「事物」，且用來表示花費「金錢」時，規定只能使用動詞 **cost** (單數加 s 變 costs)。" },
      { c: 4, q: "Tom: **Writing this science report ____ me** almost three days. I'm so exhausted.\nTeacher: But you did a great job! Your hard work paid off.", o: ["spent", "took", "cost", "paid"], a: 1, e: "【關鍵判斷】**V-ing 作主詞 (事物)**，且花費**時間**\n【解題思維】動名詞片語 `Writing this...` 視為單數「事物」主詞。當主詞是事物，且表示花費「時間」時，必須使用動詞 **take** (過去式 took)。" },
      { c: 4, q: "Clerk: How would **you** like to **____ for** the groceries, sir? In cash or by credit card?\nCustomer: I'll use my credit card, please.", o: ["spend", "take", "cost", "pay"], a: 3, e: "【關鍵判斷】**you (人)** 作主詞與介系詞 **for**\n【解題思維】結帳的情境，主詞是人，且後方明確出現 `for the groceries`。人 + pay + for + 物品。選 **pay**。" },
      { c: 4, q: "Wife: **You** shouldn't **____ so much time playing** video games on weekends.\nHusband: You're right. I'll take the kids to the park this afternoon.", o: ["spend", "take", "cost", "pay"], a: 0, e: "【關鍵判斷】**You (人)** 作主詞，花費時間，且後接 **V-ing**\n【解題思維】這題集合了 spend 的所有特徵：主詞是人，花費時間，且後面跟著動名詞 `playing` (spend time V-ing)。毫無疑問選 **spend**。" },
      { c: 4, q: "Tourist: Excuse me, **how long does it ____ to walk** from here to the national museum?\nPolice: About fifteen minutes if you walk fast.", o: ["spend", "take", "cost", "pay"], a: 1, e: "【關鍵判斷】**it (虛主詞)**，**how long (時間)**，與 **to walk (不定詞)**\n【解題思維】詢問需要多少時間的標準句型：`It takes + 時間 + to V`。主詞是 it，後面接不定詞，花費時間一律用 **take**。" },
      { c: 4, q: "Friend A: Did you hear about Kevin? **He ____** a fortune **on** his new sports car.\nFriend B: Yeah, he has been saving up for years just to get it.", o: ["spent", "took", "cost", "paid"], a: 0, e: "【關鍵判斷】**He (人)** 作主詞，且後方有介系詞 **on**\n【解題思維】花費一筆錢(a fortune)。當主詞是人，且介系詞使用 `on` (花錢在某物上) 時，動詞必須使用 **spend** (過去式 spent)。" },
      { c: 4, q: "Husband: **Buying this house will ____ us** a lot of money, but it's worth it for our family.\nWife: I agree. The location is perfect.", o: ["spend", "take", "cost", "pay"], a: 2, e: "【關鍵判斷】**Buying this house (事物)** 作主詞，花費**金錢**\n【解題思維】動名詞片語 `Buying this house` 作為事物主詞。事物花費某人「金錢」，動詞只能用 **cost**。" },
      { c: 4, q: "Student: **____ takes** a lot of practice **to speak** English fluently like a native speaker.\nTeacher: Exactly! Practice makes perfect.", o: ["It", "That", "This", "He"], a: 0, e: "【關鍵判斷】**takes (花費)** 與後方的 **to speak (不定詞)**\n【解題思維】會考極常考的句型結構：`It takes + 資源/心力/時間 + to V`。在前面代替後面那件事的主詞，只能使用虛主詞 **It**。" },
      { c: 4, q: "Daughter: Mom, can you teach me how to bake a chocolate cake?\nMom: Sure, but **it will ____ us the whole afternoon**. Are you ready?", o: ["spend", "take", "cost", "pay"], a: 1, e: "【關鍵判斷】**it (代稱烤蛋糕這件事)** 作主詞，花費**時間**\n【解題思維】it 代稱前面的事物。事物花費「時間」(the whole afternoon)，動詞必須使用 **take**。" },
      { c: 4, q: "Customer: This watch is beautiful, but the price tag is missing. How much does **it ____**?\nClerk: Let me check... It's three thousand dollars.", o: ["spend", "take", "cost", "pay"], a: 2, e: "【關鍵判斷】**it (事物)** 作主詞，詢問**金錢**\n【解題思維】How much 問多少錢。主詞 it 代表手錶，事物花費金錢，動詞用 **cost**。" },
      { c: 4, q: "Son: I want to go to the concert, but I don't have enough money.\nDad: If you help me wash the car, **I will ____ for** your ticket.", o: ["spend", "take", "cost", "pay"], a: 3, e: "【關鍵判斷】**I (人)** 作主詞，與介系詞 **for**\n【解題思維】人當主詞，且要為某物付錢 (for your ticket)，動詞固定搭配 **pay**。" },
      { c: 4, q: "Interviewer: What do you usually do in your free time?\nActor: I enjoy reading. **I usually ____** at least two hours a day **reading** novels.", o: ["spend", "take", "cost", "pay"], a: 0, e: "【關鍵判斷】**I (人)** 作主詞，花費時間，且後接 **V-ing**\n【解題思維】人當主詞，花費時間在做某件事，且後面動詞是動名詞 reading，這完全是 **spend** 的標準句式。" },
      { c: 4, q: "Jane: **Learning a new language ____** a lot of time and effort, doesn't it?\nMark: Yes, but it opens up a whole new world for you.", o: ["spends", "takes", "costs", "pays"], a: 1, e: "【關鍵判斷】**Learning a new language (事物)** 作主詞，花費**時間與心力**\n【解題思維】動名詞當主詞(事物)。事物花費時間、精神、力氣等，動詞一律使用 **take** (第三人稱單數 takes)。" },
      { c: 4, q: "Guest: This meal is wonderful. Let **me ____ for** the dinner tonight.\nHost: No way! You are my guest. I've already paid.", o: ["spend", "take", "cost", "pay"], a: 3, e: "【關鍵判斷】**me (人)** 作受詞(動作執行者)，與介系詞 **for**\n【解題思維】Let me... (讓我來...)，人主動去為某物付錢，固定搭配 `pay for`。選 **pay**。" },
      { c: 4, q: "Reporter: How did the city build this amazing park?\nMayor: **The government ____** millions of dollars and five years **completing** this project.", o: ["spent", "took", "cost", "paid"], a: 0, e: "【關鍵判斷】**The government (人的集合體)** 作主詞，且後接 **V-ing**\n【解題思維】政府是由人組成的單位(視同人作主詞)，且後面緊接著動名詞 completing (完成)。人 + 花錢/時間 + V-ing，動詞使用 **spend** (過去式 spent)。" },
      { c: 4, q: "Mother: **Don't ____ all your pocket money on** comic books and snacks. You should save some.\nSon: Okay, Mom. I'll put half of it in my piggy bank.", o: ["spend", "take", "cost", "pay"], a: 0, e: "【關鍵判斷】祈使句 (省略主詞 **You**)，且有介系詞 **on**\n【解題思維】祈使句是對著「人(你)」說的。人花費金錢「在...上面 (on)」，這是 **spend** 的標準搭配。" },
      { c: 4, q: "Passenger: How much does **it ____ to take a taxi** from the airport to the city center?\nDriver: It's a flat rate of 1,000 NT dollars.", o: ["spend", "take", "cost", "pay"], a: 2, e: "【關鍵判斷】**it (虛主詞)**，詢問**金錢**，與 **to take (不定詞)**\n【解題思維】這題很特別！雖然句型是 `It ___ to V`，但因為問的是 How much (多少錢)，虛主詞 it 花費「金錢」，動詞必須用 **cost** (It costs 錢 to V)。" },
      { c: 4, q: "Manager: We need to finish this report by Friday.\nEmployee: But **it usually ____ us** at least a week **to collect** all the data.", o: ["spends", "takes", "costs", "pays"], a: 1, e: "【關鍵判斷】**it (虛主詞)**，花費**時間**，與 **to collect (不定詞)**\n【解題思維】標準句型：`It takes + 人 + 時間 + to V`。因為是花費時間 (a week)，所以動詞用 **takes**。" },
      { c: 4, q: "Customer: I love this dress, but I only have 500 dollars with me.\nClerk: I'm sorry, miss. **It will ____ you** 800 dollars.", o: ["spend", "take", "cost", "pay"], a: 2, e: "【關鍵判斷】**It (事物)** 作主詞，花費**金錢**\n【解題思維】It 指代洋裝(事物)。事物花費某人多少錢，句型為 `物 + cost + 人 + 金錢`。故選 **cost**。" },
      { c: 4, q: "How much money did **you ____ on** this game?", o: ["spend", "take", "cost", "pay"], a: 0, e: "【關鍵判斷】**you (人)** 與介系詞 **on**\n【解題思維】人花費金錢在某物上，固定句型 `spend money on sth`。選 **spend**。" },
      { c: 4, q: "**Doing exercise** every day **____** him a lot of time.", o: ["takes", "spends", "costs", "pays"], a: 0, e: "【關鍵判斷】**Doing (動名詞作主詞-事物)** 與花費**時間**\n【解題思維】事物花費時間，動詞用 **take** (第三人稱單數 takes)。" },
      { c: 4, q: "**____ took** me three days **to read** the novel.", o: ["It", "That", "This", "He"], a: 0, e: "【關鍵判斷】**took... to read** (句型結構)\n【解題思維】搭配後方的不定詞 to read，前面的虛主詞只能填入 **It**。" },
      { c: 4, q: "**The computer ____** me NT$30,000.", o: ["cost", "spent", "took", "paid"], a: 0, e: "【關鍵判斷】**The computer (事物)** 花費**金錢**\n【解題思維】事物花費金錢，動詞用 **cost**。" },
      { c: 4, q: "**I paid** NT$500 **____** the ticket.", o: ["for", "on", "to", "with"], a: 0, e: "【關鍵判斷】**paid (付錢)** 的介系詞搭配\n【解題思維】pay money for something (為某物付錢)，介系詞固定用 **for**。" },
      { c: 4, q: "How long does **it ____ to fly** to Japan?", o: ["take", "spend", "cost", "pay"], a: 0, e: "【關鍵判斷】**How long (時間)** 與 **it... to fly**\n【解題思維】詢問花費時間的虛主詞句型：It takes time to V。選 **take**。" },
      { c: 4, q: "**She spends** two hours **____** the piano every day.", o: ["playing", "play", "to play", "played"], a: 0, e: "【關鍵判斷】**spends + 時間**\n【解題思維】spend time 後面要接動名詞 **V-ing (playing)**。" },
      { c: 4, q: "**The new house ____** them millions of dollars.", o: ["cost", "spent", "took", "paid"], a: 0, e: "【關鍵判斷】**house (事物)** 花費**金錢**\n【解題思維】事物花費金錢，動詞用 **cost**。" },
      { c: 4, q: "How much did **the meal ____** you?", o: ["cost", "spend", "take", "pay"], a: 0, e: "【關鍵判斷】**the meal (事物)** 花費**金錢**\n【解題思維】詢問事物花費多少錢，動詞用 **cost**。" },
      { c: 4, q: "**It** will **____** you 10 minutes **to walk** there.", o: ["take", "spend", "cost", "pay"], a: 0, e: "【關鍵判斷】**It... to walk** 花費**時間**\n【解題思維】虛主詞 It 花費時間去作某事，動詞用 **take**。" },
      { c: 4, q: "**He spent** all his money **____** books.", o: ["on", "for", "in", "with"], a: 0, e: "【關鍵判斷】**spent money** (花錢) 買物品\n【解題思維】spend 搭配物品時，介系詞固定用 **on**。" },
      { c: 4, q: "**They ____** 200 dollars **for** the dinner.", o: ["paid", "spent", "cost", "took"], a: 0, e: "【關鍵判斷】**They (人)** 與介系詞 **for**\n【解題思維】人為某物付錢，固定搭配 pay for。過去式為 **paid**。" },
      { c: 4, q: "**Traveling** around the world **____** a lot of money.", o: ["costs", "spends", "takes", "pays"], a: 0, e: "【關鍵判斷】**Traveling (動名詞-事物)** 花費**金錢**\n【解題思維】事物花費金錢，動詞用 **cost** (單數加 s)。" },
      { c: 4, q: "**It ____** a lot of time **to learn** a language.", o: ["takes", "spends", "costs", "pays"], a: 0, e: "【關鍵判斷】**It... to learn** 花費**時間**\n【解題思維】虛主詞花費時間，動詞用 **take** (單數加 s)。" },
      { c: 4, q: "**Mary ____** three hours **doing** her homework yesterday.", o: ["spent", "took", "cost", "paid"], a: 0, e: "【關鍵判斷】**Mary (人)** 花費時間且接 **V-ing (doing)**\n【解題思維】人花費時間做某事，動詞用 **spend** (過去式 spent)。" },
      { c: 4, q: "How much did **you ____ for** the shoes?", o: ["pay", "spend", "cost", "take"], a: 0, e: "【關鍵判斷】**you (人)** 與介系詞 **for**\n【解題思維】人為物品付款，動詞用 **pay**。" },
      { c: 4, q: "**Fixing** the broken window **____** me $50.", o: ["cost", "spent", "took", "paid"], a: 0, e: "【關鍵判斷】**Fixing (動名詞-事物)** 花費**金錢**\n【解題思維】事物花費金錢，動詞用 **cost**。" },
      { c: 4, q: "**I** don't want to **____** too much time **watching** TV.", o: ["spend", "take", "cost", "pay"], a: 0, e: "【關鍵判斷】**I (人)** 花費時間且接 **V-ing (watching)**\n【解題思維】人花時間作某事，動詞用 **spend**。" },
      { c: 4, q: "**The flight** to New York **____** about 15 hours.", o: ["takes", "spends", "costs", "pays"], a: 0, e: "【關鍵判斷】**The flight (事物)** 花費**時間**\n【解題思維】事物花費時間，動詞用 **take** (單數加 s)。" },
      { c: 4, q: "**My dad ____** $1,000 **for** my new glasses.", o: ["paid", "spent", "cost", "took"], a: 0, e: "【關鍵判斷】**My dad (人)** 與介系詞 **for**\n【解題思維】人為物品付費，動詞用 **pay** (過去式 paid)。" },
      { c: 4, q: "**Making** a cake **____** me a whole afternoon.", o: ["took", "spent", "cost", "paid"], a: 0, e: "【關鍵判斷】**Making (動名詞-事物)** 花費**時間**\n【解題思維】事物花費時間，動詞用 **take** (過去式 took)。" },
      { c: 4, q: "**He ____** a lot of time **on** his hobbies.", o: ["spends", "takes", "costs", "pays"], a: 0, e: "【關鍵判斷】**He (人)** 花費時間在事物 **(on)**\n【解題思維】人花費時間在某事物上，動詞用 **spend** (單數加 s)。" },
      { c: 4, q: "**It** usually **____** half an hour **to get** to school.", o: ["takes", "spends", "costs", "pays"], a: 0, e: "【關鍵判斷】**It... to get** 花費**時間**\n【解題思維】虛主詞花費時間去做某事，動詞用 **take** (單數加 s)。" },
      { c: 4, q: "**This diamond ring ____** a fortune.", o: ["costs", "spends", "takes", "pays"], a: 0, e: "【關鍵判斷】**ring (事物)** 花費**金錢 (a fortune)**\n【解題思維】事物花費金錢，動詞用 **cost** (單數加 s)。" },
      { c: 4, q: "**We ____** $300 **for** the taxi ride.", o: ["paid", "spent", "cost", "took"], a: 0, e: "【關鍵判斷】**We (人)** 與介系詞 **for**\n【解題思維】人為某服務/物品付錢，動詞用 **pay** (過去式 paid)。" },
      { c: 4, q: "**She spent** the whole morning **____** the house.", o: ["cleaning", "clean", "to clean", "cleaned"], a: 0, e: "【關鍵判斷】**spent + 時間**\n【解題思維】spend time 後方必須接動名詞 **V-ing (cleaning)**。" },
      { c: 4, q: "**The jacket ____** me $1,500, but it's worth it.", o: ["cost", "spent", "took", "paid"], a: 0, e: "【關鍵判斷】**jacket (事物)** 花費**金錢**\n【解題思維】事物花費金錢，動詞用 **cost** (三態同行，此為過去式)。" },
      { c: 4, q: "How much time did **you ____ on** the test?", o: ["spend", "take", "cost", "pay"], a: 0, e: "【關鍵判斷】**you (人)** 與介系詞 **on**\n【解題思維】人花費時間在某物上，動詞用 **spend**。" },
      { c: 4, q: "**Reading** this book **____** her three weeks.", o: ["took", "spent", "cost", "paid"], a: 0, e: "【關鍵判斷】**Reading (動名詞-事物)** 花費**時間**\n【解題思維】事物花費時間，動詞用 **take** (過去式 took)。" },
      { c: 4, q: "**I** need to **____** the rent by tomorrow.", o: ["pay", "spend", "cost", "take"], a: 0, e: "【關鍵判斷】**I (人)** 支付**款項 (rent 租金)**\n【解題思維】人去支付帳單、租金、費用等名詞時，直接使用動詞 **pay** (不加for)。" },

      // 6. 情緒形容詞
      { c: 5, q: "Mike: Did you watch the basketball game last night? **It** was so **____**!\nJohn: Yes! Both teams played really well until the last second.", o: ["excited", "exciting", "excite", "excites"], a: 1, e: "【關鍵判斷】**It (比賽)** 作為主詞\n【解題思維】代名詞 It 指代前面的 basketball game(事物)。事物令人感到刺激興奮，修飾事物必須用 V-ing 結尾的情緒形容詞 **exciting**。" },
      { c: 5, q: "Alice: Why does **Peter look so ____** today?\nBob: He failed his math test again, even though he studied all night.", o: ["disappointed", "disappointing", "disappoint", "disappoints"], a: 0, e: "【關鍵判斷】**Peter (人)** 的情緒狀態\n【解題思維】Peter 看起來很失望。描述「人」本身感受到的情緒，必須使用 V-ed 結尾的情緒形容詞 **disappointed**。" },
      { c: 5, q: "Mom: Turn off the TV and go to bed. **That ghost movie** is too **____** for a child.\nSon: But I want to know the ending!", o: ["scared", "scaring", "scare", "scary"], a: 3, e: "【關鍵判斷】**ghost movie (電影)** 令人害怕\n【解題思維】形容事物 (電影) 本身帶有恐怖、嚇人的特質，英文習慣直接使用形容詞 **scary**，而非 scaring。" },
      { c: 5, q: "Teacher: **Are you ____ in** joining the science club this semester?\nStudent: Yes! I love doing experiments.", o: ["interest", "interested", "interesting", "interests"], a: 1, e: "【關鍵判斷】**you (人)** 與介系詞 **in**\n【解題思維】表示「人對某事物感到興趣」，固定句型為 **be interested in**。用 V-ed 修飾人的感受。" },
      { c: 5, q: "Friend A: **The news** about the massive earthquake is really **____**.\nFriend B: I know. I feel so sorry for the victims.", o: ["shocked", "shocking", "shock", "shocks"], a: 1, e: "【關鍵判斷】**The news (新聞/事物)** 令人震驚\n【解題思維】新聞本身帶有令人震驚的特質，修飾事物必須使用 V-ing 結尾的情緒形容詞 **shocking**。" },
      { c: 5, q: "Tourist: **The view** from the top of Taipei 101 is absolutely **____**!\nGuide: Indeed. You can see the whole city clearly from here.", o: ["amazed", "amazing", "amaze", "amazes"], a: 1, e: "【關鍵判斷】**The view (風景/事物)** 令人驚嘆\n【解題思維】風景令人感到驚奇、驚嘆，修飾事物必須使用 V-ing 結尾的 **amazing**。" },
      { c: 5, q: "Jane: **I am getting ____ of** eating hamburgers every day. Can we have something else?\nMark: Sure. Let's go get some sushi.", o: ["tired", "tiring", "tire", "tires"], a: 0, e: "【關鍵判斷】**I am (人)** 與介系詞 **of**\n【解題思維】表示「人對...感到厭煩」，固定句型為 **be tired of**。用 V-ed 修飾人的主觀感受。" },
      { c: 5, q: "Son: Mom, **I'm ____**! There's nothing to do at home and all my friends are busy.\nMom: Why don't you read a book or help me clean the house?", o: ["bored", "boring", "bore", "bores"], a: 0, e: "【關鍵判斷】**I'm (人為主詞)** 的情緒感受\n【解題思維】兒子表示自己感到無聊。描述人的情緒感受，必須使用 V-ed 結尾的 **bored**。" },
      { c: 5, q: "Audience A: **The ending of the movie** was so **____**. I couldn't stop crying.\nAudience B: Me too. The actor's performance was incredible.", o: ["touched", "touching", "touch", "touches"], a: 1, e: "【關鍵判斷】**The ending (結局/事物)** 令人感動\n【解題思維】電影結局具有令人感動的特質，修飾事物必須使用 V-ing 結尾的 **touching**。" },
      { c: 5, q: "Student: **I am so ____ about** the graduation trip next week! I've packed my bags already.\nTeacher: It's good to see you so happy.", o: ["excited", "exciting", "excite", "excites"], a: 0, e: "【關鍵判斷】**I am (人)** 與介系詞 **about**\n【解題思維】表示「人對...感到興奮」，固定句型為 **be excited about**。用 V-ed 修飾人的情緒。" },
      { c: 5, q: "Daughter: Dad, **I'm ____ of** the dark. Can you leave the door open?\nDad: Don't worry, sweetie. There's nothing in the dark.", o: ["terrified", "terrifying", "terrify", "terrifies"], a: 0, e: "【關鍵判斷】**I'm (人)** 與介系詞 **of**\n【解題思維】表示「人對...感到極度恐懼」，固定搭配為 **be terrified of**。用 V-ed 描述人的感受。" },
      { c: 5, q: "Boss: **I am very ____ with** your presentation today. You did a great job!\nEmployee: Thank you, sir. I spent a lot of time preparing for it.", o: ["satisfied", "satisfying", "satisfy", "satisfies"], a: 0, e: "【關鍵判斷】**I am (人)** 與介系詞 **with**\n【解題思維】表示「人對...感到滿意」，固定搭配為 **be satisfied with**。用 V-ed 描述人的感受。" },
      { c: 5, q: "Customer: **The instructions** for this new smartphone are very **____**. I don't know how to set it up.\nClerk: Let me help you with that, sir.", o: ["confused", "confusing", "confuse", "confuses"], a: 1, e: "【關鍵判斷】**The instructions (說明書/事物)** 令人困惑\n【解題思維】說明書本身寫得很複雜，令人感到困惑，修飾事物必須使用 V-ing 結尾的 **confusing**。" },
      { c: 5, q: "Friend A: Did you see the magic trick? How did he make the bird disappear?\nFriend B: **I was totally ____**! It was unbelievable.", o: ["amazed", "amazing", "amaze", "amazes"], a: 0, e: "【關鍵判斷】**I was (人)** 的主觀感受\n【解題思維】朋友表示自己感到非常驚奇、訝異。描述人的主觀情緒感受，必須使用 V-ed 結尾的 **amazed**。" },
      { c: 5, q: "Wife: **Listening to soft music** after a long day of work is very **____**.\nHusband: I agree. It helps me sleep better.", o: ["relaxed", "relaxing", "relax", "relaxes"], a: 1, e: "【關鍵判斷】**Listening to music (聽音樂這件事)** 令人放鬆\n【解題思維】動名詞片語視為「事物」。聽音樂這件事具有令人放鬆的特質，修飾事物必須使用 V-ing 結尾的 **relaxing**。" },
      { c: 5, q: "Son: I didn't win the race, Mom. I feel like a loser.\nMom: **Don't be ____**. You did your best, and that's what matters.", o: ["disappointed", "disappointing", "disappoint", "disappoints"], a: 0, e: "【關鍵判斷】祈使句 **Don't be (叫某人不要...)**\n【解題思維】祈使句的對象是「人(You)」。媽媽安慰兒子不要感到失望，修飾人的情緒必須使用 V-ed 結尾的 **disappointed**。" },
      { c: 5, q: "Interviewer: What is **the most ____ experience** you've ever had?\nTraveler: Probably skydiving in New Zealand. My heart was beating so fast!", o: ["thrilled", "thrilling", "thrill", "thrills"], a: 1, e: "【關鍵判斷】修飾名詞 **experience (經驗/事物)**\n【解題思維】修飾「令人感到刺激/毛骨悚然的經驗」，因為經驗是事物，必須使用 V-ing 結尾的情緒形容詞 **thrilling**。" },
      { c: 5, q: "Passenger: **The train is delayed again!** This is really **____**.\nStation Staff: We apologize for the inconvenience, sir.", o: ["annoyed", "annoying", "annoy", "annoys"], a: 1, e: "【關鍵判斷】**This (指代火車誤點這件事)** 令人煩躁\n【解題思維】代名詞 This 代表前面火車誤點的狀況(事物)。事情令人感到心煩、討厭，修飾事物使用 V-ing 結尾的 **annoying**。" },
      { c: 5, q: "Mom: Why is the little girl crying so loudly in the park?\nDad: **She got ____ by** a big dog that suddenly barked at her.", o: ["frightened", "frightening", "frighten", "frightens"], a: 0, e: "【關鍵判斷】**She got (人變得...)** 與 **by a big dog**\n【解題思維】小女孩被大狗嚇到了。表示人感到驚嚇，或是承受被嚇到的動作，使用 V-ed 結尾的 **frightened** (get frightened by... 被...嚇到)。" },
      { c: 5, q: "Teacher: **The result of the science fair** is **____**. None of our teams made it to the finals.\nPrincipal: It's a pity, but they will learn from this.", o: ["disappointed", "disappointing", "disappoint", "disappoints"], a: 1, e: "【關鍵判斷】**The result (比賽結果/事物)** 令人失望\n【解題思維】比賽結果這個「事物」本身具有令人失望的特質，修飾事物必須使用 V-ing 結尾的 **disappointing**。" },
      { c: 5, q: "**The trip** was very **____**. We all enjoyed it.", o: ["exciting", "excited", "excite", "excites"], a: 0, e: "【關鍵判斷】**The trip (事物)**\n【解題思維】旅程(事物)令人感到興奮，修飾事物用 V-ing 結尾的 **exciting**。" },
      { c: 5, q: "**I am** so **____ of** spiders. Keep them away from me!", o: ["scared", "scaring", "scare", "scary"], a: 0, e: "【關鍵判斷】**I am (人)** 與介系詞 **of**\n【解題思維】人感到害怕用 V-ed。固定句型為 **be scared of** (害怕...)。" },
      { c: 5, q: "**Are you ____ in** learning French?", o: ["interested", "interesting", "interest", "interests"], a: 0, e: "【關鍵判斷】**you (人)** 與介系詞 **in**\n【解題思維】人對...感到興趣用 V-ed。固定句型為 **be interested in**。" },
      { c: 5, q: "**English grammar** is **____** to many students.", o: ["boring", "bored", "bore", "bores"], a: 0, e: "【關鍵判斷】**English grammar (事物)**\n【解題思維】文法(事物)令人感到無聊，修飾事物用 V-ing 結尾的 **boring**。" },
      { c: 5, q: "**They were ____ at** the bad news.", o: ["surprised", "surprising", "surprise", "surprises"], a: 0, e: "【關鍵判斷】**They were (人)** 與介系詞 **at**\n【解題思維】人感到驚訝用 V-ed。固定句型為 **be surprised at**。" },
      { c: 5, q: "**The ghost movie** was so **____** that I couldn't sleep.", o: ["scary", "scared", "scare", "scaring"], a: 0, e: "【關鍵判斷】**movie (事物)** 令人害怕\n【解題思維】形容事物本身令人害怕，英文習慣使用形容詞 **scary**。" },
      { c: 5, q: "**He felt ____** when he failed the test.", o: ["disappointed", "disappointing", "disappoint", "disappoints"], a: 0, e: "【關鍵判斷】**He felt (人)** 的感受\n【解題思維】人感到失望，修飾人的情緒用 V-ed 結尾的 **disappointed**。" },
      { c: 5, q: "**The news** about the accident was **____**.", o: ["shocking", "shocked", "shock", "shocks"], a: 0, e: "【關鍵判斷】**The news (事物)** 令人震驚\n【解題思維】新聞(事物)令人震驚，修飾事物用 V-ing 結尾的 **shocking**。" },
      { c: 5, q: "**I am getting ____ of** eating the same food every day.", o: ["tired", "tiring", "tire", "tires"], a: 0, e: "【關鍵判斷】**I am (人)** 與介系詞 **of**\n【解題思維】人對...感到厭煩用 V-ed。固定句型為 **be tired of**。" },
      { c: 5, q: "**The ending** of the story was really **____**.", o: ["touching", "touched", "touch", "touches"], a: 0, e: "【關鍵判斷】**The ending (結局/事物)**\n【解題思維】結局(事物)令人感動，修飾事物用 V-ing 結尾的 **touching**。" },
      { c: 5, q: "**Are you ____ with** your test score?", o: ["satisfied", "satisfying", "satisfy", "satisfies"], a: 0, e: "【關鍵判斷】**you (人)** 與介系詞 **with**\n【解題思維】人感到滿意用 V-ed。固定句型為 **be satisfied with**。" },
      { c: 5, q: "**Playing basketball** for three hours is **____**.", o: ["tiring", "tired", "tire", "tires"], a: 0, e: "【關鍵判斷】**Playing basketball (事件/事物)**\n【解題思維】打籃球這件事令人疲倦，修飾事物用 V-ing 結尾的 **tiring**。" },
      { c: 5, q: "**She is ____ about** the party tonight.", o: ["excited", "exciting", "excite", "excites"], a: 0, e: "【關鍵判斷】**She is (人)** 與介系詞 **about**\n【解題思維】人感到興奮用 V-ed。固定句型為 **be excited about**。" },
      { c: 5, q: "**The math problem** is too **____**. I don't understand it.", o: ["confusing", "confused", "confuse", "confuses"], a: 0, e: "【關鍵判斷】**problem (事物)**\n【解題思維】數學題(事物)令人困惑，修飾事物用 V-ing 結尾的 **confusing**。" },
      { c: 5, q: "**We were** deeply **____ by** his speech.", o: ["touched", "touching", "touch", "touches"], a: 0, e: "【關鍵判斷】**We were (人)** 與介系詞 **by**\n【解題思維】人被深深感動用 V-ed。被動語態搭配 by，選 **touched**。" },
      { c: 5, q: "**I feel ____** because I have nothing to do.", o: ["bored", "boring", "bore", "bores"], a: 0, e: "【關鍵判斷】**I feel (人)** 的感受\n【解題思維】人感到無聊，修飾情緒用 V-ed 結尾的 **bored**。" },
